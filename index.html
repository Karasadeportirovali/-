<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>манго арбузник</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* ===== ВСЕ СТИЛИ (с исправлениями для кнопки записи) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --bg2: #141414; --bg3: #1c1c1c; --bg4: #252525; --bg5: #2e2e2e;
            --br: #3a3a3a; --txt: #f0f0f0; --txt2: #b0b0b0; --txt3: #777;
            --ac: #d0d0d0; --ach: #aaa; --sh: 0 2px 10px rgba(0,0,0,.6); --scr: #555;
        }
        .light { --bg: #f5f5f5; --bg2: #e8e8e8; --bg3: #d8d8d8; --bg4: #d0d0d0; --bg5: #c0c0c0; --br: #b0b0b0; --txt: #1a1a1a; --txt2: #444; --txt3: #777; --ac: #222; --ach: #555; --sh: 0 2px 10px rgba(0,0,0,.15); --scr: #999; }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 70px; background: var(--bg2); display: flex; flex-direction: column; align-items: center; padding-top: 20px; border-right: 1px solid var(--br); flex-shrink: 0; z-index: 10; }
        .sidebar .logo { font-size: 20px; font-weight: 900; color: var(--ac); margin-bottom: 20px; writing-mode: vertical-lr; letter-spacing: 4px; }
        .sidebar .nav-item { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 16px; margin-bottom: 10px; cursor: pointer; transition: .2s; color: var(--txt2); font-size: 22px; background: 0 0; border: none; }
        .sidebar .nav-item:hover { background: var(--bg3); color: var(--txt); }
        .sidebar .nav-item.active { background: var(--ac); color: var(--bg); box-shadow: var(--sh); }
        .sidebar .nav-item:last-child { margin-top: auto; margin-bottom: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; background: var(--bg); min-width: 0; transition: transform .15s, background .2s; transform-origin: top left; position: relative; }
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px; background: var(--bg2); border-bottom: 1px solid var(--br); flex-shrink: 0; flex-wrap: wrap; gap: 8px; }
        .topbar .title { font-size: 20px; font-weight: 700; color: var(--ac); letter-spacing: 1px; }
        .topbar .datetime { font-size: 13px; color: var(--txt2); background: var(--bg3); padding: 2px 12px; border-radius: 30px; border: 1px solid var(--br); white-space: nowrap; }
        .topbar .status { font-size: 13px; color: var(--txt2); background: var(--bg3); padding: 2px 14px; border-radius: 30px; border: 1px solid var(--br); }
        .topbar .status.online { color: #5a5; border-color: #5a5; }
        .topbar .status.offline { color: #a55; border-color: #a55; }
        .topbar .status.connected { color: #aa5; border-color: #aa5; }
        .topbar .status.retry { color: #fa0; border-color: #fa0; }
        .content { flex: 1; display: flex; overflow: hidden; position: relative; }
        .tab { display: none; width: 100%; height: 100%; flex-direction: column; padding: 16px; overflow-y: auto; }
        .tab.active { display: flex; }
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; flex: 1; min-height: 0; margin-bottom: 16px; }
        @media(max-width:700px){ .video-grid { grid-template-columns: 1fr; } }
        .video-card { background: var(--bg3); border-radius: 20px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; border: 1px solid var(--br); }
        .video-card video { width: 100%; height: 100%; object-fit: cover; background: #000; transform: scaleX(-1); }
        .video-card .label { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,.6); padding: 2px 14px; border-radius: 30px; font-size: 13px; color: #ccc; backdrop-filter: blur(4px); border: 1px solid var(--br); }
        .video-card .label.remote { color: #fc0; }
        .controls-room { display: flex; justify-content: center; gap: 12px; flex-shrink: 0; padding: 8px 0; flex-wrap: wrap; }
        .controls-room button { background: var(--bg3); border: 1px solid var(--br); padding: 8px 20px; border-radius: 60px; color: var(--txt); font-size: 14px; cursor: pointer; transition: .15s; display: flex; align-items: center; gap: 6px; }
        .controls-room button:hover { background: var(--br); }
        .controls-room .active { background: var(--ac); color: var(--bg); border-color: var(--ac); }
        .controls-room .danger { background: #a55; color: #fff; border-color: #a55; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 8px 12px; background: var(--bg3); border-radius: 16px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 4px; border: 1px solid var(--br); position: relative; }
        .chat-messages .msg { max-width: 80%; padding: 6px 12px; border-radius: 14px; background: var(--bg4); align-self: flex-start; word-wrap: break-word; position: relative; transition: .1s; }
        .chat-messages .msg.me { align-self: flex-end; background: var(--bg5); border: 1px solid var(--br); }
        .chat-messages .msg .sender { font-size: 11px; color: var(--txt2); margin-bottom: 1px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .chat-messages .msg .time { font-size: 9px; color: var(--txt3); margin-left: 6px; }
        .chat-messages .msg .reply-to { font-size: 11px; color: var(--ac); background: var(--bg3); padding: 2px 8px; border-radius: 8px; margin-bottom: 3px; border-left: 3px solid var(--ac); }
        .chat-messages .msg .content { word-wrap: break-word; }
        .chat-messages .msg .circle-video { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; margin: 4px 0; cursor: pointer; background: #000; }
        .chat-messages .msg .circle-video video { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .chat-messages .msg .audio-preview { display: flex; align-items: center; gap: 8px; background: var(--bg3); padding: 4px 12px; border-radius: 40px; margin-top: 4px; max-width: 200px; }
        .chat-messages .msg .audio-preview button { background: 0 0; border: 0; color: var(--ac); font-size: 18px; cursor: pointer; }
        .chat-messages .msg .audio-preview .duration { font-size: 12px; color: var(--txt2); }
        .chat-messages .msg .reactions { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .chat-messages .msg .reactions span { background: var(--bg3); padding: 0 6px; border-radius: 12px; font-size: 14px; cursor: pointer; }
        .chat-messages .msg .reply-badge { font-size: 10px; color: var(--txt3); margin-left: 4px; }
        .pending-indicator { color: #f44; font-weight: 700; margin-left: 4px; font-size: 14px; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0%{opacity:1} 50%{opacity:.3} 100%{opacity:1} }
        .chat-input-area { display: flex; gap: 8px; align-items: center; flex-shrink: 0; background: var(--bg2); padding: 8px 12px; border-radius: 60px; border: 1px solid var(--br); }
        .chat-input-area input[type="text"] { flex: 1; background: 0 0; border: 0; color: var(--txt); font-size: 14px; outline: 0; padding: 4px 0; }
        .chat-input-area button { background: 0 0; border: 0; color: var(--txt2); font-size: 20px; cursor: pointer; padding: 4px 8px; transition: .2s; position: relative; }
        .chat-input-area button:hover { color: var(--txt); }
        .chat-input-area button.primary { color: var(--ac); font-size: 22px; }
        .chat-input-area button.primary:hover { color: var(--ach); }
        .chat-input-area button.recording { color: #a55; }
        .voice-wave { display: inline-flex; align-items: center; gap: 3px; height: 20px; margin-left: 4px; }
        .voice-wave span { display: block; width: 3px; height: 100%; background: var(--ac); border-radius: 3px; animation: wave .6s infinite alternate ease-in-out; }
        .voice-wave span:nth-child(2) { animation-delay:.1s; height:60%; }
        .voice-wave span:nth-child(3) { animation-delay:.2s; height:80%; }
        .voice-wave span:nth-child(4) { animation-delay:.3s; height:40%; }
        .voice-wave span:nth-child(5) { animation-delay:.4s; height:90%; }
        .voice-wave span:nth-child(6) { animation-delay:.5s; height:50%; }
        .voice-wave span:nth-child(7) { animation-delay:.6s; height:70%; }
        @keyframes wave { 0%{transform:scaleY(.4)} 100%{transform:scaleY(1)} }
        .settings-tab { padding: 24px; max-width: 500px; width: 100%; }
        .settings-tab .setting-group { margin-bottom: 20px; }
        .settings-tab label { display: block; font-size: 13px; color: var(--txt2); margin-bottom: 4px; }
        .user-selector { display: flex; gap: 16px; margin-top: 4px; }
        .user-selector label { display: flex; align-items: center; gap: 6px; color: var(--txt); cursor: pointer; }
        .user-selector input[type="radio"] { accent-color: var(--ac); width: 16px; height: 16px; cursor: pointer; }
        .zoom-row { display: flex; align-items: center; gap: 12px; }
        .zoom-row input[type="range"] { flex: 1; accent-color: var(--ac); cursor: pointer; }
        .zoom-value { color: var(--ac); font-weight: 700; min-width: 44px; }
        .btn-default { background: var(--bg3); border: 1px solid var(--br); color: var(--txt); padding: 4px 14px; border-radius: 40px; cursor: pointer; font-size: 13px; }
        .btn-default:hover { background: var(--br); }
        .theme-toggle { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
        .theme-toggle input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--ac); cursor: pointer; }
        /* Модалка записи кружка */
        .recording-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.9); display:none; align-items:center; justify-content:center; z-index:9999; flex-direction:column; }
        .recording-modal.active { display:flex; }
        .recording-modal .preview { width: 300px; height: 300px; border-radius: 50%; overflow: hidden; background: #000; position: relative; }
        .recording-modal .preview video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .recording-modal .controls { display: flex; gap: 30px; margin-top: 30px; align-items: center; }
        .recording-modal .controls button { background: var(--bg3); border: none; color: #fff; font-size: 24px; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; transition: .2s; }
        .recording-modal .controls button:hover { background: var(--br); }
        .recording-modal .controls .record-btn { background: #f44; width: 60px; height: 60px; font-size: 14px; color: #fff; border-radius: 50%; animation: pulse 1s infinite; display: flex; align-items: center; justify-content: center; }
        .recording-modal .controls .record-btn.recording { animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
        .recording-modal .timer { color: #fff; font-size: 24px; margin-top: 10px; }
        .recording-modal .close-rec { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #fff; font-size: 30px; cursor: pointer; }
        /* Контекстное меню */
        .context-menu { position: fixed; background: var(--bg2); border-radius: 12px; padding: 8px; box-shadow: var(--sh); z-index: 9998; display: none; flex-direction: column; border: 1px solid var(--br); min-width: 160px; }
        .context-menu.active { display: flex; }
        .context-menu button { background: none; border: none; color: var(--txt); padding: 6px 16px; text-align: left; font-size: 14px; cursor: pointer; border-radius: 6px; }
        .context-menu button:hover { background: var(--bg3); }
        .context-menu .reactions-row { display: flex; gap: 6px; padding: 4px 8px; flex-wrap: wrap; }
        .context-menu .reactions-row span { font-size: 24px; cursor: pointer; transition: .1s; padding: 2px; }
        .context-menu .reactions-row span:hover { transform: scale(1.3); background: var(--bg3); border-radius: 8px; }
        .reply-indicator { background: var(--bg3); padding: 4px 12px; border-radius: 20px; font-size: 12px; color: var(--txt2); display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .reply-indicator .cancel-reply { cursor: pointer; color: #f44; font-weight: bold; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.85); display:flex; align-items:center; justify-content:center; z-index:9999; backdrop-filter:blur(4px); }
        .modal-overlay.hidden { display: none; }
        .modal-box { background: var(--bg2); border-radius:30px; padding:32px; max-width:360px; width:90%; text-align:center; border:2px solid var(--ac); box-shadow:var(--sh); }
        .modal-box h2 { font-size:28px; color:var(--ac); margin-bottom:8px; }
        .modal-box p { color:var(--txt2); margin-bottom:20px; font-size:18px; font-weight:500; }
        .modal-buttons { display:flex; gap:16px; justify-content:center; }
        .modal-buttons button { padding:10px 28px; border-radius:60px; border:0; font-size:16px; font-weight:700; cursor:pointer; transition:.15s; background:var(--bg3); color:var(--txt); border:1px solid var(--br); }
        .modal-buttons button:hover { background:var(--br); }
        .modal-buttons button.active-choice { background:var(--ac); color:var(--bg); border-color:var(--ac); }
        .splash { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; z-index:10000; color:#fff; font-size:36px; font-weight:900; letter-spacing:6px; transition:opacity .5s; }
        .splash.hidden { opacity:0; pointer-events:none; }
        .audio-player { position:fixed; top:20px; right:20px; background:var(--bg2); border-radius:60px; padding:12px 20px; z-index:999; box-shadow:var(--sh); border:1px solid var(--br); display:flex; align-items:center; gap:16px; transform:translateY(-20px); opacity:0; transition:transform .3s ease, opacity .3s ease; pointer-events:none; }
        .audio-player.show { transform:translateY(0); opacity:1; pointer-events:auto; }
        .audio-player .ctrl { display:flex; align-items:center; gap:10px; }
        .audio-player .ctrl label { font-size:12px; color:var(--txt2); }
        .audio-player .ctrl input[type="range"] { width:70px; accent-color:var(--ac); cursor:pointer; }
        .audio-player .ctrl select { background:var(--bg3); color:var(--txt); border:1px solid var(--br); border-radius:20px; padding:2px 8px; font-size:12px; }
        .audio-player .close { background:0 0; border:0; color:var(--txt2); font-size:16px; cursor:pointer; padding:0 4px; }
        .audio-player .close:hover { color:var(--txt); }
        .audio-player .playpause { background:0 0; border:0; color:var(--ac); font-size:20px; cursor:pointer; padding:0 4px; }
        @media(max-width:700px){ .sidebar{width:60px} .sidebar .nav-item{width:44px;height:44px;font-size:18px} .topbar .title{font-size:18px} .video-grid{grid-template-columns:1fr} .chat-messages .msg{max-width:95%} .audio-player{top:10px;right:10px;padding:8px 14px;flex-wrap:wrap;width:auto;max-width:90%} .recording-modal .preview{width:200px;height:200px} .recording-modal .controls .record-btn{width:50px;height:50px} }
        ::-webkit-scrollbar { width:4px; }
        ::-webkit-scrollbar-track { background: var(--bg2); }
        ::-webkit-scrollbar-thumb { background: var(--scr); border-radius:10px; }
    </style>
</head>
<body>
    <!-- Splash -->
    <div class="splash" id="splash">манго арбузник</div>
    <!-- Модалка выбора -->
    <div class="modal-overlay" id="userModal">
        <div class="modal-box">
            <h2>манго арбузник</h2>
            <p>ты кто?</p>
            <div class="modal-buttons">
                <button id="modalKarasik">Карасик</button>
                <button id="modalKater">Катер</button>
            </div>
        </div>
    </div>
    <!-- Модалка записи кружка -->
    <div class="recording-modal" id="recordingModal">
        <button class="close-rec" id="closeRecBtn">✕</button>
        <div class="preview"><video id="recPreview" autoplay muted playsinline></video></div>
        <div class="timer" id="recTimer">0:00</div>
        <div class="controls">
            <button id="flipBtn">🔄</button>
            <button id="flashBtn">⚡</button>
            <button class="record-btn" id="recStartBtn">●</button>
        </div>
    </div>
    <!-- Сайдбар -->
    <div class="sidebar" id="sidebar">
        <div class="logo">🍉</div>
        <button class="nav-item active" data-tab="room">📹</button>
        <button class="nav-item" data-tab="chat">💬</button>
        <button class="nav-item" data-tab="settings">⚙️</button>
    </div>
    <!-- Основной блок -->
    <div class="main" id="mainWrapper">
        <div class="topbar">
            <div class="title">манго арбузник</div>
            <div class="datetime" id="datetime"></div>
            <div class="status offline" id="connectionStatus">❌ Не подключено</div>
        </div>
        <div class="content">
            <!-- Комната -->
            <div class="tab active" id="roomTab">
                <div class="room-tab" style="display:flex;flex-direction:column;height:100%">
                    <div class="video-grid">
                        <div class="video-card"><video id="localVideo" autoplay muted playsinline></video><span class="label" id="localLabel">Карасик</span></div>
                        <div class="video-card"><video id="remoteVideo" autoplay playsinline></video><span class="label remote" id="remoteLabel">Катер</span></div>
                    </div>
                    <div class="controls-room">
                        <button id="camBtn">📷 Камера</button>
                        <button id="micBtn">🎤 Микрофон</button>
                        <button id="screenBtn">🖥️ Демка</button>
                        <button class="danger" id="disconnectBtn">🚪 Выйти</button>
                    </div>
                </div>
            </div>
            <!-- Чат -->
            <div class="tab" id="chatTab">
                <div class="chat-tab" style="display:flex;flex-direction:column;height:100%">
                    <div class="chat-messages" id="chatMessages"></div>
                    <div id="replyIndicator" class="reply-indicator" style="display:none;">
                        <span>Ответ на: <span id="replyText"></span></span>
                        <span class="cancel-reply" id="cancelReply">✕</span>
                    </div>
                    <div class="chat-input-area">
                        <button id="attachBtn">📎</button>
                        <button id="voiceBtn">🎙️</button>
                        <button id="videoMsgBtn">🎥</button>
                        <input type="text" id="chatInput" placeholder="Сообщение..." />
                        <button class="primary" id="chatSendBtn">➤</button>
                    </div>
                    <input type="file" id="fileInput" accept="image/*,video/*,audio/*" style="display:none" multiple>
                </div>
            </div>
            <!-- Настройки -->
            <div class="tab" id="settingsTab">
                <div class="settings-tab">
                    <div class="setting-group">
                        <label>Кто ты?</label>
                        <div class="user-selector">
                            <label><input type="radio" name="userChoice" value="karasik"> Карасик</label>
                            <label><input type="radio" name="userChoice" value="kater"> Катер</label>
                        </div>
                    </div>
                    <div class="setting-group">
                        <label>Масштаб</label>
                        <div class="zoom-row">
                            <input type="range" id="zoomSlider" min="50" max="200" value="100">
                            <span class="zoom-value" id="zoomValue">100%</span>
                            <button class="btn-default" id="zoomDefaultBtn">По умолчанию</button>
                        </div>
                    </div>
                    <div class="setting-group">
                        <label>Светлая тема</label>
                        <div class="theme-toggle">
                            <input type="checkbox" id="lightThemeToggle">
                            <span>Включить</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Аудио-плеер -->
    <div class="audio-player" id="audioPlayer">
        <button class="playpause" id="playPauseBtn">▶</button>
        <div class="ctrl"><label>Громк.</label><input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1"></div>
        <div class="ctrl"><label>Скорость</label><select id="speedSelect"><option value="0.5">0.5x</option><option value="0.75">0.75x</option><option value="1" selected>1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option><option value="2">2x</option></select></div>
        <button class="close" id="closePlayerBtn">✕</button>
    </div>
    <!-- Контекстное меню -->
    <div class="context-menu" id="contextMenu">
        <div class="reactions-row">
            <span data-reaction="❤️">❤️</span>
            <span data-reaction="😂">😂</span>
            <span data-reaction="😮">😮</span>
            <span data-reaction="😢">😢</span>
            <span data-reaction="🔥">🔥</span>
        </div>
        <button id="ctxDelete">🗑️ Удалить у всех</button>
        <button id="ctxReply">↩️ Ответить</button>
    </div>

    <script>
        // =================================================================
        // 0. ПЕРЕМЕННЫЕ И ССЫЛКИ
        // =================================================================
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusEl = document.getElementById('connectionStatus');
        const localLabel = document.getElementById('localLabel');
        const remoteLabel = document.getElementById('remoteLabel');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const voiceBtn = document.getElementById('voiceBtn');
        const videoMsgBtn = document.getElementById('videoMsgBtn');
        const userRadios = document.querySelectorAll('input[name="userChoice"]');
        const zoomSlider = document.getElementById('zoomSlider');
        const zoomValue = document.getElementById('zoomValue');
        const zoomDefaultBtn = document.getElementById('zoomDefaultBtn');
        const lightThemeToggle = document.getElementById('lightThemeToggle');
        const mainWrapper = document.getElementById('mainWrapper');
        const camBtn = document.getElementById('camBtn');
        const micBtn = document.getElementById('micBtn');
        const screenBtn = document.getElementById('screenBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const modal = document.getElementById('userModal');
        const modalKarasik = document.getElementById('modalKarasik');
        const modalKater = document.getElementById('modalKater');
        const navItems = document.querySelectorAll('.nav-item');
        const tabs = { room: document.getElementById('roomTab'), chat: document.getElementById('chatTab'), settings: document.getElementById('settingsTab') };
        const splash = document.getElementById('splash');
        const datetimeEl = document.getElementById('datetime');
        const audioPlayer = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const speedSelect = document.getElementById('speedSelect');
        const closePlayerBtn = document.getElementById('closePlayerBtn');
        const recordingModal = document.getElementById('recordingModal');
        const recPreview = document.getElementById('recPreview');
        const recTimer = document.getElementById('recTimer');
        const recStartBtn = document.getElementById('recStartBtn');
        const flipBtn = document.getElementById('flipBtn');

        // =================================================================
        // 5. КАМЕРА / МИКРОФОН
        // =================================================================
        async function startLocalStream() {
            if (localStream) return localStream;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video:{width:{ideal:640},height:{ideal:480}}, audio:true });
                localStream = stream;
                localVideo.srcObject = stream;
                camBtn.classList.add('active');

        // =================================================================
        // 6. ПОДКЛЮЧЕНИЕ
        // =================================================================
        function initConnection() {
            if (isConnecting) return;
            isConnecting = true;
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer=null; }
            tryConnect();
        }

        function tryConnect() {
            if (peer) { peer.destroy(); peer=null; }
            const uniqueId = ROOM_ID + '-' + Date.now() + '-' + Math.random().toString(36).substr(2,6);
            peer = new Peer(uniqueId, {
                host: '0.peerjs.com',
                port: 443,
                path: '/',
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                        { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
                    ]
                }
            });
            let established = false;
            let timeoutId = setTimeout(() => {
                if (!established) {
                    console.warn('Не удалось подключиться к серверу, пробуем снова...');
                    if (peer) peer.destroy();
                    setTimeout(() => { initConnection(); }, 3000);
                    isConnecting = false;
                }
            }, 8000);

            peer.on('open', (id) => {
                statusEl.textContent = '🟢 Соединение с сервером установлено';
                statusEl.className = 'status online';
                connectToRoom();
            });
            peer.on('error', (err) => {
                console.error('PeerJS Error:', err);
                if (err.type === 'peer-unavailable') {
                    becomeHost();
                } else {
                    statusEl.textContent = '❌ Ошибка: ' + err.message;
                    statusEl.className = 'status offline';
                    isConnecting = false;
                    setTimeout(() => { initConnection(); }, 5000);
                }
            });

            function connectToRoom() {
                const conn = peer.connect(ROOM_ID);
                conn.on('open', () => {
                    established = true;
                    if (timeoutId) clearTimeout(timeoutId);
                    myDataConnection = conn;
                    conn.send({ type: 'chat', text: '👋 Я здесь', sender: myName });
                    flushPendingMessages();
                    conn.on('data', (data) => handleIncomingData(data));
                    conn.on('close', () => {
                        statusEl.textContent = '❌ Отключено';
                        statusEl.className = 'status offline';
                        isConnecting = false;
                        setTimeout(() => { initConnection(); }, 3000);
                    });
                    const call = peer.call(ROOM_ID, localStream);
                    if (call) setupCall(call);
                    statusEl.textContent = '🟢 Подключено к чату';
                    statusEl.className = 'status online';
                    isConnecting = false;
                    isHost = false;
                });
                conn.on('error', (err) => {
                    if (err.type === 'peer-unavailable') {
                        if (timeoutId) clearTimeout(timeoutId);
                        becomeHost();
                    }
                });
            }

            function becomeHost() {
                if (peer) { peer.destroy(); peer=null; }
                peer = new Peer(ROOM_ID, {
                    host: '0.peerjs.com',
                    port: 443,
                    path: '/',
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' },
                            { urls: 'stun:stun2.l.google.com:19302' },
                            { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                            { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
                        ]
                    }
                });
                peer.on('open', (id) => {
                    statusEl.textContent = '🟢 Хост (невидим)';
                    statusEl.className = 'status connected';
                    isHost = true;
                    clients = {};
                    peer.on('connection', (conn) => handleNewClient(conn));
                    peer.on('call', (call) => {
                        if (currentCall) { call.close(); return; }
                        if (!localStream) {
                            startLocalStream().then(() => { if (localStream) { call.answer(localStream); setupCall(call); } });
                        } else {
                            call.answer(localStream);
                            setupCall(call);
                        }
                    });
                    statusEl.textContent = '🟡 Ожидание участников...';
                    isConnecting = false;
                });
                peer.on('error', (err) => {
                    console.error('PeerJS Error (host):', err);
                    statusEl.textContent = '❌ Ошибка хоста: ' + err.message;
                    statusEl.className = 'status offline';
                    isConnecting = false;
                    setTimeout(() => { initConnection(); }, 5000);
                });
            }
        }

        // ---- Обработка клиентов (для хоста) ----
        function handleNewClient(conn) {
            const clientId = conn.peer;
            clients[clientId] = conn;
            conn.on('open', () => {
                chatHistory.forEach(msg => {
                    conn.send({ type:'chat', text:msg.text, sender:msg.sender, time:msg.time, id:msg.id, replyTo:msg.replyTo, reactions:msg.reactions, type:msg.type });
                });
                broadcastChatMessage('🔹 ' + clientId + ' присоединился к чату', 'system');
            });
            conn.on('data', (data) => {
                if (data.type === 'chat') {
                    const msg = { text:data.text, sender:data.sender||clientId, time:new Date().toLocaleTimeString(), id:data.id, replyTo:data.replyTo, reactions:data.reactions, type:data.type };
                    chatHistory.push(msg); localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
                    broadcastChatMessage(msg.text, msg.sender, msg.time, msg.id, msg.replyTo, msg.reactions, msg.type);
                    if (data.id) conn.send({ type:'ack', id:data.id });
                } else if (data.type === 'file') {
                    broadcastFile(data.file, data.name, data.mime, clientId, data.id);
                    if (data.id) conn.send({ type:'ack', id:data.id });
                } else if (data.type === 'voice') {
                    broadcastVoice(data.file, clientId, data.id);
                    if (data.id) conn.send({ type:'ack', id:data.id });
                } else if (data.type === 'videoMsg') {
                    broadcastVideoMsg(data.file, clientId, data.id);
                    if (data.id) conn.send({ type:'ack', id:data.id });
                } else if (data.type === 'reaction') {
                    // Пересылаем реакцию всем
                    Object.values(clients).forEach(c => { if (c.open) c.send({ type:'reaction', msgId:data.msgId, reaction:data.reaction, sender:data.sender }); });
                    updateReaction(data.msgId, data.reaction, data.sender);
                } else if (data.type === 'delete') {
                    Object.values(clients).forEach(c => { if (c.open) c.send({ type:'delete', msgId:data.msgId }); });
                    deleteMessageLocally(data.msgId);
                }
            });
            conn.on('close', () => {
                delete clients[clientId];
                broadcastChatMessage('🔸 ' + clientId + ' покинул чат', 'system');
            });
        }

        // ---- Рассылки ----
        function broadcastChatMessage(text, sender, time, id, replyTo, reactions, type) {
            const timeStr = time || new Date().toLocaleTimeString();
            const msg = { type:'chat', text, sender, time:timeStr, id, replyTo, reactions, type:type||'text' };
            Object.values(clients).forEach(c => { if (c.open) c.send(msg); });
            if (sender !== myName) addChatMessage(text, sender, timeStr, id, replyTo, reactions, type||'text');
        }

        function broadcastFile(file, name, mime, sender, id) {
            Object.values(clients).forEach(c => { if (c.open) c.send({ type:'file', file, name, mime, sender, id }); });
            if (sender !== myName) displayFileMessage(sender, URL.createObjectURL(file), name, mime, false, id);
        }

        function broadcastVoice(file, sender, id) {
            Object.values(clients).forEach(c => { if (c.open) c.send({ type:'voice', file, sender, id }); });
            if (sender !== myName) displayAudioMessage(sender, URL.createObjectURL(file), false, id);
        }

        function broadcastVideoMsg(file, sender, id) {
            Object.values(clients).forEach(c => { if (c.open) c.send({ type:'videoMsg', file, sender, id }); });
            if (sender !== myName) displayVideoMessage(sender, URL.createObjectURL(file), false, id);
        }

        function confirmPending(id) {
            const idx = pendingMessages.findIndex(p => p.id === id);
            if (idx !== -1) {
                const el = document.querySelector(`[data-msg-id="${id}"]`);
                if (el) { const ind = el.querySelector('.pending-indicator'); if (ind) ind.remove(); }
                pendingMessages.splice(idx, 1);
            }
        }

        function handleIncomingData(data) {
            if (data.type === 'ack') { confirmPending(data.id); return; }
            if (data.id && sentIds.has(data.id)) return;
            if (data.type === 'chat') {
                addChatMessage(data.text, data.sender, data.time, data.id, data.replyTo, data.reactions, data.type);
            } else if (data.type === 'file') {
                displayFileMessage(data.sender, URL.createObjectURL(data.file), data.name, data.mime, false, data.id);
            } else if (data.type === 'voice') {
                displayAudioMessage(data.sender, URL.createObjectURL(data.file), false, data.id);
            } else if (data.type === 'videoMsg') {
                displayVideoMessage(data.sender, URL.createObjectURL(data.file), false, data.id);
            } else if (data.type === 'reaction') {
                updateReaction(data.msgId, data.reaction, data.sender);
            } else if (data.type === 'delete') {
                deleteMessageLocally(data.msgId);
            }
        }

        function flushPendingMessages() {
            if (pendingMessages.length === 0) return;
            const copy = [...pendingMessages];
            for (const p of copy) {
                if (p.type === 'chat') sendChatMessageInternal(p.data.text, p.id, true);
                else if (p.type === 'file') sendFileInternal(p.data.file, p.data.name, p.data.mime, p.id, true);
                else if (p.type === 'voice') sendVoiceInternal(p.data.blob, p.id, true);
                else if (p.type === 'videoMsg') sendVideoMsgInternal(p.data.blob, p.id, true);
            }
        }

        // =================================================================
        // 7. ВИДЕО
        // =================================================================
        function setupCall(call) {
            currentCall = call;
            call.on('stream', (stream) => {
                remoteVideo.srcObject = stream;
                isConnected = true;
                statusEl.textContent = '🟢 Видео подключено';
                statusEl.className = 'status online';
            });
            call.on('close', () => {
                remoteVideo.srcObject = null;
                isConnected = false;
                currentCall = null;
                statusEl.textContent = '❌ Видео отключено';
                statusEl.className = 'status offline';
            });
        }

        // =================================================================
        // 8. УПРАВЛЕНИЕ КОМНАТОЙ
        // =================================================================
        camBtn.addEventListener('click', ()=>{
            if (!localStream) return;
            if (isScreenSharing) { stopScreenShare(); setTimeout(()=>toggleCamera(),300); }
            else toggleCamera();
        });
        function toggleCamera() {
            const tracks = localStream.getVideoTracks();
            if (!tracks.length) return;
            const t = tracks[0];
            t.enabled = !t.enabled;
            if (t.enabled) { camBtn.classList.add('active'); camBtn.textContent='📷 Камера'; }
            else { camBtn.classList.remove('active'); camBtn.textContent='📷 Выкл'; }
        }
        micBtn.addEventListener('click', ()=>{
            if (!localStream) return;
            const tracks = localStream.getAudioTracks();
            if (!tracks.length) return;
            const t = tracks[0];
            t.enabled = !t.enabled;
            if (t.enabled) { micBtn.classList.add('active'); micBtn.textContent='🎤 Микрофон'; }
            else { micBtn.classList.remove('active'); micBtn.textContent='🎤 Выкл'; }
        });
        screenBtn.addEventListener('click', async ()=>{
            if (isScreenSharing) stopScreenShare();
            else await startScreenShare();
        });
        async function startScreenShare() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video:true });
                screenStream = stream;
                const vTrack = stream.getVideoTracks()[0];
                const old = localStream.getVideoTracks()[0];
                if (old) { localStream.removeTrack(old); old.stop(); }
                localStream.addTrack(vTrack);
                localVideo.srcObject = localStream;
                if (currentCall) {
                    const sender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) await sender.replaceTrack(vTrack);
                }
                isScreenSharing = true;
                screenBtn.classList.add('active');
                screenBtn.textContent = '🖥️ Остановить';
                camBtn.classList.remove('active');
                camBtn.textContent = '📷 Выкл';
                vTrack.onended = ()=>stopScreenShare();
            } catch(e) { alert('Ошибка доступа к экрану: '+e.message); }
        }
        function stopScreenShare() {
            if (screenStream) { screenStream.getTracks().forEach(t=>t.stop()); screenStream=null; }
            navigator.mediaDevices.getUserMedia({ video:{width:{ideal:640},height:{ideal:480}} })
                .then(camStream => {
                    const newTrack = camStream.getVideoTracks()[0];
                    const old = localStream.getVideoTracks()[0];
                    if (old) { localStream.removeTrack(old); old.stop(); }
                    localStream.addTrack(newTrack);
                    localVideo.srcObject = localStream;
                    if (currentCall) {
                        const sender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                        if (sender) sender.replaceTrack(newTrack);
                    }
                    isScreenSharing = false;
                    screenBtn.classList.remove('active');
                    screenBtn.textContent = '🖥️ Демка';
                    camBtn.classList.add('active');
                    camBtn.textContent = '📷 Камера';
                }).catch(err => console.error('Не удалось вернуть камеру:', err));
        }
        disconnectBtn.addEventListener('click', ()=>{
            if (currentCall) { currentCall.close(); currentCall=null; }
            if (peer) { peer.destroy(); peer=null; }
            remoteVideo.srcObject = null;
            isConnected = false;
            isHost = false;
            clients = {};
            chatHistory = [];
            myDataConnection = null;
            isConnecting = false;
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer=null; }
            statusEl.textContent = '❌ Отключено';
            statusEl.className = 'status offline';
        });

        // =================================================================
        // 9. ЧАТ – ОТОБРАЖЕНИЕ С НОВЫМИ ФИЧАМИ
        // =================================================================
        function addChatMessage(text, sender, time, id, replyTo, reactions, type) {
            const div = document.createElement('div');
            div.className = 'msg';
            const isMe = (sender === myName);
            if (isMe) div.classList.add('me');
            div.dataset.msgId = id;
            div.dataset.sender = sender;

            let replyHtml = '';
            if (replyTo) {
                replyHtml = `<div class="reply-to">↩️ ${replyTo.sender}: ${replyTo.text}</div>`;
            }

            let contentHtml = '';
            if (type === 'videoMsg') {
                contentHtml = `<video class="circle-video" src="${text}" controls></video>`;
            } else if (type === 'voice') {
                contentHtml = `<div class="audio-preview"><button class="play-audio">▶</button><span class="duration">${text}</span></div>`;
            } else {
                contentHtml = `<div class="content">${text}</div>`;
            }

            let reactionsHtml = '';
            if (reactions && Object.keys(reactions).length > 0) {
                reactionsHtml = `<div class="reactions">`;
                for (const [emoji, users] of Object.entries(reactions)) {
                    reactionsHtml += `<span>${emoji} ${users.length}</span>`;
                }
                reactionsHtml += `</div>`;
            }

            div.innerHTML = `
                <div class="sender">${sender} <span class="time">${time || new Date().toLocaleTimeString()}</span></div>
                ${replyHtml}
                ${contentHtml}
                ${reactionsHtml}
            `;

            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Обработчики для аудио
            if (type === 'voice') {
                const btn = div.querySelector('.play-audio');
                const audio = new Audio(text);
                let playing = false;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (playing) { audio.pause(); btn.textContent = '▶'; playing = false; }
                    else { audio.play(); btn.textContent = '⏸'; playing = true; }
                });
                audio.onended = () => { btn.textContent = '▶'; playing = false; };
            }

            // Долгое нажатие (контекстное меню)
            let pressTimer = null;
            div.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => {
                    showContextMenu(e.touches[0].clientX, e.touches[0].clientY, id, sender);
                }, 600);
            });
            div.addEventListener('touchend', () => clearTimeout(pressTimer));
            div.addEventListener('touchmove', () => clearTimeout(pressTimer));
            // Для мыши (ПК)
            div.addEventListener('mousedown', (e) => {
                if (e.button === 2) {
                    showContextMenu(e.clientX, e.clientY, id, sender);
                }
            });

            // Свайп вправо для ответа
            let startX = 0;
            div.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
            });
            div.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].clientX;
                if (endX - startX > 80) {
                    const text = div.querySelector('.content')?.textContent || '[медиа]';
                    setReply(id, sender, text);
                }
            });

            return div;
        }

        // --- Вспомогательные для отображения файлов (с id) ---
        function displayFileMessage(sender, url, name, mime, isMe, id) {
            const div = document.createElement('div');
            div.className = 'msg' + (isMe ? ' me' : '');
            div.dataset.msgId = id;
            div.dataset.sender = sender;
            const time = new Date().toLocaleTimeString();
            let content = '';
            if (mime.startsWith('image/')) content = `<img src="${url}" alt="${name}" onclick="window.open('${url}')" style="max-width:180px;border-radius:10px;"/>`;
            else if (mime.startsWith('video/')) content = `<video controls src="${url}" style="max-width:200px;border-radius:10px;"></video>`;
            else if (mime.startsWith('audio/')) content = `<audio src="${url}" style="max-width:200px;"></audio>`;
            else content = `<span class="file-name">📎 ${name}</span>`;
            div.innerHTML = `<div class="sender">${sender} <span class="time">${time}</span></div>${content}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            // добавить обработчики для долгого нажатия и свайпа (аналогично)
            addMessageInteractions(div, id, sender);
            return div;
        }

        function displayAudioMessage(sender, url, isMe, id) {
            const div = document.createElement('div');
            div.className = 'msg' + (isMe ? ' me' : '');
            div.dataset.msgId = id;
            div.dataset.sender = sender;
            const time = new Date().toLocaleTimeString();
            div.innerHTML = `<div class="sender">${sender} <span class="time">${time}</span></div><audio controls src="${url}" style="max-width:200px;"></audio>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            addMessageInteractions(div, id, sender);
            return div;
        }

        function displayVideoMessage(sender, url, isMe, id) {
            const div = document.createElement('div');
            div.className = 'msg' + (isMe ? ' me' : '');
            div.dataset.msgId = id;
            div.dataset.sender = sender;
            const time = new Date().toLocaleTimeString();
            div.innerHTML = `<div class="sender">${sender} <span class="time">${time}</span></div><video controls src="${url}" style="max-width:200px;border-radius:10px;"></video>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            addMessageInteractions(div, id, sender);
            return div;
        }

        // Общая функция для добавления интеракций (долгое нажатие, свайп)
        function addMessageInteractions(div, id, sender) {
            let pressTimer = null;
            div.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => {
                    showContextMenu(e.touches[0].clientX, e.touches[0].clientY, id, sender);
                }, 600);
            });
            div.addEventListener('touchend', () => clearTimeout(pressTimer));
            div.addEventListener('touchmove', () => clearTimeout(pressTimer));
            div.addEventListener('mousedown', (e) => {
                if (e.button === 2) {
                    showContextMenu(e.clientX, e.clientY, id, sender);
                }
            });
            let startX = 0;
            div.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
            });
            div.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].clientX;
                if (endX - startX > 80) {
                    const text = div.querySelector('.content')?.textContent || '[медиа]';
                    setReply(id, sender, text);
                }
            });
        }

        // =================================================================
        // 10. ОТПРАВКА СООБЩЕНИЙ (текст, файлы, голос, кружки) с реплаями
        // =================================================================
        function sendTextMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            const id = Date.now() + '-' + Math.random().toString(36).substr(2,6);
            sentIds.add(id);
            addChatMessage(text, myName, null, id, replyTo, null, 'text');
            pendingMessages.push({ id, type:'chat', data:{text}, sender:myName, time:new Date().toLocaleTimeString() });
            sendChatMessageInternal(text, id, false, replyTo);
            chatInput.value = '';
            clearReply();
        }

        function sendChatMessageInternal(text, id, isRetry=false, replyToParam=null) {
            const reply = replyToParam || replyTo;
            if (isHost) {
                broadcastChatMessage(text, myName, null, id, reply, null, 'text');
                confirmPending(id);
            } else if (myDataConnection && myDataConnection.open) {
                myDataConnection.send({ type:'chat', text, sender:myName, id, replyTo:reply });
            } else {
                console.warn('Нет соединения, сообщение сохранено в pending');
            }
        }

        // --- Реакции ---
        function updateReaction(msgId, emoji, sender) {
            const msgEl = document.querySelector(`[data-msg-id="${msgId}"]`);
            if (!msgEl) return;
            let reactions = msgEl.dataset.reactions ? JSON.parse(msgEl.dataset.reactions) : {};
            if (!reactions[emoji]) reactions[emoji] = [];
            if (reactions[emoji].includes(sender)) {
                reactions[emoji] = reactions[emoji].filter(u => u !== sender);
                if (reactions[emoji].length === 0) delete reactions[emoji];
            } else {
                reactions[emoji].push(sender);
            }
            msgEl.dataset.reactions = JSON.stringify(reactions);
            // Обновить отображение
            const reactionsDiv = msgEl.querySelector('.reactions');
            if (reactionsDiv) {
                reactionsDiv.innerHTML = '';
                for (const [emoji, users] of Object.entries(reactions)) {
                    const span = document.createElement('span');
                    span.textContent = `${emoji} ${users.length}`;
                    reactionsDiv.appendChild(span);
                }
            } else {
                const newDiv = document.createElement('div');
                newDiv.className = 'reactions';
                for (const [emoji, users] of Object.entries(reactions)) {
                    const span = document.createElement('span');
                    span.textContent = `${emoji} ${users.length}`;
                    newDiv.appendChild(span);
                }
                msgEl.appendChild(newDiv);
            }
        }

        function deleteMessageLocally(msgId) {
            const el = document.querySelector(`[data-msg-id="${msgId}"]`);
            if (el) el.remove();
        }

        // --- Ответ (реплай) ---
        function setReply(id, sender, text) {
            replyTo = { id, sender, text };
            replyIndicator.style.display = 'flex';
            replyText.textContent = `${sender}: ${text}`;
        }

        function clearReply() {
            replyTo = null;
            replyIndicator.style.display = 'none';
        }
        cancelReply.addEventListener('click', clearReply);

        // --- Контекстное меню ---
        function showContextMenu(x, y, msgId, sender) {
            selectedMsgId = msgId;
            contextMenu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
            contextMenu.style.top = Math.min(y, window.innerHeight - 120) + 'px';
            contextMenu.classList.add('active');
            ctxDelete.style.display = (sender === myName) ? 'block' : 'none';
        }
        document.addEventListener('click', () => contextMenu.classList.remove('active'));
        document.addEventListener('contextmenu', (e) => {
            if (!e.target.closest('.msg')) contextMenu.classList.remove('active');
        });

        // Реакции из контекстного меню
        document.querySelectorAll('[data-reaction]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const emoji = el.dataset.reaction;
                if (selectedMsgId) {
                    if (isHost) {
                        Object.values(clients).forEach(c => { if (c.open) c.send({ type:'reaction', msgId:selectedMsgId, reaction:emoji, sender:myName }); });
                        updateReaction(selectedMsgId, emoji, myName);
                    } else if (myDataConnection && myDataConnection.open) {
                        myDataConnection.send({ type:'reaction', msgId:selectedMsgId, reaction:emoji, sender:myName });
                    }
                    contextMenu.classList.remove('active');
                }
            });
        });

        ctxDelete.addEventListener('click', (e) => {
            e.stopPropagation();
            if (selectedMsgId) {
                if (isHost) {
                    Object.values(clients).forEach(c => { if (c.open) c.send({ type:'delete', msgId:selectedMsgId }); });
                    deleteMessageLocally(selectedMsgId);
                } else if (myDataConnection && myDataConnection.open) {
                    myDataConnection.send({ type:'delete', msgId:selectedMsgId });
                }
                contextMenu.classList.remove('active');
            }
        });

        ctxReply.addEventListener('click', (e) => {
            e.stopPropagation();
            if (selectedMsgId) {
                const el = document.querySelector(`[data-msg-id="${selectedMsgId}"]`);
                if (el) {
                    const sender = el.dataset.sender;
                    const content = el.querySelector('.content')?.textContent || '[медиа]';
                    setReply(selectedMsgId, sender, content);
                }
                contextMenu.classList.remove('active');
            }
        });

        // =================================================================
        // 11. КРУЖКИ
        // =================================================================
        videoMsgBtn.addEventListener('click', () => {
            if (isRecording) return;
            openRecorder();
        });

        async function openRecorder() {
            try {
                const constraints = {
                    video: { facingMode: facingMode, width: { ideal: 320 }, height: { ideal: 320 } },
                    audio: true
                };
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                recStream = mediaStream;
                recPreview.srcObject = mediaStream;
                recordingModal.classList.add('active');
                recTimer.textContent = '0:00';
                recSeconds = 0;
                recordedChunks = [];
                isRecording = false;
                recStartBtn.textContent = '●';
                recStartBtn.classList.remove('recording');
                if (flashActive && facingMode === 'environment') {
                    const track = mediaStream.getVideoTracks()[0];
                    if (track) {
                        try { await track.applyConstraints({ advanced: [{ torch: true }] }); } catch(e) {}
                    }
                }
            } catch(e) { alert('Ошибка доступа к камере: '+e.message); }
        }

        recStartBtn.addEventListener('click', () => {
            if (!recStream) return;
            if (isRecording) {
                if (recorder) {
                    recorder.stop();
                    isRecording = false;
                    recStartBtn.textContent = '●';
                    recStartBtn.classList.remove('recording');
                    if (recTimerInterval) clearInterval(recTimerInterval);
                }
            } else {
                recordedChunks = [];
                recorder = new MediaRecorder(recStream);
                recorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                recorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    const id = Date.now() + '-' + Math.random().toString(36).substr(2,6);
                    sentIds.add(id);
                    const url = URL.createObjectURL(blob);
                    addChatMessage(url, myName, null, id, null, null, 'videoMsg');
                    pendingMessages.push({ id, type:'videoMsg', data:{blob}, sender:myName, time:new Date().toLocaleTimeString() });
                    sendVideoMsgInternal(blob, id);
                    closeRecorder();
                };
                recorder.start(100);
                isRecording = true;
                recStartBtn.textContent = '⏹';
                recStartBtn.classList.add('recording');
                recSeconds = 0;
                recTimerInterval = setInterval(() => {
                    recSeconds++;
                    const mins = Math.floor(recSeconds / 60);
                    const secs = recSeconds % 60;
                    recTimer.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                    if (recSeconds >= 60) {
                        if (recorder && recorder.state !== 'inactive') {
                            recorder.stop();
                            isRecording = false;
                            recStartBtn.textContent = '●';
                            recStartBtn.classList.remove('recording');
                            if (recTimerInterval) clearInterval(recTimerInterval);
                        }
                    }
                }, 1000);
            }
        });

        flipBtn.addEventListener('click', () => {
            facingMode = (facingMode === 'user') ? 'environment' : 'user';
            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                openRecorder();
            }
        });

        flashBtn.addEventListener('click', () => {
            flashActive = !flashActive;
            if (flashActive && facingMode === 'environment') {
                const track = mediaStream?.getVideoTracks()[0];
                if (track) {
                    try { track.applyConstraints({ advanced: [{ torch: true }] }); } catch(e) {}
                }
            } else {
                const track = mediaStream?.getVideoTracks()[0];
                if (track) {
                    try { track.applyConstraints({ advanced: [{ torch: false }] }); } catch(e) {}
                }
            }
            flashBtn.style.opacity = flashActive ? '1' : '0.5';
        });

        closeRecBtn.addEventListener('click', closeRecorder);
        function closeRecorder() {
            if (recorder && recorder.state !== 'inactive') recorder.stop();
            if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
            if (recTimerInterval) clearInterval(recTimerInterval);
            recordingModal.classList.remove('active');
            isRecording = false;
            recStartBtn.textContent = '●';
            recStartBtn.classList.remove('recording');
        }

        // =================================================================
        // 12. ГОЛОСОВЫЕ
        // =================================================================
        let voiceRecorder = null, voiceChunks = [], isRecordingVoice = false, waveElement = null;

        voiceBtn.addEventListener('click', () => {
            if (isRecordingVoice) {
                stopVoiceRecording();
                return;
            }
            startVoiceRecording();
        });

        async function startVoiceRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
                voiceRecorder = new MediaRecorder(stream);
                voiceChunks = [];
                voiceRecorder.ondataavailable = (e) => { if (e.data.size>0) voiceChunks.push(e.data); };
                voiceRecorder.onstop = () => {
                    const blob = new Blob(voiceChunks, { type:'audio/ogg' });
                    voiceChunks = [];
                    const id = Date.now() + '-' + Math.random().toString(36).substr(2,6);
                    sentIds.add(id);
                    const url = URL.createObjectURL(blob);
                    const duration = Math.round(blob.size / 16000);
                    const durationStr = `${Math.floor(duration/60)}:${(duration%60).toString().padStart(2,'0')}`;
                    addChatMessage(durationStr, myName, null, id, null, null, 'voice');
                    pendingMessages.push({ id, type:'voice', data:{blob}, sender:myName, time:new Date().toLocaleTimeString() });
                    sendVoiceInternal(blob, id);
                    stream.getTracks().forEach(t=>t.stop());
                    if (waveElement) { waveElement.remove(); waveElement=null; }
                    voiceBtn.textContent = '🎙️';
                    voiceBtn.classList.remove('recording');
                };
                voiceRecorder.start();
                isRecordingVoice = true;
                voiceBtn.textContent = '⏹️';
                voiceBtn.classList.add('recording');
                if (!waveElement) {
                    waveElement = document.createElement('div');
                    waveElement.className = 'voice-wave';
                    for (let i=0; i<7; i++) { const s=document.createElement('span'); waveElement.appendChild(s); }
                    voiceBtn.parentNode.insertBefore(waveElement, voiceBtn.nextSibling);
                }
            } catch(e) { alert('Ошибка доступа к микрофону для записи: '+e.message); }
        }

        function stopVoiceRecording() {
            if (voiceRecorder && voiceRecorder.state !== 'inactive') {
                voiceRecorder.stop();
                isRecordingVoice = false;
            }
        }

        function sendVoiceInternal(blob, id, isRetry=false) {
            if (isHost) {
                broadcastVoice(blob, myName, id);
                confirmPending(id);
            } else if (myDataConnection && myDataConnection.open) {
                myDataConnection.send({ type:'voice', file:blob, sender:myName, id });
            } else {
                console.warn('Нет соединения, голосовое сохранено в pending');
            }
        }

        // =================================================================
        // 13. ОТПРАВКА КРУЖКОВ
        // =================================================================
        function sendVideoMsgInternal(blob, id, isRetry=false) {
            if (isHost) {
                broadcastVideoMsg(blob, myName, id);
                confirmPending(id);
            } else if (myDataConnection && myDataConnection.open) {
                myDataConnection.send({ type:'videoMsg', file:blob, sender:myName, id });
            } else {
                console.warn('Нет соединения, кружок сохранён в pending');
            }
        }

        // =================================================================
        // 14. НАВИГАЦИЯ
        // =================================================================
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                const tab = item.dataset.tab;
                navItems.forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                Object.keys(tabs).forEach(key => tabs[key].classList.toggle('active', key === tab));
            });
        });

        // =================================================================
        // 15. АУДИО-ПЛЕЕР
        // =================================================================
        function openAudioPlayer(audioElement) {
            currentAudio = audioElement;
            playPauseBtn.textContent = audioElement.paused ? '▶' : '⏸';
            volumeSlider.value = audioElement.volume;
            speedSelect.value = audioElement.playbackRate;
            audioPlayer.classList.add('show');
        }

        playPauseBtn.addEventListener('click', () => {
            if (!currentAudio) return;
            if (currentAudio.paused) {
                currentAudio.play();
                playPauseBtn.textContent = '⏸';
            } else {
                currentAudio.pause();
                playPauseBtn.textContent = '▶';
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            if (!currentAudio) return;
            currentAudio.volume = parseFloat(e.target.value);
        });

        speedSelect.addEventListener('change', (e) => {
            if (!currentAudio) return;
            currentAudio.playbackRate = parseFloat(e.target.value);
        });

        closePlayerBtn.addEventListener('click', () => {
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            audioPlayer.classList.remove('show');
        });

        document.addEventListener('ended', (e) => {
            if (e.target === currentAudio) playPauseBtn.textContent = '▶';
        }, true);

        // =================================================================
        // 16. ИНИЦИАЛИЗАЦИЯ
        // =================================================================
        function init() {
            if (!localStorage.getItem('userChoice')) {
                showModal();
            } else {
                loadSettings();
                startLocalStream().then(() => {
                    if (localStream) initConnection();
                    else initConnection();
                });
            }
            loadSettings();
            statusEl.textContent = '❌ Не подключено';
            statusEl.className = 'status offline';
        }

        window.addEventListener('beforeunload', () => {
            if (localStream) localStream.getTracks().forEach(t=>t.stop());
            if (screenStream) screenStream.getTracks().forEach(t=>t.stop());
            if (peer) peer.destroy();
            if (voiceRecorder && voiceRecorder.state !== 'inactive') voiceRecorder.stop();
            if (recorder && recorder.state !== 'inactive') recorder.stop();
            if (reconnectTimer) clearTimeout(reconnectTimer);
        });

        init();
        console.log('манго арбузник – все фичи работают!');
    </script>
</body>
</html>
