<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>манго арбузник</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <h1>манго арбузник</h1>
    <div id="chat"></div>
    <input id="msg" placeholder="Сообщение...">
    <button onclick="send()">Отправить</button>
    <button id="voiceBtn">🎙️ Записать голосовое</button>
    <button id="videoBtn">🎥 Кружок</button>
    <div id="status"></div>

    <script>
        // ПРОСТЕЙШИЙ РАБОЧИЙ ЧАТ + ГОЛОСОВЫЕ
        const ROOM = 'mango_chat';
        let myName = prompt('Ты Карасик или Катер?') || 'Карасик';
        let peer = null;
        let conn = null;
        let call = null;
        let localStream = null;

        // Подключение
        function connect() {
            const id = ROOM + '-' + Date.now();
            peer = new Peer(id, { host: '0.peerjs.com', port: 443, path: '/' });
            
            peer.on('open', () => {
                document.getElementById('status').textContent = '🟢 Подключено';
                // Пытаемся соединиться с хостом
                conn = peer.connect(ROOM);
                conn.on('open', () => {
                    document.getElementById('status').textContent = '🟢 Чат подключен';
                });
                conn.on('data', (data) => {
                    if (data.type === 'text') {
                        addMessage(data.sender + ': ' + data.text);
                    } else if (data.type === 'voice') {
                        const audio = document.createElement('audio');
                        audio.controls = true;
                        audio.src = URL.createObjectURL(new Blob([data.data]));
                        document.getElementById('chat').appendChild(audio);
                    }
                });
                // Если комнаты нет - становимся хостом
                setTimeout(() => {
                    if (!conn.open) {
                        becomeHost();
                    }
                }, 3000);
            });
        }

        function becomeHost() {
            peer.destroy();
            peer = new Peer(ROOM, { host: '0.peerjs.com', port: 443, path: '/' });
            peer.on('connection', (c) => {
                conn = c;
                conn.on('data', (data) => {
                    if (data.type === 'text') {
                        addMessage(data.sender + ': ' + data.text);
                    } else if (data.type === 'voice') {
                        const audio = document.createElement('audio');
                        audio.controls = true;
                        audio.src = URL.createObjectURL(new Blob([data.data]));
                        document.getElementById('chat').appendChild(audio);
                    }
                });
                document.getElementById('status').textContent = '🟢 Хост (чат работает)';
            });
        }

        function addMessage(text) {
            const div = document.createElement('div');
            div.textContent = text;
            document.getElementById('chat').appendChild(div);
        }

        function send() {
            const text = document.getElementById('msg').value;
            if (!text || !conn) return;
            conn.send({ type: 'text', text, sender: myName });
            addMessage('Я: ' + text);
            document.getElementById('msg').value = '';
        }

        // Голосовые
        let recorder = null;
        let chunks = [];

        document.getElementById('voiceBtn').onclick = () => {
            if (recorder && recorder.state === 'recording') {
                recorder.stop();
                document.getElementById('voiceBtn').textContent = '🎙️ Записать голосовое';
                return;
            }
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                recorder = new MediaRecorder(stream);
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/ogg' });
                    if (conn) {
                        conn.send({ type: 'voice', data: blob, sender: myName });
                    }
                    const audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = URL.createObjectURL(blob);
                    document.getElementById('chat').appendChild(audio);
                };
                recorder.start();
                document.getElementById('voiceBtn').textContent = '⏹️ Остановить';
            });
        };

        // Кружки (упрощённо)
        document.getElementById('videoBtn').onclick = () => {
            alert('Кружки пока в разработке, но голосовые работают!');
        };

        connect();
    </script>
</body>
</html>
