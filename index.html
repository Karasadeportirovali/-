<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>арбузник</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* ===== ВСЕ СТИЛИ (те же, что в предыдущей версии) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --bg2: #141414; --bg3: #1c1c1c; --bg4: #252525; --bg5: #2e2e2e;
            --br: #3a3a3a; --txt: #f0f0f0; --txt2: #b0b0b0; --txt3: #777;
            --ac: #d0d0d0; --ach: #aaa; --sh: 0 2px 10px rgba(0,0,0,.6);
            --msg-other-bg: #1a2a3a; --chat-bg: #0a0a0a;
            --msg-bg-me: #2e2e2e; --msg-bg-other: #1a2a3a;
            --menu-bg: #1a1a1a; --menu-border: #2a2a2a; --menu-text: #ddd;
            --menu-hover: #2a2a2a; --menu-active: #333;
        }
        .light {
            --bg: #f5f5f5; --bg2: #e8e8e8; --bg3: #d8d8d8; --bg4: #d0d0d0; --bg5: #c0c0c0;
            --br: #b0b0b0; --txt: #1a1a1a; --txt2: #444; --txt3: #777;
            --ac: #222; --ach: #555; --sh: 0 2px 10px rgba(0,0,0,.15);
            --msg-other-bg: #fff8e7; --chat-bg: #f5f5f5;
            --msg-bg-me: #fff8e7; --msg-bg-other: #fff8e7;
            --menu-bg: #f0f0f0; --menu-border: #ddd; --menu-text: #222;
            --menu-hover: #e0e0e0; --menu-active: #d0d0d0;
        }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* ===== МЕНЮ ===== */
        .menu-btn {
            position: fixed; top:12px; left:12px; z-index:100; background:var(--bg2); border:1px solid var(--br); border-radius:50%;
            width:44px; height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--txt); transition:.2s; box-shadow:var(--sh);
        }
        .menu-btn:hover { background:var(--bg3); }
        .menu-btn svg { width:24px; height:24px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .menu-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:99; display:none; backdrop-filter:blur(2px); }
        .menu-overlay.active { display:block; }
        .side-menu {
            position:fixed; top:0; left:-280px; width:280px; height:100%; background:var(--menu-bg); border-right:1px solid var(--menu-border); z-index:100;
            transition:left 0.3s cubic-bezier(0.4,0,0.2,1); padding:80px 20px 20px 20px; display:flex; flex-direction:column; gap:2px; box-shadow:var(--sh);
        }
        .side-menu.open { left:0; }
        .side-menu .logo { font-size:18px; font-weight:600; color:var(--menu-text); letter-spacing:1px; padding:0 0 20px 0; border-bottom:1px solid var(--menu-border); margin-bottom:12px; }
        .side-menu .menu-item {
            padding:10px 12px; border-radius:6px; font-size:15px; display:flex; align-items:center; gap:12px; color:var(--txt2); cursor:pointer; transition:.15s;
            border:none; background:transparent; width:100%; text-align:left; font-weight:400;
            position:relative;
        }
        .side-menu .menu-item:hover { background:var(--menu-hover); color:var(--txt); }
        .side-menu .menu-item.active { background:var(--menu-active); color:var(--txt); font-weight:500; }
        .side-menu .menu-item .icon { font-size:18px; width:24px; text-align:center; color:var(--txt2); }
        .side-menu .menu-item .badge {
            position:absolute; right:16px; top:50%; transform:translateY(-50%);
            background:#f44; color:#fff; font-size:11px; font-weight:600;
            border-radius:50%; min-width:20px; height:20px; display:flex; align-items:center; justify-content:center;
            padding:0 4px; display:none;
        }
        .side-menu .menu-item .badge.show { display:flex; }
        .side-menu .status-indicator {
            display:flex; align-items:center; gap:8px; padding:12px 12px 0 12px; font-size:13px; color:var(--txt2); margin-top:auto;
            border-top:1px solid var(--menu-border); padding-top:16px;
        }
        .side-menu .status-indicator .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
        .side-menu .status-indicator .dot.online { background:#5a5; }
        .side-menu .status-indicator .dot.offline { background:#a55; }
        .side-menu .version-info { text-align:center; font-size:12px; color:var(--txt3); padding:12px 0 4px 0; border-top:1px solid var(--menu-border); margin-top:8px; }

        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        .main { flex:1; display:flex; flex-direction:column; background:var(--bg); min-width:0; transition:transform .15s, background .2s; transform-origin:top left; position:relative; }
        .topbar {
            display:flex; align-items:center; justify-content:space-between; padding:6px 12px 6px 64px; background:var(--bg2); border-bottom:1px solid var(--br); flex-shrink:0; flex-wrap:wrap; gap:4px; min-height:52px;
            position:relative;
        }
        .topbar .title { font-size:16px; font-weight:700; color:var(--ac); letter-spacing:1px; }
        .topbar .datetime { font-size:11px; color:var(--txt2); background:var(--bg3); padding:2px 10px; border-radius:20px; border:1px solid var(--br); white-space:nowrap; }
        .topbar .more-btn {
            background:transparent; border:1px solid var(--br); border-radius:50%; width:32px; height:32px;
            display:flex; align-items:center; justify-content:center; color:var(--txt2); cursor:pointer; font-size:18px;
            transition:.2s;
        }
        .topbar .more-btn:hover { background:var(--bg3); color:var(--txt); }
        .topbar .more-menu {
            display:none; position:absolute; right:12px; top:48px; background:var(--bg2); border:1px solid var(--br); border-radius:12px;
            padding:4px 0; min-width:160px; box-shadow:var(--sh); z-index:200;
        }
        .topbar .more-menu.active { display:block; }
        .topbar .more-menu button {
            display:block; width:100%; padding:8px 16px; background:transparent; border:none; color:var(--txt);
            text-align:left; font-size:13px; cursor:pointer; transition:.15s;
        }
        .topbar .more-menu button:hover { background:var(--bg3); }

        .content { flex:1; display:flex; overflow:hidden; position:relative; }
        .tab { display:none; width:100%; height:100%; flex-direction:column; padding:0; overflow-y:auto; }
        .tab.active { display:flex; }

        /* ===== ЭКРАН ВХОДА ===== */
        .login-screen {
            position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:9999;
            display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;
        }
        .login-screen.hidden { display:none; }
        .login-screen .box {
            background:var(--bg2); padding:30px; border-radius:24px; max-width:360px; width:90%;
            border:1px solid var(--br); box-shadow:var(--sh);
        }
        .login-screen .box h2 { color:var(--ac); margin-bottom:16px; text-align:center; }
        .login-screen .box input {
            width:100%; padding:10px 14px; margin-bottom:12px; border-radius:40px; border:1px solid var(--br);
            background:var(--bg3); color:var(--txt); outline:none; font-size:15px;
        }
        .login-screen .box input:focus { border-color:var(--ac); }
        .login-screen .box .btn {
            width:100%; padding:10px; border-radius:40px; border:none; background:#4a6d8a; color:#fff;
            font-size:16px; font-weight:600; cursor:pointer; transition:.15s;
        }
        .login-screen .box .btn:hover { background:#5a8aaa; }
        .login-screen .box .toggle-link { color:var(--txt2); font-size:14px; text-align:center; margin-top:12px; cursor:pointer; }
        .login-screen .box .toggle-link:hover { color:var(--txt); }

        /* ===== СПИСОК ЧАТОВ ===== */
        .chat-list {
            flex:1; overflow-y:auto; padding:12px;
        }
        .chat-list .chat-item {
            display:flex; align-items:center; padding:12px 16px; background:var(--bg3); border-radius:12px;
            margin-bottom:8px; cursor:pointer; border:1px solid var(--br); transition:.1s;
        }
        .chat-list .chat-item:hover { background:var(--bg4); }
        .chat-list .chat-item .name { flex:1; font-weight:500; }
        .chat-list .chat-item .last-msg { color:var(--txt3); font-size:13px; }
        .chat-list .chat-item .time { font-size:11px; color:var(--txt3); margin-left:8px; }
        .fab {
            position:fixed; bottom:20px; right:20px; background:#4a6d8a; border:none; border-radius:50%;
            width:56px; height:56px; display:flex; align-items:center; justify-content:center;
            font-size:28px; color:#fff; box-shadow:var(--sh); cursor:pointer; z-index:50;
        }
        .fab:hover { background:#5a8aaa; }

        /* ===== ОКНО ЧАТА ===== */
        .chat-window {
            display:none; flex-direction:column; height:100%; width:100%;
            position:absolute; top:0; left:0; background:var(--bg); z-index:60;
        }
        .chat-window.active { display:flex; }
        .chat-window .header {
            display:flex; align-items:center; padding:8px 16px; background:var(--bg2); border-bottom:1px solid var(--br);
        }
        .chat-window .header .back { font-size:24px; cursor:pointer; color:var(--txt2); margin-right:12px; }
        .chat-window .header .title { flex:1; font-weight:600; }
        .chat-window .chat-messages {
            flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:4px;
            scrollbar-width:none; -ms-overflow-style:none;
        }
        .chat-window .chat-messages::-webkit-scrollbar { display:none; }
        .chat-window .input-area {
            display:flex; gap:8px; padding:8px; background:var(--bg2); border-top:1px solid var(--br);
        }
        .chat-window .input-area input { flex:1; padding:8px 14px; border-radius:40px; border:1px solid var(--br); background:var(--bg3); color:var(--txt); outline:none; }
        .chat-window .input-area button { padding:8px 16px; border-radius:40px; border:none; background:#4a6d8a; color:#fff; cursor:pointer; }

        /* ===== ВИДЕО КОМНАТА ===== */
        .video-grid {
            display:grid; grid-template-columns:1fr 1fr; gap:10px; flex:1; min-height:0; margin-bottom:10px; padding:12px;
        }
        @media(max-width:700px){ .video-grid { grid-template-columns:1fr; } }
        .video-card {
            background:var(--bg3); border-radius:16px; overflow:hidden; position:relative; display:flex; align-items:center; justify-content:center;
            border:1px solid var(--br); cursor:pointer; min-height:120px;
        }
        .video-card video { width:100%; height:100%; object-fit:cover; background:#000; transform:scaleX(-1); }
        .video-card .camera-placeholder {
            position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center;
            font-size:48px; color:#888; background:var(--bg3); pointer-events:none; transition: opacity 0.3s;
        }
        .video-card .camera-placeholder.hidden { opacity:0; }
        .video-card .label {
            position:absolute; bottom:8px; left:8px; background:rgba(0,0,0,.6); padding:2px 12px; border-radius:20px;
            font-size:12px; color:#ccc; backdrop-filter:blur(4px); border:1px solid var(--br); z-index:2;
        }
        .controls-room {
            display:flex; justify-content:center; gap:8px; flex-shrink:0; padding:6px 0 12px; flex-wrap:wrap;
        }
        .controls-room button {
            background:var(--bg3); border:1px solid var(--br); padding:6px 14px; border-radius:40px; color:var(--txt); font-size:13px;
            cursor:pointer; transition:.15s; display:flex; align-items:center; gap:4px;
        }
        .controls-room button:hover { background:var(--br); }
        .controls-room .active { background:var(--ac); color:var(--bg); border-color:var(--ac); }
        .controls-room .danger { background:#a55; color:#fff; border-color:#a55; }

        .splash {
            position:fixed; top:0; left:0; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; z-index:10000;
            color:#fff; font-size:30px; font-weight:900; letter-spacing:4px; transition:opacity .5s;
        }
        .splash.hidden { opacity:0; pointer-events:none; }

        @media(max-width:700px){
            .side-menu { width:240px; left:-240px; }
            .topbar { padding:6px 12px 6px 56px; }
            .menu-btn { width:38px; height:38px; font-size:18px; }
        }
        ::-webkit-scrollbar { width:3px; }
        ::-webkit-scrollbar-track { background:var(--bg2); }
        ::-webkit-scrollbar-thumb { background:var(--scr); border-radius:10px; }
    </style>
</head>
<body>
    <!-- Splash -->
    <div class="splash" id="splash">арбузник</div>

    <!-- ЭКРАН ВХОДА/РЕГИСТРАЦИИ -->
    <div class="login-screen" id="loginScreen">
        <div class="box">
            <h2 id="loginTitle">Вход</h2>
            <input type="text" id="loginUsername" placeholder="Ник" />
            <input type="password" id="loginPassword" placeholder="Пароль" />
            <button class="btn" id="loginBtn">Войти</button>
            <div class="toggle-link" id="toggleLoginLink">Нет аккаунта? Зарегистрируйся</div>
        </div>
    </div>

    <!-- Меню -->
    <button class="menu-btn" id="menuBtn">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="side-menu" id="sideMenu">
        <div class="logo">арбузник</div>
        <button class="menu-item active" data-tab="chats"><span class="icon">💬</span> Чаты</button>
        <button class="menu-item" data-tab="room"><span class="icon">📹</span> Комната</button>
        <button class="menu-item" data-tab="settings"><span class="icon">⚙</span> Настройки</button>
        <button class="menu-item" id="logoutBtn"><span class="icon">🚪</span> Выйти</button>
        <div class="status-indicator">
            <span class="dot online" id="menuStatusDot"></span>
            <span id="menuStatusText">Подключено</span>
        </div>
        <div class="version-info">v.6.3 (email/пароль)</div>
    </div>

    <!-- ОСНОВНОЙ БЛОК -->
    <div class="main" id="mainWrapper" style="display:none;">
        <div class="topbar">
            <div class="title">арбузник</div>
            <div class="datetime" id="datetime"></div>
            <button class="more-btn" id="moreBtn">⋮</button>
            <div class="more-menu" id="moreMenu">
                <button id="moreClearHistory">🗑️ Очистить историю</button>
            </div>
        </div>
        <div class="content">
            <!-- Чаты -->
            <div class="tab active" id="chatsTab">
                <div class="chat-list" id="chatList"></div>
                <button class="fab" id="createChatBtn">✏️</button>
            </div>
            <!-- Комната -->
            <div class="tab" id="roomTab">
                <div class="room-tab" style="display:flex;flex-direction:column;height:100%">
                    <div class="video-grid" id="videoGrid">
                        <div class="video-card" id="localVideoCard">
                            <video id="localVideo" autoplay muted playsinline></video>
                            <div class="camera-placeholder" id="localPlaceholder">📷</div>
                            <span class="label" id="localLabel">Ты</span>
                        </div>
                        <div class="video-card" id="remoteVideoCard">
                            <video id="remoteVideo" autoplay playsinline></video>
                            <div class="camera-placeholder" id="remotePlaceholder">📷</div>
                            <span class="label remote" id="remoteLabel">Собеседник</span>
                        </div>
                    </div>
                    <div class="controls-room">
                        <button id="camBtn">📷 Камера</button>
                        <button id="micBtn">🎤 Микрофон</button>
                        <button id="screenBtn">🖥️ Демка</button>
                        <button class="danger" id="disconnectBtn">🚪 Выйти</button>
                    </div>
                </div>
            </div>
            <!-- Настройки -->
            <div class="tab" id="settingsTab">
                <div class="settings-tab" style="padding:16px; max-width:400px; width:100%;">
                    <div class="setting-group">
                        <label>Масштаб</label>
                        <div class="zoom-row">
                            <input type="range" id="zoomSlider" min="50" max="200" value="100">
                            <span class="zoom-value" id="zoomValue">100%</span>
                            <button class="btn-default" id="zoomDefaultBtn">По умолчанию</button>
                        </div>
                    </div>
                    <div class="setting-group">
                        <label>Светлая тема</label>
                        <div class="theme-toggle">
                            <input type="checkbox" id="lightThemeToggle">
                            <span>Включить</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Окно чата -->
    <div class="chat-window" id="chatWindow">
        <div class="header">
            <span class="back" id="chatBack">←</span>
            <span class="title" id="chatTitle">Чат</span>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="input-area">
            <input type="text" id="chatInput" placeholder="Сообщение..." />
            <button id="chatSendBtn">➤</button>
        </div>
    </div>

    <!-- Модалка создания чата -->
    <div class="modal-overlay" id="createChatModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center; backdrop-filter:blur(4px);">
        <div style="background:var(--bg2); padding:24px; border-radius:20px; max-width:360px; width:90%; border:1px solid var(--br);">
            <h3 style="color:var(--txt); margin-bottom:12px;">Новый чат</h3>
            <input type="text" id="searchUserInput" placeholder="Поиск по нику..." style="width:100%; padding:10px 14px; border-radius:40px; border:1px solid var(--br); background:var(--bg3); color:var(--txt); outline:none; margin-bottom:12px;" />
            <div id="userSearchResults" style="max-height:200px; overflow-y:auto; margin-bottom:12px;"></div>
            <button class="btn" id="createChatConfirm" style="width:100%; padding:10px; border-radius:40px; border:none; background:#4a6d8a; color:#fff; font-weight:600; cursor:pointer;">Создать чат</button>
            <button class="btn secondary" id="createChatCancel" style="width:100%; padding:10px; border-radius:40px; border:1px solid var(--br); background:transparent; color:var(--txt); cursor:pointer; margin-top:8px;">Отмена</button>
        </div>
    </div>

    <script>
        // ============================================================
        // 0. FIREBASE КОНФИГ
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBfbqC_V6CccqDjr2cTvbjy-__PdHVG-uQ",
            authDomain: "arbuzznik-7a21d.firebaseapp.com",
            databaseURL: "https://arbuzznik-7a21d-default-rtdb.firebaseio.com",
            projectId: "arbuzznik-7a21d",
            storageBucket: "arbuzznik-7a21d.firebasestorage.app",
            messagingSenderId: "326639264651",
            appId: "1:326639264651:web:a93d929a767bc4e625458e",
            measurementId: "G-9GFCCMYN8N"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // ============================================================
        // 1. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================================
        let currentUser = null; // { uid, username }
        let currentChatId = null;
        let chatListeners = [];
        let isLoginMode = true;

        // ============================================================
        // 2. DOM-ЭЛЕМЕНТЫ
        // ============================================================
        const loginScreen = document.getElementById('loginScreen');
        const loginUsername = document.getElementById('loginUsername');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const toggleLoginLink = document.getElementById('toggleLoginLink');
        const loginTitle = document.getElementById('loginTitle');
        const mainWrapper = document.getElementById('mainWrapper');
        const chatListEl = document.getElementById('chatList');
        const chatWindow = document.getElementById('chatWindow');
        const chatMessagesEl = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const chatTitle = document.getElementById('chatTitle');
        const chatBack = document.getElementById('chatBack');
        const createChatBtn = document.getElementById('createChatBtn');
        const createChatModal = document.getElementById('createChatModal');
        const searchUserInput = document.getElementById('searchUserInput');
        const userSearchResults = document.getElementById('userSearchResults');
        const createChatConfirm = document.getElementById('createChatConfirm');
        const createChatCancel = document.getElementById('createChatCancel');
        const logoutBtn = document.getElementById('logoutBtn');
        const menuBtn = document.getElementById('menuBtn');
        const menuOverlay = document.getElementById('menuOverlay');
        const sideMenu = document.getElementById('sideMenu');
        const menuItems = document.querySelectorAll('.menu-item');
        const tabs = {
            chats: document.getElementById('chatsTab'),
            room: document.getElementById('roomTab'),
            settings: document.getElementById('settingsTab'),
        };

        // ============================================================
        // 3. ПЕРЕКЛЮЧЕНИЕ РЕЖИМА
        // ============================================================
        function toggleLoginMode() {
            isLoginMode = !isLoginMode;
            loginTitle.textContent = isLoginMode ? 'Вход' : 'Регистрация';
            loginBtn.textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться';
            toggleLoginLink.textContent = isLoginMode ? 'Нет аккаунта? Зарегистрируйся' : 'Уже есть аккаунт? Войти';
        }
        toggleLoginLink.addEventListener('click', toggleLoginMode);

        // ============================================================
        // 4. ОБРАБОТЧИК КНОПКИ (ВХОД / РЕГИСТРАЦИЯ) – EMAIL + ПАРОЛЬ
        // ============================================================
        loginBtn.addEventListener('click', async () => {
            const username = loginUsername.value.trim();
            const password = loginPassword.value.trim();
            if (!username || !password) {
                alert('Заполните все поля');
                return;
            }

            // Генерируем email из ника (только латиница)
            const email = username.toLowerCase().replace(/[^a-z0-9]/g, '') + '@arbuznik.app';

            if (isLoginMode) {
                // ===== ВХОД =====
                try {
                    const cred = await auth.signInWithEmailAndPassword(email, password);
                    const uid = cred.user.uid;
                    // Получаем ник из базы
                    const userSnap = await database.ref('users/' + uid).once('value');
                    const userData = userSnap.val();
                    if (userData && userData.username) {
                        currentUser = { uid, username: userData.username };
                        loginScreen.classList.add('hidden');
                        mainWrapper.style.display = 'flex';
                        loadChats();
                        updateClock();
                    } else {
                        alert('Ошибка: пользователь не найден в базе');
                        await auth.signOut();
                    }
                } catch (e) {
                    alert('Ошибка входа: ' + e.message);
                }
            } else {
                // ===== РЕГИСТРАЦИЯ =====
                // Проверяем, существует ли уже такой ник
                const usersRef = database.ref('users');
                const snapshot = await usersRef.orderByChild('username').equalTo(username).once('value');
                if (snapshot.exists()) {
                    alert('Ник уже занят');
                    return;
                }
                try {
                    // Создаём пользователя с email+пароль
                    const cred = await auth.createUserWithEmailAndPassword(email, password);
                    const uid = cred.user.uid;
                    // Сохраняем ник в базу
                    await usersRef.child(uid).set({
                        username: username
                    });
                    currentUser = { uid, username };
                    loginScreen.classList.add('hidden');
                    mainWrapper.style.display = 'flex';
                    loadChats();
                    updateClock();
                } catch (e) {
                    alert('Ошибка регистрации: ' + e.message);
                }
            }
        });

        // ============================================================
        // 5. ОБРАБОТЧИК АВТОРИЗАЦИИ (ВОССТАНОВЛЕНИЕ СЕССИИ)
        // ============================================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const snapshot = await database.ref('users/' + user.uid).once('value');
                const data = snapshot.val();
                if (data && data.username) {
                    currentUser = { uid: user.uid, username: data.username };
                    loginScreen.classList.add('hidden');
                    mainWrapper.style.display = 'flex';
                    loadChats();
                    updateClock();
                } else {
                    // Если uid есть, но нет ника – выходим
                    await auth.signOut();
                    loginScreen.classList.remove('hidden');
                }
            } else {
                loginScreen.classList.remove('hidden');
            }
        });

        // ============================================================
        // 6. ЧАСЫ
        // ============================================================
        function updateClock() {
            const now = new Date();
            document.getElementById('datetime').textContent = now.toLocaleString('ru', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit', year:'numeric' });
        }
        setInterval(updateClock, 60000);

        // ============================================================
        // 7. ЗАГРУЗКА СПИСКА ЧАТОВ
        // ============================================================
        function loadChats() {
            if (!currentUser) return;
            const chatsRef = database.ref('chats');
            chatsRef.orderByChild('participants/' + currentUser.uid).equalTo(true).on('value', (snapshot) => {
                chatListEl.innerHTML = '';
                const data = snapshot.val();
                if (!data) {
                    chatListEl.innerHTML = '<div style="padding:20px; text-align:center; color:var(--txt3);">Нет чатов. Нажми ✏️ чтобы создать.</div>';
                    return;
                }
                const chatIds = Object.keys(data);
                chatIds.forEach(chatId => {
                    const chat = data[chatId];
                    const otherUid = Object.keys(chat.participants).find(uid => uid !== currentUser.uid);
                    const otherUsername = otherUid ? chat.participants[otherUid] : 'Группа';
                    const lastMsg = chat.lastMessage || { text: '', time: '' };
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.innerHTML = `
                        <div class="name">${otherUsername}</div>
                        <div class="last-msg">${lastMsg.text}</div>
                        <div class="time">${lastMsg.time || ''}</div>
                    `;
                    div.addEventListener('click', () => openChat(chatId, otherUsername));
                    chatListEl.appendChild(div);
                });
            });
        }

        // ============================================================
        // 8. ОТКРЫТИЕ / ЗАКРЫТИЕ ЧАТА
        // ============================================================
        function openChat(chatId, otherUsername) {
            currentChatId = chatId;
            chatTitle.textContent = otherUsername || 'Чат';
            chatWindow.classList.add('active');
            chatMessagesEl.innerHTML = '';
            if (chatListeners.length) {
                chatListeners.forEach(ref => ref.off());
                chatListeners = [];
            }
            const msgsRef = database.ref('chats/' + chatId + '/messages');
            msgsRef.orderByChild('time').on('child_added', (snapshot) => {
                const msg = snapshot.val();
                const isMe = (msg.sender === currentUser.username);
                const div = document.createElement('div');
                div.className = 'msg' + (isMe ? ' me' : '');
                div.innerHTML = `
                    <div class="sender">${msg.sender}</div>
                    <div class="content">${msg.text}</div>
                    <div class="msg-footer"><span class="time">${msg.time}</span></div>
                `;
                chatMessagesEl.appendChild(div);
                chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
            });
            chatListeners.push(msgsRef);
        }

        chatBack.addEventListener('click', () => {
            chatWindow.classList.remove('active');
            if (chatListeners.length) {
                chatListeners.forEach(ref => ref.off());
                chatListeners = [];
            }
            currentChatId = null;
        });

        // ============================================================
        // 9. ОТПРАВКА СООБЩЕНИЙ
        // ============================================================
        function sendChatMessage() {
            const text = chatInput.value.trim();
            if (!text || !currentChatId || !currentUser) return;
            const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            const msgRef = database.ref('chats/' + currentChatId + '/messages').push();
            msgRef.set({
                sender: currentUser.username,
                text: text,
                time: time
            });
            database.ref('chats/' + currentChatId).update({
                lastMessage: { text: text, time: time }
            });
            chatInput.value = '';
        }

        chatSendBtn.addEventListener('click', sendChatMessage);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });

        // ============================================================
        // 10. СОЗДАНИЕ ЧАТА
        // ============================================================
        let selectedUserUid = null;

        createChatBtn.addEventListener('click', () => {
            createChatModal.style.display = 'flex';
            searchUserInput.value = '';
            userSearchResults.innerHTML = '';
            selectedUserUid = null;
            searchUserInput.focus();
        });

        createChatCancel.addEventListener('click', () => {
            createChatModal.style.display = 'none';
        });

        searchUserInput.addEventListener('input', async () => {
            const query = searchUserInput.value.trim().toLowerCase();
            if (!query) {
                userSearchResults.innerHTML = '';
                return;
            }
            const usersRef = database.ref('users');
            const snapshot = await usersRef.once('value');
            const data = snapshot.val();
            userSearchResults.innerHTML = '';
            for (const uid in data) {
                if (uid === currentUser.uid) continue;
                const username = data[uid].username;
                if (username.toLowerCase().includes(query)) {
                    const div = document.createElement('div');
                    div.style.cssText = 'padding:8px 12px; cursor:pointer; border-bottom:1px solid var(--br);';
                    div.textContent = username;
                    div.addEventListener('click', () => {
                        selectedUserUid = uid;
                        userSearchResults.innerHTML = '';
                        const selectedDiv = document.createElement('div');
                        selectedDiv.style.cssText = 'padding:8px 12px; background:var(--bg3); border-radius:8px;';
                        selectedDiv.textContent = 'Выбран: ' + username;
                        userSearchResults.appendChild(selectedDiv);
                    });
                    userSearchResults.appendChild(div);
                }
            }
        });

        createChatConfirm.addEventListener('click', async () => {
            if (!selectedUserUid) {
                alert('Выберите пользователя');
                return;
            }
            const chatsRef = database.ref('chats');
            const snapshot = await chatsRef.orderByChild('participants/' + currentUser.uid).equalTo(true).once('value');
            let existingChatId = null;
            if (snapshot.exists()) {
                snapshot.forEach(child => {
                    const chat = child.val();
                    if (chat.participants && chat.participants[selectedUserUid]) {
                        existingChatId = child.key;
                    }
                });
            }
            if (existingChatId) {
                alert('Чат уже существует');
                createChatModal.style.display = 'none';
                const otherUser = (await database.ref('users/' + selectedUserUid).once('value')).val();
                openChat(existingChatId, otherUser.username);
                return;
            }
            const newChatRef = chatsRef.push();
            await newChatRef.set({
                participants: {
                    [currentUser.uid]: currentUser.username,
                    [selectedUserUid]: (await database.ref('users/' + selectedUserUid).once('value')).val().username
                },
                lastMessage: { text: 'Чат создан', time: '' }
            });
            createChatModal.style.display = 'none';
            loadChats();
        });

        // ============================================================
        // 11. НАСТРОЙКИ
        // ============================================================
        const zoomSlider = document.getElementById('zoomSlider');
        const zoomValue = document.getElementById('zoomValue');
        const zoomDefaultBtn = document.getElementById('zoomDefaultBtn');
        const lightThemeToggle = document.getElementById('lightThemeToggle');

        function applyZoom(value) {
            const percent = parseInt(value);
            mainWrapper.style.transform = `scale(${percent / 100})`;
            zoomValue.textContent = percent + '%';
            localStorage.setItem('zoomLevel', percent);
        }
        zoomSlider.addEventListener('input', (e) => applyZoom(e.target.value));
        zoomDefaultBtn.addEventListener('click', () => {
            zoomSlider.value = 100;
            applyZoom(100);
        });

        function applyTheme(light) {
            document.documentElement.classList.toggle('light', light);
            localStorage.setItem('lightTheme', light);
        }
        lightThemeToggle.addEventListener('change', (e) => applyTheme(e.target.checked));

        const savedZoom = localStorage.getItem('zoomLevel');
        if (savedZoom) { zoomSlider.value = savedZoom; applyZoom(savedZoom); }
        const savedTheme = localStorage.getItem('lightTheme') === 'true';
        lightThemeToggle.checked = savedTheme;
        applyTheme(savedTheme);

        // ============================================================
        // 12. МЕНЮ И НАВИГАЦИЯ
        // ============================================================
        function toggleMenu(open) {
            if (open === undefined) {
                const isOpen = sideMenu.classList.contains('open');
                open = !isOpen;
            }
            sideMenu.classList.toggle('open', open);
            menuOverlay.classList.toggle('active', open);
        }

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMenu();
        });
        menuOverlay.addEventListener('click', () => toggleMenu(false));

        menuItems.forEach(item => {
            item.addEventListener('click', () => {
                const tab = item.dataset.tab;
                if (!tab) return;
                menuItems.forEach(m => m.classList.remove('active'));
                item.classList.add('active');
                Object.keys(tabs).forEach(key => {
                    tabs[key].classList.toggle('active', key === tab);
                });
                toggleMenu(false);
                if (tab === 'room') {
                    initVideoChat();
                }
            });
        });

        logoutBtn.addEventListener('click', () => {
            auth.signOut().then(() => {
                currentUser = null;
                loginScreen.classList.remove('hidden');
                mainWrapper.style.display = 'none';
                chatWindow.classList.remove('active');
                if (chatListeners.length) {
                    chatListeners.forEach(ref => ref.off());
                    chatListeners = [];
                }
                toggleMenu(false);
            });
        });

        // ============================================================
        // 13. ВИДЕОЧАТ (упрощённая версия, как в предыдущей)
        // ============================================================
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const localPlaceholder = document.getElementById('localPlaceholder');
        const remotePlaceholder = document.getElementById('remotePlaceholder');
        const camBtn = document.getElementById('camBtn');
        const micBtn = document.getElementById('micBtn');
        const screenBtn = document.getElementById('screenBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');

        let localStream = null, peer = null, currentCall = null, isConnected = false;
        let isScreenSharing = false, screenStream = null;
        let isHost = false, clients = {}, myDataConnection = null;
        const ROOM_ID = 'mango_chat';

        function initVideoChat() {
            if (!localStream) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                    .then(stream => {
                        localStream = stream;
                        localVideo.srcObject = stream;
                        localPlaceholder.classList.add('hidden');
                        camBtn.classList.add('active');
                        micBtn.classList.add('active');
                        if (!peer) createPeer();
                    })
                    .catch(e => alert('Ошибка доступа к камере: ' + e.message));
            }
        }

        function createPeer() {
            const uniqueId = ROOM_ID + '-' + Date.now() + '-' + Math.random().toString(36).substr(2,6);
            peer = new Peer(uniqueId, {
                host: '0.peerjs.com',
                port: 443,
                path: '/',
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: ['turn:openrelay.metered.ca:80','turn:openrelay.metered.ca:443'], username:'openrelayproject', credential:'openrelayproject' },
                        { urls: ['turn:global.turn.twilio.com:3478?transport=udp','turn:global.turn.twilio.com:3478?transport=tcp'], username:'2d0c2eb0d1f5f7b6d9e2b5c8f3a6e7d9', credential:'q3k9w7f2' }
                    ]
                }
            });
            peer.on('open', () => {
                const conn = peer.connect(ROOM_ID);
                conn.on('open', () => {
                    myDataConnection = conn;
                    conn.on('close', () => { myDataConnection = null; });
                });
                peer.on('connection', (conn) => {
                    clients[conn.peer] = conn;
                    conn.on('close', () => { delete clients[conn.peer]; });
                });
                peer.on('call', (call) => {
                    if (currentCall) { call.close(); return; }
                    if (!localStream) {
                        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                            .then(stream => {
                                localStream = stream;
                                localVideo.srcObject = stream;
                                localPlaceholder.classList.add('hidden');
                                call.answer(stream);
                                setupCall(call);
                            })
                            .catch(() => call.close());
                    } else {
                        call.answer(localStream);
                        setupCall(call);
                    }
                });
            });
            setTimeout(() => {
                if (!myDataConnection) {
                    peer.destroy();
                    peer = new Peer(ROOM_ID, {
                        host: '0.peerjs.com',
                        port: 443,
                        path: '/',
                        config: {
                            iceServers: [
                                { urls: 'stun:stun.l.google.com:19302' },
                                { urls: 'stun:stun1.l.google.com:19302' },
                                { urls: 'stun:stun2.l.google.com:19302' },
                                { urls: ['turn:openrelay.metered.ca:80','turn:openrelay.metered.ca:443'], username:'openrelayproject', credential:'openrelayproject' },
                                { urls: ['turn:global.turn.twilio.com:3478?transport=udp','turn:global.turn.twilio.com:3478?transport=tcp'], username:'2d0c2eb0d1f5f7b6d9e2b5c8f3a6e7d9', credential:'q3k9w7f2' }
                            ]
                        }
                    });
                    peer.on('open', () => {
                        isHost = true;
                        clients = {};
                        peer.on('connection', (conn) => {
                            clients[conn.peer] = conn;
                            conn.on('close', () => { delete clients[conn.peer]; });
                        });
                        peer.on('call', (call) => {
                            if (currentCall) { call.close(); return; }
                            if (!localStream) {
                                navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                                    .then(stream => {
                                        localStream = stream;
                                        localVideo.srcObject = stream;
                                        localPlaceholder.classList.add('hidden');
                                        call.answer(stream);
                                        setupCall(call);
                                    })
                                    .catch(() => call.close());
                            } else {
                                call.answer(localStream);
                                setupCall(call);
                            }
                        });
                    });
                }
            }, 3000);
        }

        function setupCall(call) {
            currentCall = call;
            call.on('stream', (stream) => {
                remoteVideo.srcObject = stream;
                remotePlaceholder.classList.add('hidden');
                isConnected = true;
            });
            call.on('close', () => {
                remoteVideo.srcObject = null;
                remotePlaceholder.classList.remove('hidden');
                isConnected = false;
                currentCall = null;
            });
        }

        camBtn.addEventListener('click', ()=>{
            if (!localStream) return;
            if (isScreenSharing) { stopScreenShare(); setTimeout(()=>toggleCamera(),300); }
            else toggleCamera();
        });
        function toggleCamera() {
            const tracks = localStream.getVideoTracks();
            if (!tracks.length) return;
            const t = tracks[0];
            t.enabled = !t.enabled;
            if (t.enabled) {
                camBtn.classList.add('active');
                camBtn.textContent='📷 Камера';
                localPlaceholder.classList.add('hidden');
            } else {
                camBtn.classList.remove('active');
                camBtn.textContent='📷 Выкл';
                localPlaceholder.classList.remove('hidden');
            }
        }
        micBtn.addEventListener('click', ()=>{
            if (!localStream) return;
            const tracks = localStream.getAudioTracks();
            if (!tracks.length) return;
            const t = tracks[0];
            t.enabled = !t.enabled;
            if (t.enabled) { micBtn.classList.add('active'); micBtn.textContent='🎤 Микрофон'; }
            else { micBtn.classList.remove('active'); micBtn.textContent='🎤 Выкл'; }
        });
        screenBtn.addEventListener('click', async ()=>{
            if (isScreenSharing) stopScreenShare();
            else await startScreenShare();
        });
        async function startScreenShare() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video:true });
                screenStream = stream;
                const vTrack = stream.getVideoTracks()[0];
                const old = localStream.getVideoTracks()[0];
                if (old) { localStream.removeTrack(old); old.stop(); }
                localStream.addTrack(vTrack);
                localVideo.srcObject = localStream;
                if (currentCall) {
                    const sender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) await sender.replaceTrack(vTrack);
                }
                isScreenSharing = true;
                screenBtn.classList.add('active');
                screenBtn.textContent = '🖥️ Остановить';
                camBtn.classList.remove('active');
                camBtn.textContent = '📷 Выкл';
                vTrack.onended = ()=>stopScreenShare();
            } catch(e) { alert('Ошибка доступа к экрану: '+e.message); }
        }
        function stopScreenShare() {
            if (screenStream) { screenStream.getTracks().forEach(t=>t.stop()); screenStream=null; }
            navigator.mediaDevices.getUserMedia({ video:true, audio:true })
                .then(camStream => {
                    const newTrack = camStream.getVideoTracks()[0];
                    const old = localStream.getVideoTracks()[0];
                    if (old) { localStream.removeTrack(old); old.stop(); }
                    localStream.addTrack(newTrack);
                    localVideo.srcObject = localStream;
                    if (currentCall) {
                        const sender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                        if (sender) sender.replaceTrack(newTrack);
                    }
                    isScreenSharing = false;
                    screenBtn.classList.remove('active');
                    screenBtn.textContent = '🖥️ Демка';
                    camBtn.classList.add('active');
                    camBtn.textContent = '📷 Камера';
                    localPlaceholder.classList.add('hidden');
                }).catch(err => console.error('Не удалось вернуть камеру:', err));
        }
        disconnectBtn.addEventListener('click', ()=>{
            if (currentCall) { currentCall.close(); currentCall=null; }
            if (peer) { peer.destroy(); peer=null; }
            remoteVideo.srcObject = null;
            remotePlaceholder.classList.remove('hidden');
            isConnected = false;
            isHost = false; clients = {}; myDataConnection = null;
        });

        // ============================================================
        // 14. ЗАПУСК
        // ============================================================
        setTimeout(() => {
            document.getElementById('splash').classList.add('hidden');
        }, 2000);

        console.log('арбузник v.6.3 – регистрация через email/пароль работает!');
    </script>
</body>
</html>
