<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>арбузник — Чаты</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --bg2: #141414; --bg3: #1c1c1c; --bg4: #252525; --bg5: #2e2e2e;
            --br: #3a3a3a; --txt: #f0f0f0; --txt2: #b0b0b0; --txt3: #777;
            --ac: #d0d0d0; --ach: #aaa; --sh: 0 2px 10px rgba(0,0,0,.6);
            --msg-other-bg: #1a2a3a; --chat-bg: #0a0a0a;
            --msg-bg-me: #2e2e2e; --msg-bg-other: #1a2a3a;
            --menu-bg: #1a1a1a;
            --menu-border: #2a2a2a;
            --menu-text: #ddd;
            --menu-hover: #2a2a2a;
            --menu-active: #333;
        }
        .light {
            --bg: #f5f5f5; --bg2: #e8e8e8; --bg3: #d8d8d8; --bg4: #d0d0d0; --bg5: #c0c0c0;
            --br: #b0b0b0; --txt: #1a1a1a; --txt2: #444; --txt3: #777;
            --ac: #222; --ach: #555; --sh: 0 2px 10px rgba(0,0,0,.15);
            --msg-other-bg: #fff8e7; --chat-bg: #f5f5f5;
            --msg-bg-me: #fff8e7; --msg-bg-other: #fff8e7;
            --menu-bg: #f0f0f0;
            --menu-border: #ddd;
            --menu-text: #222;
            --menu-hover: #e0e0e0;
            --menu-active: #d0d0d0;
        }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; overflow: hidden; }

        .menu-btn {
            position: fixed; top:12px; left:12px; z-index:100; background:var(--bg2); border:1px solid var(--br); border-radius:50%;
            width:44px; height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--txt); transition:.2s; box-shadow:var(--sh);
        }
        .menu-btn:hover { background:var(--bg3); }
        .menu-btn svg { width:24px; height:24px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .menu-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:99; display:none; backdrop-filter:blur(2px); }
        .menu-overlay.active { display:block; }
        .side-menu {
            position:fixed; top:0; left:-280px; width:280px; height:100%; background:var(--menu-bg); border-right:1px solid var(--menu-border); z-index:100;
            transition:left 0.3s cubic-bezier(0.4,0,0.2,1); padding:80px 20px 20px 20px; display:flex; flex-direction:column; gap:2px; box-shadow:var(--sh);
        }
        .side-menu.open { left:0; }
        .side-menu .logo { font-size:18px; font-weight:600; color:var(--menu-text); letter-spacing:1px; padding:0 0 20px 0; border-bottom:1px solid var(--menu-border); margin-bottom:12px; }
        .side-menu .menu-item {
            padding:10px 12px; border-radius:6px; font-size:15px; display:flex; align-items:center; gap:12px; color:var(--txt2); cursor:pointer; transition:.15s;
            border:none; background:transparent; width:100%; text-align:left; font-weight:400;
            position:relative;
        }
        .side-menu .menu-item:hover { background:var(--menu-hover); color:var(--txt); }
        .side-menu .menu-item.active { background:var(--menu-active); color:var(--txt); font-weight:500; }
        .side-menu .menu-item .icon { font-size:18px; width:24px; text-align:center; color:var(--txt2); }
        .side-menu .menu-item .badge {
            position:absolute; right:16px; top:50%; transform:translateY(-50%);
            background:#f44; color:#fff; font-size:11px; font-weight:600;
            border-radius:50%; min-width:20px; height:20px; display:flex; align-items:center; justify-content:center;
            padding:0 4px; display:none;
        }
        .side-menu .menu-item .badge.show { display:flex; }
        .side-menu .status-indicator {
            display:flex; align-items:center; gap:8px; padding:12px 12px 0 12px; font-size:13px; color:var(--txt2); margin-top:auto;
            border-top:1px solid var(--menu-border); padding-top:16px;
        }
        .side-menu .status-indicator .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
        .side-menu .status-indicator .dot.online { background:#5a5; }
        .side-menu .status-indicator .dot.offline { background:#a55; }
        .side-menu .version-info { text-align:center; font-size:12px; color:var(--txt3); padding:12px 0 4px 0; border-top:1px solid var(--menu-border); margin-top:8px; }

        .main { flex:1; display:flex; flex-direction:column; background:var(--bg); min-width:0; transition:transform .15s, background .2s; transform-origin:top left; position:relative; }
        .topbar {
            display:flex; align-items:center; justify-content:space-between; padding:6px 12px 6px 64px; background:var(--bg2); border-bottom:1px solid var(--br); flex-shrink:0; flex-wrap:wrap; gap:4px; min-height:52px;
            position:relative;
        }
        .topbar .title { font-size:16px; font-weight:700; color:var(--ac); letter-spacing:1px; }
        .topbar .datetime { font-size:11px; color:var(--txt2); background:var(--bg3); padding:2px 10px; border-radius:20px; border:1px solid var(--br); white-space:nowrap; }
        .topbar .more-btn {
            background:transparent; border:1px solid var(--br); border-radius:50%; width:32px; height:32px;
            display:flex; align-items:center; justify-content:center; color:var(--txt2); cursor:pointer; font-size:18px;
            transition:.2s;
        }
        .topbar .more-btn:hover { background:var(--bg3); color:var(--txt); }
        .topbar .more-menu {
            display:none; position:absolute; right:12px; top:48px; background:var(--bg2); border:1px solid var(--br); border-radius:12px;
            padding:4px 0; min-width:160px; box-shadow:var(--sh); z-index:200;
        }
        .topbar .more-menu.active { display:block; }
        .topbar .more-menu button {
            display:block; width:100%; padding:8px 16px; background:transparent; border:none; color:var(--txt);
            text-align:left; font-size:13px; cursor:pointer; transition:.15s;
        }
        .topbar .more-menu button:hover { background:var(--bg3); }

        .content { flex:1; display:flex; overflow:hidden; position:relative; }
        .tab { display:none; width:100%; height:100%; flex-direction:column; padding:0; overflow-y:auto; }
        .tab.active { display:flex; }

        .video-grid {
            display:grid; grid-template-columns:1fr 1fr; gap:10px; flex:1; min-height:0; margin-bottom:10px; padding:12px; transition: all 0.3s ease;
        }
        @media(max-width:700px){ .video-grid { grid-template-columns:1fr; gap:8px; } }
        .video-card {
            background:var(--bg3); border-radius:16px; overflow:hidden; position:relative; display:flex; align-items:center; justify-content:center;
            border:1px solid var(--br); cursor:pointer; transition: all 0.3s ease; min-height:120px;
        }
        .video-card video { width:100%; height:100%; object-fit:cover; background:#000; transform:scaleX(-1); }
        .video-card .camera-placeholder {
            position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center;
            font-size:48px; color:#888; background:var(--bg3); pointer-events:none; transition: opacity 0.3s;
        }
        .video-card .camera-placeholder.hidden { opacity:0; }
        .video-card .label {
            position:absolute; bottom:8px; left:8px; background:rgba(0,0,0,.6); padding:2px 12px; border-radius:20px;
            font-size:12px; color:#ccc; backdrop-filter:blur(4px); border:1px solid var(--br); z-index:2;
        }
        .video-card .label.remote { color:#fc0; }
        .video-card.expanded {
            position:fixed; top:0; left:0; width:100%; height:100%; z-index:1000; border-radius:0; background:#000; border:none;
        }
        .video-card.expanded video { transform:scaleX(-1); }
        .video-card.expanded .label { font-size:16px; bottom:20px; left:20px; }
        .video-card.expanded .camera-placeholder { font-size:80px; }
        .video-card.expanded ~ .video-card { opacity:0; pointer-events:none; }

        .controls-room {
            display:flex; justify-content:center; gap:8px; flex-shrink:0; padding:6px 0 12px; flex-wrap:wrap; position:relative; z-index:2;
        }
        .controls-room button {
            background:var(--bg3); border:1px solid var(--br); padding:6px 14px; border-radius:40px; color:var(--txt); font-size:13px;
            cursor:pointer; transition:.15s; display:flex; align-items:center; gap:4px;
        }
        .controls-room button:hover { background:var(--br); }
        .controls-room .active { background:var(--ac); color:var(--bg); border-color:var(--ac); }
        .controls-room .danger { background:#a55; color:#fff; border-color:#a55; }

        .chat-messages {
            flex:1; overflow-y:auto; padding:6px 8px; background:var(--chat-bg); border:none; border-radius:0; margin-bottom:0;
            transition:background .3s; display:flex; flex-direction:column; gap:2px; scrollbar-width:none; -ms-overflow-style:none;
            position:relative;
        }
        .chat-messages::-webkit-scrollbar { display:none; }
        .chat-messages .msg { max-width:70%; padding:5px 12px 16px 12px; border-radius:14px; word-wrap:break-word; position:relative; animation:msgSlide .3s ease; margin-bottom:2px; align-self:flex-end !important; background:var(--msg-bg-me); border:1px solid var(--br); }
        .chat-messages .msg.other { align-self:flex-start !important; background:var(--msg-bg-other); }
        .chat-messages .msg.me { align-self:flex-end !important; background:var(--msg-bg-me); border:1px solid var(--br); }
        .chat-messages .msg.msg-video {
            padding: 0 !important; background: transparent !important; border: none !important; max-width:200px; margin:4px 0;
        }
        .chat-messages .msg.msg-video .circle-video {
            width:200px; height:200px; border-radius:50%; overflow:hidden; background:#000; cursor:pointer; position:relative;
        }
        .chat-messages .msg.msg-video .circle-video video { width:100%; height:100%; object-fit:cover; display:block; }
        .chat-messages .msg.msg-video .circle-video video::-webkit-media-controls { display:none !important; }
        .chat-messages .msg.msg-video .circle-video video::-moz-media-controls { display:none !important; }
        .chat-messages .msg.msg-video .circle-video:hover video::-webkit-media-controls { display:block !important; }
        @keyframes msgSlide { 0% { opacity:0; transform:translateY(10px) scale(0.95); } 100% { opacity:1; transform:translateY(0) scale(1); } }
        .chat-messages .msg .sender { font-size:11px; color:var(--txt2); margin-bottom:2px; font-weight:600; }
        .chat-messages .msg .msg-footer {
            display:flex; justify-content:flex-end; align-items:center; gap:4px; margin-top:2px; font-size:10px; color:var(--txt3);
        }
        .chat-messages .msg .msg-footer .time { font-size:9px; }
        .chat-messages .msg .msg-footer .status-icon { font-weight:bold; font-size:12px; margin-left:4px; color:#5a5; }
        .chat-messages .msg .reply-to { font-size:11px; color:var(--ac); background:var(--bg3); padding:2px 8px; border-radius:8px; margin-bottom:3px; border-left:3px solid var(--ac); }
        .chat-messages .msg .content { word-wrap:break-word; }
        .chat-messages .msg .sticker-img { max-width:128px; max-height:128px; border-radius:12px; display:block; margin:4px 0; }
        .chat-messages .msg .audio-preview { display:flex; align-items:center; gap:8px; background:var(--bg3); padding:4px 12px; border-radius:40px; margin-top:4px; max-width:180px; }
        .chat-messages .msg .audio-preview button { background:0 0; border:0; color:var(--ac); font-size:16px; cursor:pointer; }
        .chat-messages .msg .audio-preview .duration { font-size:12px; color:var(--txt2); }
        .chat-messages .msg .reactions { display:flex; gap:4px; margin-top:4px; flex-wrap:wrap; }
        .chat-messages .msg .reactions span { background:var(--bg3); padding:0 6px; border-radius:12px; font-size:13px; cursor:pointer; transition:.1s; }
        .chat-messages .msg .reactions span:hover { transform:scale(1.2); }
        .msg .file-preview { display:flex; align-items:center; gap:10px; background:var(--bg3); padding:6px 12px; border-radius:10px; margin-top:4px; max-width:200px; }
        .msg .file-preview .icon { font-size:24px; }
        .msg .file-preview .info { display:flex; flex-direction:column; }
        .msg .file-preview .info .name { font-size:13px; color:var(--txt); word-break:break-all; }
        .msg .file-preview .info .size { font-size:10px; color:var(--txt3); }

        .typing-indicator { display:flex; align-items:center; gap:6px; padding:4px 10px; background:var(--bg3); border-radius:20px; align-self:flex-start; margin-bottom:4px; animation:msgSlide .3s ease; }
        .typing-indicator span { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--txt2); animation:typing-bounce 1.4s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay:0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay:0.4s; }
        @keyframes typing-bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }

        .chat-input-area {
            display:flex; gap:6px; align-items:center; flex-shrink:0; background:var(--bg2); padding:6px 10px; border-radius:40px; border:1px solid var(--br); position:relative; margin:6px 8px;
        }
        .chat-input-area input[type="text"] { flex:1; background:0 0; border:0; color:var(--txt); font-size:14px; outline:0; padding:6px 0; }
        .chat-input-area button {
            background:0 0; border:0; color:var(--txt2); font-size:18px; cursor:pointer; padding:4px 6px; transition:.2s; position:relative;
        }
        .chat-input-area button:hover { color:var(--txt); }
        .chat-input-area button.primary { color:var(--ac); font-size:20px; }
        .chat-input-area button.recording { color:#a55; }
        .chat-input-area .circle-btn { font-size:20px; }

        .voice-wave { display:inline-flex; align-items:center; gap:3px; height:18px; margin-left:4px; }
        .voice-wave span { display:block; width:3px; height:100%; background:var(--ac); border-radius:3px; animation:wave .6s infinite alternate ease-in-out; }
        .voice-wave span:nth-child(2) { animation-delay:.1s; height:60%; }
        .voice-wave span:nth-child(3) { animation-delay:.2s; height:80%; }
        .voice-wave span:nth-child(4) { animation-delay:.3s; height:40%; }
        .voice-wave span:nth-child(5) { animation-delay:.4s; height:90%; }
        .voice-wave span:nth-child(6) { animation-delay:.5s; height:50%; }
        .voice-wave span:nth-child(7) { animation-delay:.6s; height:70%; }
        @keyframes wave { 0%{transform:scaleY(.4)} 100%{transform:scaleY(1)} }

        .sticker-panel { display:none; position:absolute; bottom:60px; left:10px; background:var(--bg2); border-radius:16px; padding:8px; border:1px solid var(--br); max-width:320px; flex-wrap:wrap; gap:4px; z-index:100; max-height:200px; overflow-y:auto; }
        .sticker-panel.active { display:flex; }
        .sticker-panel img { width:64px; height:64px; border-radius:12px; cursor:pointer; object-fit:contain; background:var(--bg3); padding:4px; border:1px solid transparent; transition:.1s; }
        .sticker-panel img:hover { border-color:var(--ac); transform:scale(1.05); }
        .sticker-panel .empty-stickers { color:var(--txt3); font-size:13px; padding:12px; text-align:center; width:100%; }

        .reply-indicator { background:var(--bg3); padding:4px 10px; border-radius:16px; font-size:12px; color:var(--txt2); display:flex; align-items:center; gap:6px; margin:0 8px 4px; }
        .reply-indicator .cancel-reply { cursor:pointer; color:#f44; font-weight:bold; }

        .scroll-down-btn {
            position:absolute; bottom:80px; right:20px; background:var(--bg2); border:1px solid var(--br); border-radius:50%;
            width:44px; height:44px; display:flex; align-items:center; justify-content:center; color:var(--txt2); font-size:20px;
            cursor:pointer; box-shadow:var(--sh); transition:.2s; z-index:50;
            opacity:0; pointer-events:none; transform:translateY(10px);
        }
        .scroll-down-btn.show { opacity:1; pointer-events:auto; transform:translateY(0); }
        .scroll-down-btn:hover { background:var(--bg3); color:var(--txt); }

        .settings-tab { padding:16px; max-width:400px; width:100%; }
        .settings-tab .setting-group { margin-bottom:16px; }
        .settings-tab label { display:block; font-size:13px; color:var(--txt2); margin-bottom:4px; }
        .user-selector { display:flex; gap:12px; margin-top:4px; }
        .user-selector label { display:flex; align-items:center; gap:6px; color:var(--txt); cursor:pointer; }
        .user-selector input[type="radio"] { accent-color:var(--ac); width:16px; height:16px; cursor:pointer; }
        .zoom-row { display:flex; align-items:center; gap:10px; }
        .zoom-row input[type="range"] { flex:1; accent-color:var(--ac); cursor:pointer; }
        .zoom-value { color:var(--ac); font-weight:700; min-width:40px; }
        .btn-default { background:var(--bg3); border:1px solid var(--br); color:var(--txt); padding:4px 12px; border-radius:30px; cursor:pointer; font-size:12px; }
        .btn-default:hover { background:var(--br); }
        .theme-toggle { display:flex; align-items:center; gap:8px; margin-top:4px; }
        .theme-toggle input[type="checkbox"] { width:18px; height:18px; accent-color:var(--ac); cursor:pointer; }
        .bg-selector { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
        .bg-selector button { padding:4px 12px; border-radius:20px; border:1px solid var(--br); background:var(--bg3); color:var(--txt); cursor:pointer; font-size:12px; transition:.15s; }
        .bg-selector button:hover { background:var(--br); }
        .bg-selector button.active-bg { border-color:var(--ac); background:var(--ac); color:var(--bg); }
        .color-picker { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
        .color-picker input[type="color"] { width:32px; height:32px; border-radius:50%; border:2px solid var(--br); cursor:pointer; padding:0; background:none; }
        .color-picker input[type="color"]::-webkit-color-swatch-wrapper { padding:0; }
        .color-picker input[type="color"]::-webkit-color-swatch { border:none; border-radius:50%; }
        .sticker-upload { margin-top:8px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .sticker-upload label { background:var(--bg3); padding:6px 14px; border-radius:30px; border:1px solid var(--br); cursor:pointer; font-size:13px; transition:.15s; }
        .sticker-upload label:hover { background:var(--br); }
        .sticker-upload input[type="file"] { display:none; }
        .sticker-upload .sticker-preview { display:flex; gap:4px; flex-wrap:wrap; }
        .sticker-upload .sticker-preview img { width:48px; height:48px; border-radius:8px; object-fit:contain; background:var(--bg3); border:1px solid var(--br); padding:2px; }
        .sticker-upload .sticker-preview .remove-sticker { position:relative; cursor:pointer; font-size:14px; color:#f44; margin-left:-16px; background:var(--bg); border-radius:50%; width:16px; height:16px; text-align:center; line-height:16px; }
        .btn-danger { background:#a55; border:1px solid #a55; color:#fff; padding:6px 16px; border-radius:30px; cursor:pointer; font-size:13px; transition:.15s; }
        .btn-danger:hover { background:#c66; }

        .recording-modal {
            position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.92); display:none;
            align-items:center; justify-content:center; z-index:9999; flex-direction:column; animation:fadeIn .3s;
        }
        .recording-modal.active { display:flex; }
        @keyframes fadeIn { 0% { opacity:0; } 100% { opacity:1; } }
        .recording-modal .preview { width:320px; height:320px; border-radius:50%; overflow:hidden; background:#000; margin-bottom:16px; }
        .recording-modal .preview video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
        .recording-modal .timer { color:#ccc; font-size:18px; font-weight:300; margin-bottom:16px; }
        .recording-modal .controls-bottom { display:flex; justify-content:center; align-items:center; gap:20px; width:100%; padding:0 20px; }
        .recording-modal .controls-bottom button { background:#2a2a2a; border:none; color:#fff; font-size:14px; font-weight:400; padding:10px 18px; border-radius:6px; cursor:pointer; transition:.2s; letter-spacing:0.5px; min-width:60px; }
        .recording-modal .controls-bottom button:hover { background:#3a3a3a; }
        .recording-modal .controls-bottom .send-btn { background:#4a6d8a; color:#fff; }
        .recording-modal .controls-bottom .send-btn:hover { background:#5a8aaa; }
        .recording-modal .controls-bottom .cancel-btn { background:#a55; color:#fff; }
        .recording-modal .controls-bottom .cancel-btn:hover { background:#c66; }
        .recording-modal .controls-bottom .action-btn { background:#2a2a2a; font-size:18px; padding:10px 16px; }
        @media(max-width:700px){ .recording-modal .preview { width:240px; height:240px; } .recording-modal .controls-bottom button { padding:8px 14px; font-size:13px; min-width:50px; } }

        .schedule-dialog {
            position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:9999;
        }
        .schedule-dialog.active { display:flex; }
        .schedule-dialog .box {
            background:var(--bg2); padding:24px; border-radius:20px; max-width:320px; width:90%; border:1px solid var(--br);
        }
        .schedule-dialog .box h3 { color:var(--txt); margin-bottom:12px; font-weight:400; }
        .schedule-dialog .box .row { display:flex; gap:10px; margin-bottom:12px; align-items:center; }
        .schedule-dialog .box .row label { color:var(--txt2); font-size:13px; min-width:60px; }
        .schedule-dialog .box .row input { flex:1; background:var(--bg3); border:1px solid var(--br); border-radius:8px; padding:6px 10px; color:var(--txt); outline:none; }
        .schedule-dialog .box .row input:focus { border-color:var(--ac); }
        .schedule-dialog .box .btns { display:flex; gap:10px; justify-content:flex-end; }

            for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);

                        const chat = data[id];
                        chats.push({ id, name: chat.name || 'Без названия' });
                    });
                }
                if (chats.length === 0) {
                    createDefaultChat();
                } else {
                    renderChatList();

        function subscribeToMessages() {
            if (!messagesRef) return;
            messagesRef.on('child_added', (snapshot) => {
                const msg = snapshot.val();
                const key = snapshot.key;
                if (document.querySelector(`[data-msg-id="${key}"]`)) return;
                const isMe = (msg.sender === myName);
                if (msg.type === 'text') addChatMessage(msg.text, msg.sender, msg.time, key, msg.replyTo, msg.reactions, 'text', isMe);
                else if (msg.type === 'voice') displayAudioMessage(msg.sender, msg.data, msg.time, key, isMe);
                else if (msg.type === 'videoMsg') displayVideoMessage(msg.sender, msg.data, msg.time, key, isMe);
                else if (msg.type === 'sticker') displayStickerMessage(msg.sender, msg.data, key, isMe);
                else if (msg.type === 'file') displayFileMessage(msg.sender, msg.data, msg.name, msg.mime, msg.size, key, isMe);
            });
        }

        function addChatMessage(text, sender, time, id, replyTo, reactions, type, isMe) {
            const div = document.createElement('div');
            div.className = 'msg';
            if (isMe) div.classList.add('me');
            else div.classList.add('other');
            div.dataset.msgId = id;
            div.dataset.sender = sender;
            let replyHtml = replyTo ? `<div class="reply-to">↩️ ${replyTo.sender}: ${replyTo.text}</div>` : '';
            let reactionsHtml = '';
            if (reactions && Object.keys(reactions).length > 0) {
                reactionsHtml = '<div class="reactions">';
                for (const [emoji, users] of Object.entries(reactions)) reactionsHtml += `<span>${emoji} ${users.length}</span>`;
                reactionsHtml += '</div>';
            }
            const senderColor = (sender === myName) ? myColor : '#ffcc00';
            const timeStr = time || new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            div.innerHTML = `<div class="sender" style="color:${senderColor}">${sender}</div>${replyHtml}<div class="content">${text}</div>${reactionsHtml}`;
            const footer = document.createElement('div');
            footer.className = 'msg-footer';
            footer.innerHTML = `<span class="time">${timeStr}</span>`;
            if (isMe) footer.innerHTML += `<span class="status-icon" data-status="delivered">✓✓</span>`;
            div.appendChild(footer);
            document.getElementById('chatMessages').appendChild(div);
            autoScrollIfNeeded();
            addMessageInteractions(div, id, sender);
            return div;
        }

        function displayFileMessage(sender, data, name, mime, size, id, isMe) {
            const div = document.createElement('div');
            div.className = 'msg';
            if (isMe) div.classList.add('me');
            else div.classList.add('other');
            div.dataset.msgId = id; div.dataset.sender = sender;
            const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            let content = '';
            if (mime.startsWith('image/')) {
                const blob = base64ToBlob(data, mime);
                const url = URL.createObjectURL(blob);
                content = `<img src="${url}" alt="${name}" onclick="window.open('${url}')" style="max-width:160px;border-radius:10px;"/>`;
            } else {
                let icon = '📄';
                if (mime.includes('pdf')) icon = '📄';
                else if (mime.includes('zip')) icon = '📦';
                else if (mime.includes('doc')) icon = '📝';
                else if (mime.includes('xls')) icon = '📊';
                else if (mime.includes('ppt')) icon = '📊';
                content = `<div class="file-preview"><span class="icon">${icon}</span><div class="info"><span class="name">${name}</span><span class="size">${formatFileSize(size)}</span></div></div>`;
            }
            const senderColor = (sender === myName) ? myColor : '#ffcc00';
            div.innerHTML = `<div class="sender" style="color:${senderColor}">${sender}</div>${content}`;
            const footer = document.createElement('div');
            footer.className = 'msg-footer';
            footer.innerHTML = `<span class="time">${time}</span>`;
            if (isMe) footer.innerHTML += `<span class="status-icon" data-status="delivered">✓✓</span>`;
            div.appendChild(footer);
            document.getElementById('chatMessages').appendChild(div);
            autoScrollIfNeeded();
            addMessageInteractions(div, id, sender);
        }

        function displayAudioMessage(sender, data, time, id, isMe) {
            const div = document.createElement('div');
            div.className = 'msg';
            if (isMe) div.classList.add('me');
            else div.classList.add('other');
            div.dataset.msgId = id; div.dataset.sender = sender;

            const url = URL.createObjectURL(blob);
            const timeStr = time || new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            const duration = Math.round(blob.size / 16000);
            const durationStr = `${Math.floor(duration/60)}:${(duration%60).toString().padStart(2,'0')}`;
            const senderColor = (sender === myName) ? myColor : '#ffcc00';
            div.innerHTML = `<div class="sender" style="color:${senderColor}">${sender}</div><div class="audio-preview"><button class="play-audio">▶</button><span class="duration">${durationStr}</span></div>`;
            const footer = document.createElement('div');
            footer.className = 'msg-footer';
            footer.innerHTML = `<span class="time">${timeStr}</span>`;
            if (isMe) footer.innerHTML += `<span class="status-icon" data-status="delivered">✓✓</span>`;
            div.appendChild(footer);
            document.getElementById('chatMessages').appendChild(div);
            autoScrollIfNeeded();
            const btn = div.querySelector('.play-audio');

        function addMessageInteractions(div, id, sender) {
            let pressTimer = null;
            div.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => showContextMenu(e.touches[0].clientX, e.touches[0].clientY, id, sender), 600);
            });
            div.addEventListener('touchend', () => clearTimeout(pressTimer));
            div.addEventListener('touchmove', () => clearTimeout(pressTimer));
            div.addEventListener('mousedown', (e) => { if (e.button === 2) showContextMenu(e.clientX, e.clientY, id, sender); });
            let startX = 0;
            div.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; });
            div.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].clientX;
                if (endX - startX > 80) {
                    const text = div.querySelector('.content')?.textContent || '[медиа]';
                    setReply(id, sender, text);
                }
            });
            div.addEventListener('click', (e) => {
                const target = e.target;
                if (target.tagName === 'A' || target.tagName === 'BUTTON' || target.tagName === 'VIDEO' || target.tagName === 'AUDIO' || target.tagName === 'IMG' || target.closest('.reactions')) return;
                if (target.tagName === 'IMG' && target.src) {
                    fetch(target.src).then(res => res.blob()).then(blob => {
                        const file = new File([blob], 'image.jpg', { type: 'image/jpeg' });
                        openImageEditor(file);
                    });
                    return;
                }
                showContextMenu(e.clientX || e.pageX, e.clientY || e.pageY, id, sender);
            });
        }

        function updateReaction(msgId, emoji, sender) {
            const msgEl = document.querySelector(`[data-msg-id="${msgId}"]`);
            if (!msgEl) return;
            let reactions = msgEl.dataset.reactions ? JSON.parse(msgEl.dataset.reactions) : {};
            if (!reactions[emoji]) reactions[emoji] = [];
            if (reactions[emoji].includes(sender)) {
                reactions[emoji] = reactions[emoji].filter(u => u !== sender);
                if (reactions[emoji].length === 0) delete reactions[emoji];
            } else {
                reactions[emoji].push(sender);
            }
            msgEl.dataset.reactions = JSON.stringify(reactions);
            const reactionsDiv = msgEl.querySelector('.reactions');
            if (reactionsDiv) {
                reactionsDiv.innerHTML = '';
                for (const [emoji, users] of Object.entries(reactions)) {
                    const span = document.createElement('span');
                    span.textContent = `${emoji} ${users.length}`;
                    reactionsDiv.appendChild(span);
                }
            } else {
                const newDiv = document.createElement('div');
                newDiv.className = 'reactions';
                for (const [emoji, users] of Object.entries(reactions)) {
                    const span = document.createElement('span');
                    span.textContent = `${emoji} ${users.length}`;
                    newDiv.appendChild(span);
                }
                msgEl.appendChild(newDiv);
            }
        }

        function openImageEditor(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('editorCanvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    document.getElementById('imageEditor').classList.add('active');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        document.getElementById('editorRotate').addEventListener('click', () => {
            const canvas = document.getElementById('editorCanvas');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.onload = () => {
                editorRotation = (editorRotation + 90) % 360;
                if (editorRotation === 90 || editorRotation === 270) {
                    canvas.width = img.height;
                    canvas.height = img.width;
                } else {
                    canvas.width = img.width;
                    canvas.height = img.height;
                }
                ctx.save();
                ctx.translate(canvas.width/2, canvas.height/2);
                ctx.rotate(editorRotation * Math.PI / 180);
                ctx.drawImage(img, -img.width/2, -img.height/2);
                ctx.restore();
            };
            img.src = canvas.toDataURL();
        });
        document.getElementById('editorCancel').addEventListener('click', () => document.getElementById('imageEditor').classList.remove('active'));
        document.getElementById('editorApply').addEventListener('click', () => {
            const canvas = document.getElementById('editorCanvas');
            canvas.toBlob((blob) => {
                const file = new File([blob], 'edited_image.jpg', { type: 'image/jpeg' });
                sendFile(file, file.type);
                document.getElementById('imageEditor').classList.remove('active');
            }, 'image/jpeg');
        });

        async function sendFile(file, mime) {
            const blob = await file.arrayBuffer().then(buf => new Blob([buf], { type: file.type }));
            const base64 = await blobToBase64(blob);
            sendMessageToFirebase({
                type: 'file',
                data: base64,
                name: file.name,
                mime: mime,
                size: file.size
            });
            vibrate();
        }

        });

            if (!e.target.closest('#attachBtn') && !e.target.closest('#stickerPanel')) document.getElementById('stickerPanel').classList.remove('active');
        });
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files.length) return;
            for (const file of files) {
                if (file.type.startsWith('image/')) openImageEditor(file);
                else sendFile(file, file.type);
            }
            e.target.value = '';
        });

        async function startVoiceRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                voiceRecorder = new MediaRecorder(stream);
                voiceChunks = [];
                voiceRecorder.ondataavailable = (e) => { if (e.data.size>0) voiceChunks.push(e.data); };
                voiceRecorder.onstop = async () => {
                    const blob = new Blob(voiceChunks, { type:'audio/ogg' });
                    voiceChunks = [];
                    const base64 = await blobToBase64(blob);
                    sendMessageToFirebase({ type: 'voice', data: base64 });
                    stream.getTracks().forEach(t=>t.stop());
                    if (waveElement) { waveElement.remove(); waveElement = null; }
                    document.getElementById('voiceBtn').textContent = '🎙️';
                    document.getElementById('voiceBtn').classList.remove('recording');
                    vibrate();
                };
                voiceRecorder.start();
                isRecordingVoice = true;
                document.getElementById('voiceBtn').textContent = '⏹️';
                document.getElementById('voiceBtn').classList.add('recording');
                if (!waveElement) {
                    waveElement = document.createElement('div');
                    waveElement.className = 'voice-wave';
                    for (let i=0; i<7; i++) { const s = document.createElement('span'); waveElement.appendChild(s); }
                    document.getElementById('voiceBtn').parentNode.insertBefore(waveElement, document.getElementById('voiceBtn').nextSibling);
                }
            } catch(e) { alert('Ошибка доступа к микрофону для записи: '+e.message); }
        }
        function stopVoiceRecording() {
            if (voiceRecorder && voiceRecorder.state !== 'inactive') { voiceRecorder.stop(); isRecordingVoice = false; }
        }
        document.getElementById('voiceBtn').addEventListener('click', () => { if (isRecordingVoice) stopVoiceRecording(); else startVoiceRecording(); });

        function openRecorder() {
            if (recIsRecording) return;
            (async () => {
                try {
                    const constraints = { video: { facingMode: currentFacingMode, width: { ideal: 320 }, height: { ideal: 320 } }, audio: true };
                    recMediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                    document.getElementById('recPreview').srcObject = recMediaStream;
                    document.getElementById('recordingModal').classList.add('active');
                    document.getElementById('recTimer').textContent = '0:00';
                    recSecondsCircle = 0;
                    recRecordedChunks = [];
                    recIsRecording = false;
                    startRecordingCircle();
                } catch(e) { alert('Ошибка доступа к камере: '+e.message); }
            })();
        }
        function startRecordingCircle() {
            if (recMediaStream) {
                recRecorder = new MediaRecorder(recMediaStream);
                recRecordedChunks = [];
                recRecorder.ondataavailable = (e) => { if (e.data.size > 0) recRecordedChunks.push(e.data); };
                recRecorder.onstop = async () => {
                    const blob = new Blob(recRecordedChunks, { type: 'video/mp4' });
                    const base64 = await blobToBase64(blob);
                    sendMessageToFirebase({ type: 'videoMsg', data: base64 });
                    closeRecorderCircle();
                    vibrate();
                };
                recRecorder.start(100);
                recIsRecording = true;
                recSecondsCircle = 0;
                recTimerIntervalCircle = setInterval(() => {
                    recSecondsCircle++;
                    const mins = Math.floor(recSecondsCircle / 60);
                    const secs = recSecondsCircle % 60;
                    document.getElementById('recTimer').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                    if (recSecondsCircle >= 60) {
                        if (recRecorder && recRecorder.state !== 'inactive') { recRecorder.stop(); recIsRecording = false; clearInterval(recTimerIntervalCircle); }
                    }
                }, 1000);
            }
        }
        function stopRecordingAndSendCircle() {
            if (recRecorder && recRecorder.state === 'recording') { recRecorder.stop(); recIsRecording = false; clearInterval(recTimerIntervalCircle); }
        }
        function closeRecorderCircle() {
            if (recRecorder && recRecorder.state !== 'inactive') { try { recRecorder.stop(); } catch(e) {} }
            if (recMediaStream) { recMediaStream.getTracks().forEach(t => t.stop()); recMediaStream = null; }
            if (recTimerIntervalCircle) clearInterval(recTimerIntervalCircle);
            document.getElementById('recordingModal').classList.remove('active');
            recIsRecording = false;
        }
        document.getElementById('recSendBtn').addEventListener('click', () => { if (recIsRecording) stopRecordingAndSendCircle(); else closeRecorderCircle(); });
        document.getElementById('recCancelBtn').addEventListener('click', closeRecorderCircle);
        document.getElementById('flipBtn').addEventListener('click', async () => {
            const newMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            currentFacingMode = newMode;
            if (recMediaStream) {
                const track = recMediaStream.getVideoTracks()[0];
                if (track) { try { await track.applyConstraints({ facingMode: newMode }); } catch(e) {} }
            }
        });
        document.getElementById('flashBtn').addEventListener('click', () => {
            flashActive = !flashActive;
            if (recMediaStream) {
                const track = recMediaStream.getVideoTracks()[0];
                if (track) {
                    try { track.applyConstraints({ advanced: [{ torch: flashActive && currentFacingMode === 'environment' }] }); } catch(e) {}
                }
            }
            document.getElementById('flashBtn').style.opacity = flashActive ? '1' : '0.5';
        });
        document.getElementById('circleBtn').addEventListener('click', openRecorder);

        function renderStickers() {
            const stickers = getStickers();
            const panel = document.getElementById('stickerPanel');
            panel.innerHTML = '';
            if (stickers.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-stickers';
                empty.textContent = 'Загрузи стикеры в настройках';
                panel.appendChild(empty);
                return;
            }
            stickers.forEach((base64) => {
                const img = document.createElement('img');
                img.src = base64;
                img.addEventListener('click', () => sendSticker(base64));
                panel.appendChild(img);
            });
        }
        function sendSticker(base64) {
            sendMessageToFirebase({ type: 'sticker', data: base64 });
            document.getElementById('stickerPanel').classList.remove('active');
            vibrate();
        }
        function renderStickerPreview() {
            const stickers = getStickers();
            const preview = document.getElementById('stickerPreview');
            preview.innerHTML = '';
            stickers.forEach((base64, index) => {
                const container = document.createElement('div');
                container.style.position = 'relative';
                container.style.display = 'inline-block';
                const img = document.createElement('img');
                img.src = base64;
                container.appendChild(img);
                const remove = document.createElement('span');
                remove.className = 'remove-sticker';
                remove.textContent = '×';
                remove.style.position = 'absolute';
                remove.style.top = '-6px';
                remove.style.right = '-6px';
                remove.style.background = '#f44';
                remove.style.color = '#fff';
                remove.style.borderRadius = '50%';
                remove.style.width = '18px';
                remove.style.height = '18px';
                remove.style.fontSize = '12px';
                remove.style.textAlign = 'center';
                remove.style.lineHeight = '18px';
                remove.style.cursor = 'pointer';
                remove.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const stickers = getStickers();
                    stickers.splice(index, 1);
                    saveStickers(stickers);
                    renderStickerPreview();
                    renderStickers();
                });
                container.appendChild(remove);
                preview.appendChild(container);
            });
        }
        document.getElementById('stickerUpload').addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files.length) return;
            const stickers = getStickers();
            for (const file of files) {
                try {
                    const blob = await file.arrayBuffer().then(buf => new Blob([buf], { type: file.type }));
                    const base64 = await blobToBase64(blob);
                    stickers.push(base64);
                } catch(err) { console.warn('Ошибка загрузки стикера:', err); }
            }
            saveStickers(stickers);
            renderStickers();
            renderStickerPreview();
            e.target.value = '';
        });

        function scrollToBottom() { document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight; }
        function autoScrollIfNeeded() { if (!isScrolledUp) scrollToBottom(); }
        document.getElementById('chatMessages').addEventListener('scroll', () => {
            const threshold = 100;
            const chat = document.getElementById('chatMessages');
            const isBottom = chat.scrollTop >= chat.scrollHeight - chat.clientHeight - threshold;
            if (isBottom) { document.getElementById('scrollDownBtn').classList.remove('show'); isScrolledUp = false; }
            else { document.getElementById('scrollDownBtn').classList.add('show'); isScrolledUp = true; }
        });
        document.getElementById('scrollDownBtn').addEventListener('click', () => { scrollToBottom(); document.getElementById('scrollDownBtn').classList.remove('show'); });

        function openAudioPlayer(audioElement) {
            currentAudio = audioElement;
            document.getElementById('playPauseBtn').textContent = audioElement.paused ? '▶' : '⏸';
            document.getElementById('volumeSlider').value = audioElement.volume;
            document.getElementById('speedSelect').value = audioElement.playbackRate;
            document.getElementById('audioPlayer').classList.add('show');
        }
        document.getElementById('playPauseBtn').addEventListener('click', () => {
            if (!currentAudio) return;
            if (currentAudio.paused) { currentAudio.play(); document.getElementById('playPauseBtn').textContent = '⏸'; }
            else { currentAudio.pause(); document.getElementById('playPauseBtn').textContent = '▶'; }
        });
        document.getElementById('volumeSlider').addEventListener('input', (e) => { if (currentAudio) currentAudio.volume = parseFloat(e.target.value); });
        document.getElementById('speedSelect').addEventListener('change', (e) => { if (currentAudio) currentAudio.playbackRate = parseFloat(e.target.value); });
        document.getElementById('closePlayerBtn').addEventListener('click', () => { if (currentAudio) { currentAudio.pause(); currentAudio = null; } document.getElementById('audioPlayer').classList.remove('show'); });
        document.addEventListener('ended', (e) => { if (e.target === currentAudio) document.getElementById('playPauseBtn').textContent = '▶'; }, true);

        async function initVideoChat() {
            if (!localStream) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    localStream = stream;
                    document.getElementById('localVideo').srcObject = stream;
                    document.getElementById('localPlaceholder').classList.add('hidden');
                    document.getElementById('camBtn').classList.add('active');
                    document.getElementById('micBtn').classList.add('active');
                } catch(e) { alert('Не удалось получить доступ к камере/микрофону: ' + e.message); }
            }
        }
        document.getElementById('camBtn').addEventListener('click', () => { if (localStream) { const tracks = localStream.getVideoTracks(); if (tracks.length) { const t = tracks[0]; t.enabled = !t.enabled; document.getElementById('camBtn').classList.toggle('active', t.enabled); document.getElementById('camBtn').textContent = t.enabled ? '📷 Камера' : '📷 Выкл'; } } });
        document.getElementById('micBtn').addEventListener('click', () => { if (localStream) { const tracks = localStream.getAudioTracks(); if (tracks.length) { const t = tracks[0]; t.enabled = !t.enabled; document.getElementById('micBtn').classList.toggle('active', t.enabled); document.getElementById('micBtn').textContent = t.enabled ? '🎤 Микрофон' : '🎤 Выкл'; } } });
        document.getElementById('screenBtn').addEventListener('click', async () => { if (isScreenSharing) stopScreenShare(); else await startScreenShare(); });
        async function startScreenShare() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                screenStream = stream;
                const vTrack = stream.getVideoTracks()[0];
                const old = localStream.getVideoTracks()[0];
                if (old) { localStream.removeTrack(old); old.stop(); }
                localStream.addTrack(vTrack);
                document.getElementById('localVideo').srcObject = localStream;
                if (currentCall) {
                    const sender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) await sender.replaceTrack(vTrack);
                }
                isScreenSharing = true;
                document.getElementById('screenBtn').classList.add('active');
                document.getElementById('screenBtn').textContent = '🖥️ Остановить';
                document.getElementById('camBtn').classList.remove('active');
                document.getElementById('camBtn').textContent = '📷 Выкл';
                vTrack.onended = () => stopScreenShare();
            } catch(e) { alert('Ошибка доступа к экрану: '+e.message); }
        }
        function stopScreenShare() {
            if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); screenStream = null; }
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then(camStream => {
                    const newTrack = camStream.getVideoTracks()[0];
                    const old = localStream.getVideoTracks()[0];
                    if (old) { localStream.removeTrack(old); old.stop(); }
                    localStream.addTrack(newTrack);
                    document.getElementById('localVideo').srcObject = localStream;
                    if (currentCall) {
                        const sender = currentCall.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                        if (sender) sender.replaceTrack(newTrack);
                    }
                    isScreenSharing = false;
                    document.getElementById('screenBtn').classList.remove('active');
                    document.getElementById('screenBtn').textContent = '🖥️ Демка';
                    document.getElementById('camBtn').classList.add('active');
                    document.getElementById('camBtn').textContent = '📷 Камера';
                }).catch(err => console.error('Не удалось вернуть камеру:', err));
        }
        document.getElementById('disconnectBtn').addEventListener('click', () => {
            if (currentCall) { currentCall.close(); currentCall = null; }
            if (peer) { peer.destroy(); peer = null; }
            document.getElementById('remoteVideo').srcObject = null;
            document.getElementById('remotePlaceholder').classList.remove('hidden');
            isConnected = false;
            clients = {}; myDataConnection = null;
            updateMenuStatus(false, 'Отключено');
        });
        function setupCall(call) {
            currentCall = call;
            call.on('stream', (stream) => {
                document.getElementById('remoteVideo').srcObject = stream;
                document.getElementById('remotePlaceholder').classList.add('hidden');
                isConnected = true;
                updateMenuStatus(true, 'Видео подключено');
            });
            call.on('close', () => {
                document.getElementById('remoteVideo').srcObject = null;
                document.getElementById('remotePlaceholder').classList.remove('hidden');
                isConnected = false;
                currentCall = null;
                updateMenuStatus(false, 'Видео отключено');
            });
        }

        document.getElementById('scheduleCancel').addEventListener('click', () => document.getElementById('scheduleDialog').classList.remove('active'));
        document.getElementById('scheduleConfirm').addEventListener('click', () => {
            const timeStr = document.getElementById('scheduleTime').value;
            if (!timeStr) { alert('Выберите время'); return; }
            const [hours, minutes] = timeStr.split(':').map(Number);
            const now = new Date();
            let target = new Date();
            target.setHours(hours, minutes, 0, 0);
            if (target <= now) target.setDate(target.getDate() + 1);
            const delayMs = target - now;
            if (delayMs < 60000) { alert('Выберите время хотя бы через 1 минуту'); return; }
            const text = document.getElementById('chatInput').value.trim();
            if (!text) { alert('Напишите сообщение для отложенной отправки.'); return; }
            const timer = setTimeout(() => {
                sendMessageToFirebase({ type: 'text', text });
                vibrate();
            }, delayMs);
            scheduledTimers.push(timer);
            document.getElementById('scheduleDialog').classList.remove('active');
            document.getElementById('chatInput').value = '';
            alert(`Сообщение будет отправлено в ${target.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })}`);
        });

        function initPeer() {
            const uniqueId = ROOM_ID + '-' + Date.now() + '-' + Math.random().toString(36).substr(2,6);
            peer = new Peer(uniqueId, {
                host: 'truesignal.herokuapp.com',
                port: 443,
                path: '/',
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: ['turn:openrelay.metered.ca:80','turn:openrelay.metered.ca:443'], username:'openrelayproject', credential:'openrelayproject' },
                        { urls: ['turn:global.turn.twilio.com:3478?transport=udp','turn:global.turn.twilio.com:3478?transport=tcp'], username:'2d0c2eb0d1f5f7b6d9e2b5c8f3a6e7d9', credential:'q3k9w7f2' }
                    ]
                }
            });
            peer.on('open', () => {
                const conn = peer.connect(ROOM_ID);
                conn.on('open', () => {
                    myDataConnection = conn;
                    conn.send({ type: 'chat', text: '👋 Я здесь', sender: myName });
                    conn.on('data', (data) => {});
                    conn.on('close', () => { myDataConnection = null; });
                });
                peer.on('connection', (conn) => {
                    clients[conn.peer] = conn;
                    conn.on('data', (data) => {});
                    conn.on('close', () => { delete clients[conn.peer]; });
                });
                peer.on('call', (call) => {
                    if (currentCall) { call.close(); return; }
                    if (!localStream) {
                        navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                            .then(stream => {
                                localStream = stream;
                                document.getElementById('localVideo').srcObject = stream;
                                document.getElementById('localPlaceholder').classList.add('hidden');
                                call.answer(stream);
                                setupCall(call);
                            })
                            .catch(() => call.close());
                    } else {
                        call.answer(localStream);
                        setupCall(call);
                    }
                });
            });
        }

        function initApp() {
            document.getElementById('localLabel').textContent = myName;
            document.getElementById('nicknameInput').value = myName;
            const savedZoom = localStorage.getItem('zoomLevel');
            if (savedZoom) { document.getElementById('zoomSlider').value = parseInt(savedZoom); applyZoom(parseInt(savedZoom)); }
            else applyZoom(100);
            const savedTheme = localStorage.getItem('lightTheme') === 'true';
            document.getElementById('lightThemeToggle').checked = savedTheme;
            applyTheme(savedTheme);
            myColor = getMyColor();
            document.getElementById('myColorPicker').value = myColor;
            const bg = getChatBg();
            document.querySelector('.chat-messages').style.background = bg;
            document.querySelectorAll('.bg-selector button').forEach(btn => btn.classList.toggle('active-bg', btn.dataset.bg === bg));
            renderStickers();
            renderStickerPreview();
            updateMenuStatus(true, 'Подключено');
            loadChatList();
            if (!peer) initPeer();
        }

        window.addEventListener('beforeunload', () => {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (screenStream) screenStream.getTracks().forEach(t => t.stop());
            if (peer) peer.destroy();
            if (voiceRecorder && voiceRecorder.state !== 'inactive') voiceRecorder.stop();
            if (recRecorder && recRecorder.state !== 'inactive') recRecorder.stop();
            scheduledTimers.forEach(t => clearTimeout(t));
        });
    </script>
</body>
