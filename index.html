<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>арбузник</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #f0f0f0; font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; overflow: hidden; }
        .app { display: flex; flex-direction: column; width: 100%; height: 100%; }
        .topbar { background: #141414; padding: 8px 16px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .topbar .title { font-size: 18px; font-weight: 700; color: #d0d0d0; }
        .topbar .user { font-size: 14px; color: #888; }
        .chat { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
        .msg { max-width: 70%; padding: 6px 12px; border-radius: 14px; word-wrap: break-word; align-self: flex-start; background: #1a2a3a; border: 1px solid #333; }
        .msg.me { align-self: flex-end; background: #2e2e2e; }
        .msg .sender { font-size: 11px; color: #888; }
        .msg .time { font-size: 9px; color: #555; margin-left: 6px; }
        .input-area { display: flex; gap: 8px; padding: 8px; background: #141414; border-top: 1px solid #333; }
        .input-area input { flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid #333; background: #1c1c1c; color: #fff; outline: none; }
        .input-area button { padding: 8px 20px; border-radius: 20px; border: none; background: #4a6d8a; color: #fff; cursor: pointer; }
        .input-area button:hover { background: #5a8aaa; }
        .users { font-size: 12px; color: #888; padding: 4px 12px; background: #141414; border-top: 1px solid #333; display: flex; gap: 8px; }
        .user-tag { background: #2a2a2a; padding: 2px 10px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="title">🍉 арбузник</div>
            <div class="user" id="userDisplay">Владелец</div>
        </div>
        <div class="chat" id="chat"></div>
        <div id="typing" style="display:none; padding:4px 12px; font-size:12px; color:#888;">печатает...</div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Сообщение..." />
            <button id="sendBtn">➤</button>
        </div>
        <div class="users">
            <span>Онлайн: </span>
            <span id="onlineUsers">никого</span>
        </div>
    </div>

    <script>
        // ============================================================
        // ТВОЙ КОНФИГ (я его вставил)
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyBfbqC_V6CccqDjr2cTvbjy-__PdHVG-uQ",
            authDomain: "arbuzznik-7a21d.firebaseapp.com",
            databaseURL: "https://arbuzznik-7a21d-default-rtdb.firebaseio.com",
            projectId: "arbuzznik-7a21d",
            storageBucket: "arbuzznik-7a21d.firebasestorage.app",
            messagingSenderId: "326639264651",
            appId: "1:326639264651:web:a93d929a767bc4e625458e",
            measurementId: "G-9GFCCMYN8N"
        };

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ============================================================
        // ПЕРЕМЕННЫЕ
        // ============================================================
        const chatEl = document.getElementById('chat');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const userDisplay = document.getElementById('userDisplay');
        const onlineUsers = document.getElementById('onlineUsers');

        let myName = localStorage.getItem('username') || '';
        if (!myName) {
            const name = prompt('Ты Владелец или Тестировщик?', 'Владелец');
            if (name === 'Тестировщик' || name === 'тестировщик') {
                myName = 'Тестировщик';
            } else {
                myName = 'Владелец';
            }
            localStorage.setItem('username', myName);
        }
        userDisplay.textContent = myName;

        // ============================================================
        // СЛУШАЕМ СООБЩЕНИЯ
        // ============================================================
        const messagesRef = database.ref('messages');
        messagesRef.on('child_added', (snapshot) => {
            const data = snapshot.val();
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg' + (data.sender === myName ? ' me' : '');
            msgDiv.innerHTML = `
                <div class="sender">${data.sender} <span class="time">${data.time}</span></div>
                <div>${data.text}</div>
            `;
            chatEl.appendChild(msgDiv);
            chatEl.scrollTop = chatEl.scrollHeight;
        });

        // ============================================================
        // ОТПРАВКА
        // ============================================================
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            messagesRef.push({
                sender: myName,
                text: text,
                time: time
            });
            msgInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // ============================================================
        // ОНЛАЙН
        // ============================================================
        const onlineRef = database.ref('online');
        let onlineList = {};

        function updateOnline() {
            const names = Object.keys(onlineList).filter(name => name !== myName);
            if (names.length === 0) {
                onlineUsers.textContent = 'никого';
            } else {
                onlineUsers.textContent = names.join(', ');
            }
        }

        const myOnlineRef = onlineRef.child(myName);
        myOnlineRef.set(true);
        window.addEventListener('beforeunload', () => {
            myOnlineRef.remove();
        });

        onlineRef.on('value', (snapshot) => {
            onlineList = snapshot.val() || {};
            updateOnline();
        });

        console.log('арбузник на Firebase работает!');
    </script>
</body>
</html>
