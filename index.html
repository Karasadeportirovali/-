        // =================================================================
        // 14. ЧАТ – ОТОБРАЖЕНИЕ (с временем внизу слева)
        // =================================================================
        function addChatMessage(text, sender, time, id, replyTo, reactions, type, isMe) {
            const div = document.createElement('div');
            div.className = 'msg';
            if (isMe) div.classList.add('me');
            else div.classList.add('other');
            div.dataset.msgId = id;
            div.dataset.sender = sender;
            let replyHtml = replyTo ? `<div class="reply-to">↩️ ${replyTo.sender}: ${replyTo.text}</div>` : '';
            let contentHtml = '';
            if (type === 'videoMsg') {
                contentHtml = `<div class="circle-video"><video src="${text}" controls></video></div>`;
            } else if (type === 'voice') {
                contentHtml = `<div class="audio-preview"><button class="play-audio">▶</button><span class="duration">${text}</span></div>`;
            } else {
                contentHtml = `<div class="content">${text}</div>`;
            }
            let reactionsHtml = '';
            if (reactions && Object.keys(reactions).length > 0) {
                reactionsHtml = `<div class="reactions">`;
                for (const [emoji, users] of Object.entries(reactions)) reactionsHtml += `<span>${emoji} ${users.length}</span>`;
                reactionsHtml += `</div>`;
            }
            const senderColor = (sender === myName) ? myColor : '#ffcc00';
            const timeStr = time || new Date().toLocaleTimeString();
            div.innerHTML = `<div class="sender" style="color:${senderColor}">${sender}</div>${replyHtml}${contentHtml}${reactionsHtml}`;
            const timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            timeSpan.textContent = timeStr;
            div.appendChild(timeSpan);
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            if (type === 'voice') {
                const btn = div.querySelector('.play-audio');
                const audio = new Audio(text);
                let playing = false;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (playing) { audio.pause(); btn.textContent = '▶'; playing = false; }
                    else { audio.play(); btn.textContent = '⏸'; playing = true; }
                });
                audio.onended = () => { btn.textContent = '▶'; playing = false; };
            }
            addMessageInteractions(div, id, sender);
            return div;
        }

        function displayFileMessage(sender, url, name, mime, isMe, id) {
            const div = document.createElement('div');
            div.className = 'msg';
            if (isMe) div.classList.add('me');
            else div.classList.add('other');
            div.dataset.msgId = id; div.dataset.sender = sender;
            const time = new Date().toLocaleTimeString();
            let content = '';
            if (mime.startsWith('image/')) content = `<img src="${url}" alt="${name}" onclick="window.open('${url}')" style="max-width:160px;border-radius:10px;"/>`;
            else if (mime.startsWith('video/')) content = `<video controls src="${url}" style="max-width:180px;border-radius:10px;"></video>`;
            else if (mime.startsWith('audio/')) content = `<audio src="${url}" style="max-width:180px;"></audio>`;
            else content = `<span class="file-name">📎 ${name}</span>`;
            const senderColor = (sender === myName) ? myColor : '#ffcc00';
            div.innerHTML = `<div class="sender" style="color:${senderColor}">${sender}</div>${content}`;
            const timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            timeSpan.textContent = time;
            div.appendChild(timeSpan);
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            addMessageInteractions(div, id, sender);
        }

        function displayAudioMessage(sender, url, isMe, id) {
            const div = document.createElement('div');
            div.className = 'msg';
            if (isMe) div.classList.add('me');
            else div.classList.add('other');
            div.dataset.msgId = id; div.dataset.sender = sender;
            const time = new Date().toLocaleTimeString();
            const senderColor = (sender === myName) ? myColor : '#ffcc00';
            div.innerHTML = `<div class="sender" style="color:${senderColor}">${sender}</div><audio controls src="${url}" style="max-width:180px;"></audio>`;
            const timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            timeSpan.textContent = time;
            div.appendChild(timeSpan);
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            addMessageInteractions(div, id, sender);
        }

        function displayVideoMessage(sender, url, isMe, id) {
            const div = document.createElement('div');
            div.className = 'msg';
            if (isMe) div.classList.add('me');
            else div.classList.add('other');
            div.dataset.msgId = id; div.dataset.sender = sender;
            const time = new Date().toLocaleTimeString();
            const senderColor = (sender === myName) ? myColor : '#ffcc00';
            div.innerHTML = `<div class="sender" style="color:${senderColor}">${sender}</div><div class="circle-video"><video src="${url}" controls></video></div>`;
            const timeSpan = document.createElement('span');
            timeSpan.className = 'time';
            timeSpan.textContent = time;
            div.appendChild(timeSpan);
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            addMessageInteractions(div, id, sender);
        }

        function addMessageInteractions(div, id, sender) {
            let pressTimer = null;
            div.addEventListener('touchstart', (e) => {
                pressTimer = setTimeout(() => {
                    showContextMenu(e.touches[0].clientX, e.touches[0].clientY, id, sender);
                }, 600);
            });
            div.addEventListener('touchend', () => clearTimeout(pressTimer));
            div.addEventListener('touchmove', () => clearTimeout(pressTimer));
            div.addEventListener('mousedown', (e) => {
                if (e.button === 2) {
                    showContextMenu(e.clientX, e.clientY, id, sender);
                }
            });
            let startX = 0;
            div.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
            });
            div.addEventListener('touchend', (e) => {
                const endX = e.changedTouches[0].clientX;
                if (endX - startX > 80) {
                    const text = div.querySelector('.content')?.textContent || '[медиа]';
                    setReply(id, sender, text);
                }
            });
            div.addEventListener('click', (e) => {
                const target = e.target;
                if (target.tagName === 'A' || target.tagName === 'BUTTON' ||
                    target.tagName === 'VIDEO' || target.tagName === 'AUDIO' ||
                    target.tagName === 'IMG' || target.closest('.reactions')) {
                    return;
                }
                showContextMenu(e.clientX || e.pageX, e.clientY || e.pageY, id, sender);
            });
        }

        // =================================================================
        // 15. ИНДИКАТОР «ПЕЧАТАЕТ»
        // =================================================================
        function showTyping(sender) {
            if (sender === myName) return;
            typingIndicator.style.display = 'flex';
            isTypingVisible = true;
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                typingIndicator.style.display = 'none';
                isTypingVisible = false;
            }, 3000);
        }

        chatInput.addEventListener('input', () => {
            if (myDataConnection && myDataConnection.open) {
                myDataConnection.send({ type: 'typing', sender: myName });
            }
            if (isHost) {
                Object.values(clients).forEach(c => { if (c.open) c.send({ type: 'typing', sender: myName }); });
            }
        });

        // =================================================================
        // 16. ОТПРАВКА СООБЩЕНИЙ (только Enter) – С ОТЛАДКОЙ
        // =================================================================
        function sendTextMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            const id = Date.now() + '-' + Math.random().toString(36).substr(2,6);
            sentIds.add(id);
            addChatMessage(text, myName, null, id, replyTo, null, 'text', true);
            const msg = { text, sender:myName, time:new Date().toLocaleTimeString(), id, replyTo, reactions:null, type:'text' };
            saveChatMessage(msg);
            pendingMessages.push({ id, type:'chat', data:{text}, sender:myName, time:new Date().toLocaleTimeString() });
            console.log('📤 Отправка сообщения:', text, 'id:', id);
            sendChatMessageInternal(text, id, false, replyTo);
            chatInput.value = '';
            clearReply();
        }

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendTextMessage();
            }
        });

        function sendChatMessageInternal(text, id, isRetry=false, replyToParam=null) {
            const reply = replyToParam || replyTo;
            if (isHost) {
                console.log('📤 Хост рассылает всем');
                broadcastChatMessage(text, myName, null, id, reply, null, 'text');
                confirmPending(id);
            } else if (myDataConnection && myDataConnection.open) {
                console.log('📤 Клиент отправляет через dataConnection');
                myDataConnection.send({ type:'chat', text, sender:myName, id, replyTo:reply });
            } else {
                console.warn('Нет соединения, сообщение сохранено в pending');
            }
        }

        // =================================================================
        // 17. РЕАКЦИИ, РЕПЛАЙ, УДАЛЕНИЕ
        // =================================================================
        function updateReaction(msgId, emoji, sender) {
            const msgEl = document.querySelector(`[data-msg-id="${msgId}"]`);
            if (!msgEl) return;
            let reactions = msgEl.dataset.reactions ? JSON.parse(msgEl.dataset.reactions) : {};
            if (!reactions[emoji]) reactions[emoji] = [];
            if (reactions[emoji].includes(sender)) {
                reactions[emoji] = reactions[emoji].filter(u => u !== sender);
                if (reactions[emoji].length === 0) delete reactions[emoji];
            } else {
                reactions[emoji].push(sender);
            }
            msgEl.dataset.reactions = JSON.stringify(reactions);
            const reactionsDiv = msgEl.querySelector('.reactions');
            if (reactionsDiv) {
                reactionsDiv.innerHTML = '';
                for (const [emoji, users] of Object.entries(reactions)) {
                    const span = document.createElement('span');
                    span.textContent = `${emoji} ${users.length}`;
                    reactionsDiv.appendChild(span);
                }
            } else {
                const newDiv = document.createElement('div');
                newDiv.className = 'reactions';
                for (const [emoji, users] of Object.entries(reactions)) {
                    const span = document.createElement('span');
                    span.textContent = `${emoji} ${users.length}`;
                    newDiv.appendChild(span);
                }
                msgEl.appendChild(newDiv);
            }
        }
        function deleteMessageLocally(msgId) {
            const el = document.querySelector(`[data-msg-id="${msgId}"]`);
            if (el) el.remove();
        }
        function setReply(id, sender, text) {
            replyTo = { id, sender, text };
            replyIndicator.style.display = 'flex';
            replyText.textContent = `${sender}: ${text}`;
        }
        function clearReply() { replyTo = null; replyIndicator.style.display = 'none'; }
        cancelReply.addEventListener('click', clearReply);
        function showContextMenu(x, y, msgId, sender) {
            selectedMsgId = msgId;
            contextMenu.style.left = Math.min(x, window.innerWidth - 160) + 'px';
            contextMenu.style.top = Math.min(y, window.innerHeight - 120) + 'px';
            contextMenu.classList.add('active');
            ctxDelete.style.display = (sender === myName) ? 'block' : 'none';
        }
        document.addEventListener('click', () => contextMenu.classList.remove('active'));
        document.addEventListener('contextmenu', (e) => {
            if (!e.target.closest('.msg')) contextMenu.classList.remove('active');
        });
        document.querySelectorAll('[data-reaction]').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const emoji = el.dataset.reaction;
                if (selectedMsgId) {
                    if (isHost) {
                        Object.values(clients).forEach(c => {
                            if (c.open) c.send({ type:'reaction', msgId:selectedMsgId, reaction:emoji, sender:myName });
                        });
                        updateReaction(selectedMsgId, emoji, myName);
                    } else if (myDataConnection && myDataConnection.open) {
                        myDataConnection.send({ type:'reaction', msgId:selectedMsgId, reaction:emoji, sender:myName });
                    }
                    contextMenu.classList.remove('active');
                }
            });
        });
        ctxDelete.addEventListener('click', (e) => {
            e.stopPropagation();
            if (selectedMsgId) {
                if (isHost) {
                    Object.values(clients).forEach(c => {
                        if (c.open) c.send({ type:'delete', msgId:selectedMsgId });
                    });
                    deleteMessageLocally(selectedMsgId);
                } else if (myDataConnection && myDataConnection.open) {
                    myDataConnection.send({ type:'delete', msgId:selectedMsgId });
                }
                contextMenu.classList.remove('active');
            }
        });
        ctxReply.addEventListener('click', (e) => {
            e.stopPropagation();
            if (selectedMsgId) {
                const el = document.querySelector(`[data-msg-id="${selectedMsgId}"]`);
                if (el) {
                    const sender = el.dataset.sender;
                    const content = el.querySelector('.content')?.textContent || '[медиа]';
                    setReply(selectedMsgId, sender, content);
                }
                contextMenu.classList.remove('active');
            }
        });

        // =================================================================
        // 18. НАВИГАЦИЯ, МАСШТАБ, ТЕМА, ФОН, ЦВЕТ
        // =================================================================
        function applyZoom(value) {
            const percent = parseInt(value);
            mainWrapper.style.transform = `scale(${percent / 100})`;
            zoomValue.textContent = percent + '%';
            localStorage.setItem('zoomLevel', percent);
        }
        zoomSlider.addEventListener('input', (e) => applyZoom(e.target.value));
        zoomDefaultBtn.addEventListener('click', () => {
            zoomSlider.value = 100;
            applyZoom(100);
        });

        function applyTheme(light) {
            document.documentElement.classList.toggle('light', light);
            localStorage.setItem('lightTheme', light);
        }
        lightThemeToggle.addEventListener('change', (e) => applyTheme(e.target.checked));

        myColorPicker.addEventListener('input', (e) => {
            myColor = e.target.value;
            localStorage.setItem(MY_COLOR_KEY, myColor);
            document.querySelectorAll('.msg.me .sender').forEach(el => el.style.color = myColor);
        });

        bgButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const bg = btn.dataset.bg;
                document.querySelector('.chat-messages').style.background = bg;
                localStorage.setItem(BG_KEY, bg);
                bgButtons.forEach(b => b.classList.remove('active-bg'));
                btn.classList.add('active-bg');
            });
        });

        // ===== МЕНЮ =====
        function toggleMenu(open) {
            if (open === undefined) {
                const isOpen = sideMenu.classList.contains('open');
                open = !isOpen;
            }
            sideMenu.classList.toggle('open', open);
            menuOverlay.classList.toggle('active', open);
        }

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMenu();
        });
        menuOverlay.addEventListener('click', () => toggleMenu(false));

        menuItems.forEach(item => {
            item.addEventListener('click', () => {
                const tab = item.dataset.tab;
                menuItems.forEach(m => m.classList.remove('active'));
                item.classList.add('active');
                Object.keys(tabs).forEach(key => {
                    tabs[key].classList.toggle('active', key === tab);
                });
                toggleMenu(false);
                if (tab === 'room' && !localStream) {
                    startVideoStream().then(() => {
                        if (!isHost && myDataConnection && myDataConnection.open) {
                            const call = peer.call(ROOM_ID, localStream);
                            if (call) setupCall(call);
                        }
                    });
                }
            });
        });

        // =================================================================
        // 19. АУДИО-ПЛЕЕР
        // =================================================================
        function openAudioPlayer(audioElement) {
            currentAudio = audioElement;
            playPauseBtn.textContent = audioElement.paused ? '▶' : '⏸';
            volumeSlider.value = audioElement.volume;
            speedSelect.value = audioElement.playbackRate;
            audioPlayer.classList.add('show');
        }
        playPauseBtn.addEventListener('click', () => {
            if (!currentAudio) return;
            if (currentAudio.paused) {
                currentAudio.play();
                playPauseBtn.textContent = '⏸';
            } else {
                currentAudio.pause();
                playPauseBtn.textContent = '▶';
            }
        });
        volumeSlider.addEventListener('input', (e) => {
            if (!currentAudio) return;
            currentAudio.volume = parseFloat(e.target.value);
        });
        speedSelect.addEventListener('change', (e) => {
            if (!currentAudio) return;
            currentAudio.playbackRate = parseFloat(e.target.value);
        });
        closePlayerBtn.addEventListener('click', () => {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            audioPlayer.classList.remove('show');
        });
        document.addEventListener('ended', (e) => {
            if (e.target === currentAudio) playPauseBtn.textContent = '▶';
        }, true);

        // =================================================================
        // 20. КРУЖКИ – ЗАПИСЬ И ОТПРАВКА
        // =================================================================
        let recMediaStream = null;
        let recRecorder = null;
        let recRecordedChunks = [];
        let recIsRecording = false;
        let recTimerIntervalCircle = null;
        let recSecondsCircle = 0;

        function openRecorder() {
            if (recIsRecording) return;
            (async () => {
                try {
                    const constraints = {
                        video: { facingMode: facingMode, width: { ideal: 320 }, height: { ideal: 320 } },
                        audio: true
                    };
                    recMediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                    recPreview.srcObject = recMediaStream;
                    recordingModal.classList.add('active');
                    recTimer.textContent = '0:00';
                    recSecondsCircle = 0;
                    recRecordedChunks = [];
                    recIsRecording = false;
                    startRecordingCircle();
                } catch(e) { alert('Ошибка доступа к камере: '+e.message); }
            })();
        }

        function startRecordingCircle() {
            if (recMediaStream) {
                recRecorder = new MediaRecorder(recMediaStream);
                recRecordedChunks = [];
                recRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recRecordedChunks.push(e.data);
                };
                recRecorder.onstop = async () => {
                    const blob = new Blob(recRecordedChunks, { type: 'video/mp4' });
                    const id = Date.now() + '-' + Math.random().toString(36).substr(2,6);
                    sentIds.add(id);
                    const url = URL.createObjectURL(blob);
                    addChatMessage(url, myName, null, id, null, null, 'videoMsg', true);
                    const base64 = await blobToBase64(blob);
                    const msg = { type:'videoMsg', sender:myName, time:new Date().toLocaleTimeString(), id, data:base64, mime:'video/mp4' };
                    saveChatMessage(msg);
                    pendingMessages.push({ id, type:'videoMsg', data:{blob}, sender:myName, time:new Date().toLocaleTimeString() });
                    sendVideoMsgInternal(blob, id);
                    closeRecorderCircle();
                };
                recRecorder.start(100);
                recIsRecording = true;
                recSecondsCircle = 0;
                recTimerIntervalCircle = setInterval(() => {
                    recSecondsCircle++;
                    const mins = Math.floor(recSecondsCircle / 60);
                    const secs = recSecondsCircle % 60;
                    recTimer.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                    if (recSecondsCircle >= 60) {
                        if (recRecorder && recRecorder.state !== 'inactive') {
                            recRecorder.stop();
                            recIsRecording = false;
                            if (recTimerIntervalCircle) clearInterval(recTimerIntervalCircle);
                        }
                    }
                }, 1000);
            }
        }

        function stopRecordingAndSendCircle() {
            if (recRecorder && recRecorder.state === 'recording') {
                recRecorder.stop();
                recIsRecording = false;
                if (recTimerIntervalCircle) clearInterval(recTimerIntervalCircle);
            }
        }

        function closeRecorderCircle() {
            if (recRecorder && recRecorder.state !== 'inactive') {
                try { recRecorder.stop(); } catch(e) {}
            }
            if (recMediaStream) {
                recMediaStream.getTracks().forEach(t => t.stop());
                recMediaStream = null;
            }
            if (recTimerIntervalCircle) clearInterval(recTimerIntervalCircle);
            recordingModal.classList.remove('active');
            recIsRecording = false;
        }

        recSendBtn.addEventListener('click', () => {
            if (recIsRecording) {
                stopRecordingAndSendCircle();
            } else {
                closeRecorderCircle();
            }
        });

        recCancelBtn.addEventListener('click', () => {
            closeRecorderCircle();
        });

        flipBtn.addEventListener('click', () => {
            facingMode = (facingMode === 'user') ? 'environment' : 'user';
            if (recMediaStream) {
                recMediaStream.getTracks().forEach(t => t.stop());
                openRecorder();
            }
        });

        flashBtn.addEventListener('click', () => {
            flashActive = !flashActive;
            if (flashActive && facingMode === 'environment') {
                const track = recMediaStream?.getVideoTracks()[0];
                if (track) {
                    try {
                        track.applyConstraints({ advanced: [{ torch: true }] });
                    } catch(e) {}
                }
            } else {
                const track = recMediaStream?.getVideoTracks()[0];
                if (track) {
                    try {
                        track.applyConstraints({ advanced: [{ torch: false }] });
                    } catch(e) {}
                }
            }
            flashBtn.style.opacity = flashActive ? '1' : '0.5';
        });

        function sendVideoMsgInternal(blob, id, isRetry=false) {
            if (isHost) {
                blobToBase64(blob).then(b64 => {
                    Object.values(clients).forEach(c => {
                        if (c.open) c.send({ type:'videoMsg', file:blob, sender:myName, id, data:b64, mime:'video/mp4' });
                    });
                });
                confirmPending(id);
            } else if (myDataConnection && myDataConnection.open) {
                blobToBase64(blob).then(b64 => {
                    myDataConnection.send({ type:'videoMsg', file:blob, sender:myName, id, data:b64, mime:'video/mp4' });
                });
            } else { console.warn('Нет соединения, кружок сохранён в pending'); }
        }

        // =================================================================
        // 21. ТАБЫ
        // =================================================================
        const tabs = {
            room: document.getElementById('roomTab'),
            chat: document.getElementById('chatTab'),
            settings: document.getElementById('settingsTab'),
        };

        // =================================================================
        // 22. ИНИЦИАЛИЗАЦИЯ
        // =================================================================
        function init() {
            if (!localStorage.getItem('userChoice')) {
                showModal();
            } else {
                loadSettings();
                initConnection();
            }
            loadSettings();
            renderStickerPreview();

            chatInput.addEventListener('focus', () => {
                setTimeout(() => {
                    chatInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            });
        }

        window.addEventListener('beforeunload', () => {
            if (localStream) localStream.getTracks().forEach(t=>t.stop());
            if (screenStream) screenStream.getTracks().forEach(t=>t.stop());
            if (peer) peer.destroy();
            if (voiceRecorder && voiceRecorder.state !== 'inactive') voiceRecorder.stop();
            if (recRecorder && recRecorder.state !== 'inactive') recRecorder.stop();
            if (reconnectTimer) clearTimeout(reconnectTimer);
        });

        const saved = localStorage.getItem('userChoice');
        if (saved) {
            userRadios.forEach(r => r.checked = (r.value === saved));
        }
        userRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.checked) setUser(e.target.value);
            });
        });

        init();
        console.log('🚀 арбузник запущен. Отправляй сообщения – они должны доходить!');
    </script>
</body>
</html>
