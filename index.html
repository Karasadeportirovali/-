<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>арбузник</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* ===== ВСЕ СТИЛИ (сжато, но полностью) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --bg2: #141414; --bg3: #1c1c1c; --bg4: #252525; --bg5: #2e2e2e;
            --br: #3a3a3a; --txt: #f0f0f0; --txt2: #b0b0b0; --txt3: #777;
            --ac: #d0d0d0; --ach: #aaa; --sh: 0 2px 10px rgba(0,0,0,.6);
            --msg-other-bg: #1a2a3a; --chat-bg: #0a0a0a;
            --msg-bg-me: #2e2e2e; --msg-bg-other: #1a2a3a;
            --menu-bg: #1a1a1a; --menu-border: #2a2a2a; --menu-text: #ddd;
            --menu-hover: #2a2a2a; --menu-active: #333;
        }
        .light {
            --bg: #f5f5f5; --bg2: #e8e8e8; --bg3: #d8d8d8; --bg4: #d0d0d0; --bg5: #c0c0c0;
            --br: #b0b0b0; --txt: #1a1a1a; --txt2: #444; --txt3: #777;
            --ac: #222; --ach: #555; --sh: 0 2px 10px rgba(0,0,0,.15);
            --msg-other-bg: #fff8e7; --chat-bg: #f5f5f5;
            --msg-bg-me: #fff8e7; --msg-bg-other: #fff8e7;
            --menu-bg: #f0f0f0; --menu-border: #ddd; --menu-text: #222;
            --menu-hover: #e0e0e0; --menu-active: #d0d0d0;
        }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; overflow: hidden; }

        /* ===== МЕНЮ ===== */
        .menu-btn {
            position: fixed; top:12px; left:12px; z-index:100; background:var(--bg2); border:1px solid var(--br); border-radius:50%;
            width:44px; height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--txt); transition:.2s; box-shadow:var(--sh);
        }
        .menu-btn:hover { background:var(--bg3); }
        .menu-btn svg { width:24px; height:24px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .menu-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:99; display:none; backdrop-filter:blur(2px); }
        .menu-overlay.active { display:block; }
        .side-menu {
            position:fixed; top:0; left:-280px; width:280px; height:100%; background:var(--menu-bg); border-right:1px solid var(--menu-border); z-index:100;
            transition:left 0.3s cubic-bezier(0.4,0,0.2,1); padding:80px 20px 20px 20px; display:flex; flex-direction:column; gap:2px; box-shadow:var(--sh);
        }
        .side-menu.open { left:0; }
        .side-menu .logo { font-size:18px; font-weight:600; color:var(--menu-text); letter-spacing:1px; padding:0 0 20px 0; border-bottom:1px solid var(--menu-border); margin-bottom:12px; }
        .side-menu .menu-item {
            padding:10px 12px; border-radius:6px; font-size:15px; display:flex; align-items:center; gap:12px; color:var(--txt2); cursor:pointer; transition:.15s;
            border:none; background:transparent; width:100%; text-align:left; font-weight:400;
            position:relative;
        }
        .side-menu .menu-item:hover { background:var(--menu-hover); color:var(--txt); }
        .side-menu .menu-item.active { background:var(--menu-active); color:var(--txt); font-weight:500; }
        .side-menu .menu-item .icon { font-size:18px; width:24px; text-align:center; color:var(--txt2); }
        .side-menu .menu-item .badge { position:absolute; right:16px; top:50%; transform:translateY(-50%); background:#f44; color:#fff; font-size:11px; font-weight:600; border-radius:50%; min-width:20px; height:20px; display:flex; align-items:center; justify-content:center; padding:0 4px; display:none; }
        .side-menu .menu-item .badge.show { display:flex; }
        .side-menu .status-indicator { display:flex; align-items:center; gap:8px; padding:12px 12px 0 12px; font-size:13px; color:var(--txt2); margin-top:auto; border-top:1px solid var(--menu-border); padding-top:16px; }
        .side-menu .status-indicator .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
        .side-menu .status-indicator .dot.online { background:#5a5; }
        .side-menu .status-indicator .dot.offline { background:#a55; }
        .side-menu .version-info { text-align:center; font-size:12px; color:var(--txt3); padding:12px 0 4px 0; border-top:1px solid var(--menu-border); margin-top:8px; }

        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        .main { flex:1; display:flex; flex-direction:column; background:var(--bg); min-width:0; transition:transform .15s, background .2s; transform-origin:top left; position:relative; }
        .topbar {
            display:flex; align-items:center; justify-content:space-between; padding:6px 12px 6px 64px; background:var(--bg2); border-bottom:1px solid var(--br); flex-shrink:0; flex-wrap:wrap; gap:4px; min-height:52px;
            position:relative;
        }
        .topbar .title { font-size:16px; font-weight:700; color:var(--ac); letter-spacing:1px; }
        .topbar .datetime { font-size:11px; color:var(--txt2); background:var(--bg3); padding:2px 10px; border-radius:20px; border:1px solid var(--br); white-space:nowrap; }
        .topbar .more-btn { background:transparent; border:1px solid var(--br); border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; color:var(--txt2); cursor:pointer; font-size:18px; transition:.2s; }
        .topbar .more-btn:hover { background:var(--bg3); color:var(--txt); }
        .topbar .more-menu { display:none; position:absolute; right:12px; top:48px; background:var(--bg2); border:1px solid var(--br); border-radius:12px; padding:4px 0; min-width:160px; box-shadow:var(--sh); z-index:200; }
        .topbar .more-menu.active { display:block; }
        .topbar .more-menu button { display:block; width:100%; padding:8px 16px; background:transparent; border:none; color:var(--txt); text-align:left; font-size:13px; cursor:pointer; transition:.15s; }
        .topbar .more-menu button:hover { background:var(--bg3); }
        .content { flex:1; display:flex; overflow:hidden; position:relative; }
        .tab { display:none; width:100%; height:100%; flex-direction:column; padding:0; overflow-y:auto; }
        .tab.active { display:flex; }

        /* ===== ЭКРАН ВХОДА ===== */
        .login-screen {
            position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:9999;
            display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;
        }
        .login-screen.hidden { display:none; }
        .login-screen .box { background:var(--bg2); padding:30px; border-radius:24px; max-width:360px; width:90%; border:1px solid var(--br); box-shadow:var(--sh); }
        .login-screen .box h2 { color:var(--ac); margin-bottom:16px; text-align:center; }
        .login-screen .box input { width:100%; padding:10px 14px; margin-bottom:12px; border-radius:40px; border:1px solid var(--br); background:var(--bg3); color:var(--txt); outline:none; font-size:15px; }
        .login-screen .box input:focus { border-color:var(--ac); }
        .login-screen .box .btn { width:100%; padding:10px; border-radius:40px; border:none; background:#4a6d8a; color:#fff; font-size:16px; font-weight:600; cursor:pointer; transition:.15s; }
        .login-screen .box .btn:hover { background:#5a8aaa; }
        .login-screen .box .toggle-link { color:var(--txt2); font-size:14px; text-align:center; margin-top:12px; cursor:pointer; }
        .login-screen .box .toggle-link:hover { color:var(--txt); }

        /* ===== ОБЩИЙ ЧАТ (ГРУППА) ===== */
        .chat-messages {
            flex:1; overflow-y:auto; padding:6px 8px; background:var(--chat-bg); border:none; border-radius:0; margin-bottom:0;
            transition:background .3s; display:flex; flex-direction:column; gap:2px; scrollbar-width:none; -ms-overflow-style:none;
            position:relative;
        }
        .chat-messages::-webkit-scrollbar { display:none; }
        .chat-messages .msg { max-width:70%; padding:5px 12px 16px 12px; border-radius:14px; word-wrap:break-word; position:relative; animation:msgSlide .3s ease; margin-bottom:2px; align-self:flex-end !important; background:var(--msg-bg-me); border:1px solid var(--br); }
        .chat-messages .msg.other { align-self:flex-start !important; background:var(--msg-bg-other); }
        .chat-messages .msg.me { align-self:flex-end !important; background:var(--msg-bg-me); border:1px solid var(--br); }
        .chat-messages .msg .sender { font-size:11px; color:var(--txt2); margin-bottom:2px; font-weight:600; }
        .chat-messages .msg .msg-footer { display:flex; justify-content:flex-end; align-items:center; gap:4px; margin-top:2px; font-size:10px; color:var(--txt3); }
        .chat-messages .msg .msg-footer .time { font-size:9px; }
        .chat-messages .msg .reply-to { font-size:11px; color:var(--ac); background:var(--bg3); padding:2px 8px; border-radius:8px; margin-bottom:3px; border-left:3px solid var(--ac); }
        .chat-messages .msg .content { word-wrap:break-word; }
        .chat-messages .msg .sticker-img { max-width:128px; max-height:128px; border-radius:12px; display:block; margin:4px 0; }
        .chat-messages .msg .audio-preview { display:flex; align-items:center; gap:8px; background:var(--bg3); padding:4px 12px; border-radius:40px; margin-top:4px; max-width:180px; }
        .chat-messages .msg .audio-preview button { background:0 0; border:0; color:var(--ac); font-size:16px; cursor:pointer; }
        .chat-messages .msg .audio-preview .duration { font-size:12px; color:var(--txt2); }
        .chat-messages .msg .reactions { display:flex; gap:4px; margin-top:4px; flex-wrap:wrap; }
        .chat-messages .msg .reactions span { background:var(--bg3); padding:0 6px; border-radius:12px; font-size:13px; cursor:pointer; transition:.1s; }
        .chat-messages .msg .file-preview { display:flex; align-items:center; gap:10px; background:var(--bg3); padding:6px 12px; border-radius:10px; margin-top:4px; max-width:200px; }
        .chat-messages .msg .file-preview .icon { font-size:24px; }
        .chat-messages .msg .file-preview .info { display:flex; flex-direction:column; }
        .chat-messages .msg .file-preview .info .name { font-size:13px; color:var(--txt); word-break:break-all; }
        .chat-messages .msg .file-preview .info .size { font-size:10px; color:var(--txt3); }
        .chat-messages .msg.msg-video { padding:0 !important; background:transparent !important; border:none !important; max-width:200px; margin:4px 0; }
        .chat-messages .msg.msg-video .circle-video { width:200px; height:200px; border-radius:50%; overflow:hidden; background:#000; cursor:pointer; position:relative; }
        .chat-messages .msg.msg-video .circle-video video { width:100%; height:100%; object-fit:cover; display:block; }

        @keyframes msgSlide { 0% { opacity:0; transform:translateY(10px) scale(0.95); } 100% { opacity:1; transform:translateY(0) scale(1); } }
        .typing-indicator { display:flex; align-items:center; gap:6px; padding:4px 10px; background:var(--bg3); border-radius:20px; align-self:flex-start; margin-bottom:4px; animation:msgSlide .3s ease; }
        .typing-indicator span { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--txt2); animation:typing-bounce 1.4s infinite; }
        .typing-indicator span:nth-child(2) { animation-delay:0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay:0.4s; }
        @keyframes typing-bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }
        .chat-input-area {
            display:flex; gap:6px; align-items:center; flex-shrink:0; background:var(--bg2); padding:6px 10px; border-radius:40px; border:1px solid var(--br); position:relative; margin:6px 8px;
        }
        .chat-input-area input[type="text"] { flex:1; background:0 0; border:0; color:var(--txt); font-size:14px; outline:0; padding:6px 0; }
        .chat-input-area button { background:0 0; border:0; color:var(--txt2); font-size:18px; cursor:pointer; padding:4px 6px; transition:.2s; position:relative; }
        .chat-input-area button:hover { color:var(--txt); }
        .chat-input-area button.primary { color:var(--ac); font-size:20px; }
        .chat-input-area .circle-btn { font-size:20px; }
        .reply-indicator { background:var(--bg3); padding:4px 10px; border-radius:16px; font-size:12px; color:var(--txt2); display:flex; align-items:center; gap:6px; margin:0 8px 4px; }
        .reply-indicator .cancel-reply { cursor:pointer; color:#f44; font-weight:bold; }
        .scroll-down-btn {
            position:absolute; bottom:80px; right:20px; background:var(--bg2); border:1px solid var(--br); border-radius:50%;
            width:44px; height:44px; display:flex; align-items:center; justify-content:center; color:var(--txt2); font-size:20px;
            cursor:pointer; box-shadow:var(--sh); transition:.2s; z-index:50;
            opacity:0; pointer-events:none; transform:translateY(10px);
        }
        .scroll-down-btn.show { opacity:1; pointer-events:auto; transform:translateY(0); }

        /* ===== ВИДЕО КОМНАТА ===== */
        .video-grid {
            display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:10px; flex:1; padding:12px; overflow-y:auto; align-content:start;
        }
        .video-card {
            background:var(--bg3); border-radius:16px; overflow:hidden; position:relative; display:flex; align-items:center; justify-content:center;
            border:1px solid var(--br); min-height:120px; aspect-ratio: 4/3;
        }
        .video-card video { width:100%; height:100%; object-fit:cover; background:#000; transform:scaleX(-1); }
        .video-card .camera-placeholder {
            position:absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center;
            font-size:48px; color:#888; background:var(--bg3); pointer-events:none; transition: opacity 0.3s;
        }
        .video-card .camera-placeholder.hidden { opacity:0; }
        .video-card .label {
            position:absolute; bottom:8px; left:8px; background:rgba(0,0,0,.6); padding:2px 12px; border-radius:20px;
            font-size:12px; color:#ccc; backdrop-filter:blur(4px); border:1px solid var(--br); z-index:2;
        }
        .controls-room {
            display:flex; justify-content:center; gap:8px; flex-shrink:0; padding:6px 0 12px; flex-wrap:wrap; position:relative; z-index:2;
        }
        .controls-room button {
            background:var(--bg3); border:1px solid var(--br); padding:6px 14px; border-radius:40px; color:var(--txt); font-size:13px;
            cursor:pointer; transition:.15s; display:flex; align-items:center; gap:4px;
        }
        .controls-room button:hover { background:var(--br); }
        .controls-room .active { background:var(--ac); color:var(--bg); border-color:var(--ac); }
        .controls-room .danger { background:#a55; color:#fff; border-color:#a55; }

        /* ===== ЛИЧНЫЕ ЧАТЫ ===== */
        .chat-list { flex:1; overflow-y:auto; padding:12px; }
        .chat-list .chat-item {
            display:flex; align-items:center; padding:12px 16px; background:var(--bg3); border-radius:12px;
            margin-bottom:8px; cursor:pointer; border:1px solid var(--br); transition:.1s;
        }
        .chat-list .chat-item:hover { background:var(--bg4); }
        .chat-list .chat-item .name { flex:1; font-weight:500; }
        .chat-list .chat-item .last-msg { color:var(--txt3); font-size:13px; }
        .chat-list .chat-item .time { font-size:11px; color:var(--txt3); margin-left:8px; }
        .fab {
            position:fixed; bottom:20px; right:20px; background:#4a6d8a; border:none; border-radius:50%;
            width:56px; height:56px; display:flex; align-items:center; justify-content:center;
            font-size:28px; color:#fff; box-shadow:var(--sh); cursor:pointer; z-index:50;
        }
        .fab:hover { background:#5a8aaa; }

        /* ===== МОДАЛКА СОЗДАНИЯ ЧАТА ===== */
        .modal-overlay {
            position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px);
        }
        .modal-overlay.active { display:flex; }
        .modal-box {
            background:var(--bg2); padding:24px; border-radius:20px; max-width:360px; width:90%; border:1px solid var(--br);
        }
        .modal-box h3 { color:var(--txt); margin-bottom:12px; }
        .modal-box input { width:100%; padding:10px 14px; border-radius:40px; border:1px solid var(--br); background:var(--bg3); color:var(--txt); outline:none; margin-bottom:12px; }
        .modal-box .search-results { max-height:200px; overflow-y:auto; margin-bottom:12px; }
        .modal-box .search-results .result-item { padding:8px 12px; cursor:pointer; border-bottom:1px solid var(--br); }
        .modal-box .search-results .result-item:hover { background:var(--bg4); }
        .modal-box .btn { width:100%; padding:10px; border-radius:40px; border:none; background:#4a6d8a; color:#fff; font-weight:600; cursor:pointer; }
        .modal-box .btn.secondary { background:transparent; border:1px solid var(--br); color:var(--txt); margin-top:8px; }

        /* ===== ОКНО ЛИЧНОГО ЧАТА ===== */
        .chat-window {
            display:none; flex-direction:column; height:100%; width:100%;
            position:absolute; top:0; left:0; background:var(--bg); z-index:60;
        }
        .chat-window.active { display:flex; }
        .chat-window .header {
            display:flex; align-items:center; padding:8px 16px; background:var(--bg2); border-bottom:1px solid var(--br);
        }
        .chat-window .header .back { font-size:24px; cursor:pointer; color:var(--txt2); margin-right:12px; }
        .chat-window .header .title { flex:1; font-weight:600; }
        .chat-window .chat-messages { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:4px; background:var(--chat-bg); }
        .chat-window .input-area { display:flex; gap:8px; padding:8px; background:var(--bg2); border-top:1px solid var(--br); }
        .chat-window .input-area input { flex:1; padding:8px 14px; border-radius:40px; border:1px solid var(--br); background:var(--bg3); color:var(--txt); outline:none; }
        .chat-window .input-area button { padding:8px 16px; border-radius:40px; border:none; background:#4a6d8a; color:#fff; cursor:pointer; }

        /* ===== НАСТРОЙКИ ===== */
        .settings-tab { padding:16px; max-width:400px; width:100%; }
        .settings-tab .setting-group { margin-bottom:16px; }
        .settings-tab label { display:block; font-size:13px; color:var(--txt2); margin-bottom:4px; }
        .zoom-row { display:flex; align-items:center; gap:10px; }
        .zoom-row input[type="range"] { flex:1; accent-color:var(--ac); cursor:pointer; }
        .zoom-value { color:var(--ac); font-weight:700; min-width:40px; }
        .btn-default { background:var(--bg3); border:1px solid var(--br); color:var(--txt); padding:4px 12px; border-radius:30px; cursor:pointer; font-size:12px; }
        .btn-default:hover { background:var(--br); }
        .theme-toggle { display:flex; align-items:center; gap:8px; margin-top:4px; }
        .theme-toggle input[type="checkbox"] { width:18px; height:18px; accent-color:var(--ac); cursor:pointer; }
        .color-picker { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
        .color-picker input[type="color"] { width:32px; height:32px; border-radius:50%; border:2px solid var(--br); cursor:pointer; padding:0; background:none; }
        .color-picker input[type="color"]::-webkit-color-swatch-wrapper { padding:0; }
        .color-picker input[type="color"]::-webkit-color-swatch { border:none; border-radius:50%; }
        .sticker-upload { margin-top:8px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .sticker-upload label { background:var(--bg3); padding:6px 14px; border-radius:30px; border:1px solid var(--br); cursor:pointer; font-size:13px; transition:.15s; }
        .sticker-upload label:hover { background:var(--br); }
        .sticker-upload input[type="file"] { display:none; }
        .sticker-upload .sticker-preview { display:flex; gap:4px; flex-wrap:wrap; }
        .sticker-upload .sticker-preview img { width:48px; height:48px; border-radius:8px; object-fit:contain; background:var(--bg3); border:1px solid var(--br); padding:2px; }
        .btn-danger { background:#a55; border:1px solid #a55; color:#fff; padding:6px 16px; border-radius:30px; cursor:pointer; font-size:13px; transition:.15s; }
        .btn-danger:hover { background:#c66; }
        .sticker-panel { display:none; position:absolute; bottom:60px; left:10px; background:var(--bg2); border-radius:16px; padding:8px; border:1px solid var(--br); max-width:320px; flex-wrap:wrap; gap:4px; z-index:100; max-height:200px; overflow-y:auto; }
        .sticker-panel.active { display:flex; }
        .sticker-panel img { width:64px; height:64px; border-radius:12px; cursor:pointer; object-fit:contain; background:var(--bg3); padding:4px; border:1px solid transparent; transition:.1s; }
        .sticker-panel img:hover { border-color:var(--ac); transform:scale(1.05); }

        /* ===== ЗАПИСЬ КРУЖКА ===== */
        .recording-modal {
            position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.92); display:none;
            align-items:center; justify-content:center; z-index:9999; flex-direction:column; animation:fadeIn .3s;
        }
        .recording-modal.active { display:flex; }
        .recording-modal .preview { width:320px; height:320px; border-radius:50%; overflow:hidden; background:#000; margin-bottom:16px; }
        .recording-modal .preview video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
        .recording-modal .timer { color:#ccc; font-size:18px; font-weight:300; margin-bottom:16px; }
        .recording-modal .controls-bottom { display:flex; justify-content:center; align-items:center; gap:20px; width:100%; padding:0 20px; }

        // ============================================================

        function blobToBase64(blob) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.readAsDataURL(blob);
            });
        }
        function base64ToBlob(base64, mime) {
            const byteString = atob(base64.split(',')[1]);
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i=0; i<byteString.length; i++) ia[i] = byteString.charCodeAt(i);
            return new Blob([ab], { type:mime });
        }
        function vibrate() { try { if(navigator.vibrate) navigator.vibrate(30); } catch(e) {} }
        function formatFileSize(bytes) {
            if(bytes<1024) return bytes+' B';
            if(bytes<1048576) return (bytes/1024).toFixed(1)+' KB';
            return (bytes/1048576).toFixed(1)+' MB';
        }

        toggleLoginLink.addEventListener('click', toggleLoginMode);

        loginBtn.addEventListener('click', async () => {
            const username = loginUsername.value.trim();
            const password = loginPassword.value.trim();
            if(!username || !password) { alert('Заполните все поля'); return; }
            if(password.length < 6) { alert('Пароль не менее 6 символов'); return; }

            if(isLoginMode) {
                // Вход по нику
                try {
                    const usersRef = database.ref('users');
                    const snap = await usersRef.orderByChild('username').equalTo(username).once('value');

                    if(!foundEmail) { alert('Ошибка данных пользователя'); return; }
                    await auth.signInWithEmailAndPassword(foundEmail, password);

                } catch(e) { alert('Ошибка регистрации: '+e.message); }

        });

        auth.onAuthStateChanged(async (user) => {

                const snap = await database.ref('users/'+user.uid).once('value');

        // ============================================================

        function loadSettings() {
            const savedZoom = localStorage.getItem('zoomLevel');
            if(savedZoom) { zoomSlider.value = savedZoom; applyZoom(savedZoom); }
            const savedTheme = localStorage.getItem('lightTheme') === 'true';

            applyTheme(savedTheme);
            myColor = getMyColor();
            myColorPicker.value = myColor;
            document.querySelectorAll('.msg.me .sender').forEach(el => el.style.color = myColor);
        }

        function applyZoom(val) {
            const p = parseInt(val);
            mainWrapper.style.transform = `scale(${p/100})`;
            zoomValue.textContent = p+'%';
            localStorage.setItem('zoomLevel', p);
        }
        zoomSlider.addEventListener('input', e=>applyZoom(e.target.value));
        zoomDefaultBtn.addEventListener('click', ()=>{ zoomSlider.value=100; applyZoom(100); });

        function applyTheme(light) {
            document.documentElement.classList.toggle('light', light);
            localStorage.setItem('lightTheme', light);
        }

            localStorage.setItem('mango_mycolor', myColor);

        });

        // ============================================================
        // 6. ОБЩИЙ ЧАТ (ГРУППА)
        // ============================================================
        let groupReplyTo = null;
        let groupMsgListeners = [];

        function subscribeGroupChat() {
            const ref = database.ref('groupMessages');
            ref.off(); // отписываемся от старых
            groupMessagesEl.innerHTML = '';
            // загружаем существующие
            ref.orderByChild('time').once('value', snap => {
                if(snap.exists()) {
                    snap.forEach(child => {
                        const msg = child.val();
                        const key = child.key;
                        if(document.querySelector(`[data-msg-id="${key}"]`)) return;
                        appendGroupMessage(msg, key);
                    });
                }
            });
            // слушаем новые
            ref.on('child_added', snap => {
                const msg = snap.val();
                const key = snap.key;
                if(document.querySelector(`[data-msg-id="${key}"]`)) return;
                appendGroupMessage(msg, key);
                if(!isGroupTabActive()) {
                    // если вкладка не активна, увеличиваем счётчик (не реализован)
                }
            });
            // слушаем изменения (для реакций)
            ref.on('child_changed', snap => {
                const msg = snap.val();
                const key = snap.key;
                const el = document.querySelector(`[data-msg-id="${key}"]`);
                if(el && msg.reactions) {
                    let reactionsDiv = el.querySelector('.reactions');
                    if(!reactionsDiv) {
                        reactionsDiv = document.createElement('div');
                        reactionsDiv.className = 'reactions';
                        el.appendChild(reactionsDiv);
                    }
                    reactionsDiv.innerHTML = '';
                    for(const [emoji, users] of Object.entries(msg.reactions)) {
                        const span = document.createElement('span');
                        span.textContent = `${emoji} ${users.length}`;
                        reactionsDiv.appendChild(span);
                    }
                }
            });
            // слушаем удаление
            ref.on('child_removed', snap => {
                const key = snap.key;
                const el = document.querySelector(`[data-msg-id="${key}"]`);
                if(el) el.remove();
            });
            groupMsgListeners.push(ref);
        }

        function appendGroupMessage(msg, key) {
            const isMe = (msg.sender === currentUser.username);
            const div = document.createElement('div');
            div.className = 'msg' + (isMe ? ' me' : ' other');
            div.dataset.msgId = key;
            div.dataset.sender = msg.sender;

            let replyHtml = msg.replyTo ? `<div class="reply-to">↩️ ${msg.replyTo.sender}: ${msg.replyTo.text}</div>` : '';
            let contentHtml = '';
            if(msg.type === 'text') contentHtml = `<div class="content">${msg.text}</div>`;
            else if(msg.type === 'sticker') contentHtml = `<img class="sticker-img" src="${msg.data}" />`;
            else if(msg.type === 'voice') {
                const blob = base64ToBlob(msg.data, 'audio/ogg');
                const url = URL.createObjectURL(blob);
                const duration = Math.round(blob.size/16000);
                const durStr = `${Math.floor(duration/60)}:${(duration%60).toString().padStart(2,'0')}`;
                contentHtml = `<div class="audio-preview"><button class="play-audio">▶</button><span class="duration">${durStr}</span></div>`;
                // отложим инициализацию аудио
                div._audioUrl = url;
            } else if(msg.type === 'videoMsg') {
                const blob = base64ToBlob(msg.data, 'video/mp4');
                const url = URL.createObjectURL(blob);
                contentHtml = `<div class="circle-video"><video src="${url}" controls></video></div>`;
                div._videoUrl = url;
            } else if(msg.type === 'file') {
                const icon = msg.mime.startsWith('image/') ? '🖼️' : '📄';
                const size = formatFileSize(msg.size);
                if(msg.mime.startsWith('image/')) {
                    const blob = base64ToBlob(msg.data, msg.mime);
                    const url = URL.createObjectURL(blob);
                    contentHtml = `<img src="${url}" style="max-width:160px;border-radius:10px;"/>`;
                } else {
                    contentHtml = `<div class="file-preview"><span class="icon">${icon}</span><div class="info"><span class="name">${msg.name}</span><span class="size">${size}</span></div></div>`;
                }
            }

            const senderColor = (msg.sender === currentUser.username) ? myColor : '#ffcc00';
            div.innerHTML = `
                <div class="sender" style="color:${senderColor}">${msg.sender}</div>
                ${replyHtml}
                ${contentHtml}
                <div class="msg-footer"><span class="time">${msg.time || ''}</span>${isMe ? '<span class="status-icon">✓✓</span>' : ''}</div>
            `;
            // реакции
            if(msg.reactions) {
                const reactionsDiv = document.createElement('div');
                reactionsDiv.className = 'reactions';
                for(const [emoji, users] of Object.entries(msg.reactions)) {
                    const span = document.createElement('span');
                    span.textContent = `${emoji} ${users.length}`;
                    reactionsDiv.appendChild(span);
                }
                div.appendChild(reactionsDiv);
            }

            groupMessagesEl.appendChild(div);
            // обработка аудио/видео после добавления
            if(div._audioUrl) {
                const btn = div.querySelector('.play-audio');
                const audio = new Audio(div._audioUrl);
                let playing = false;
                btn.addEventListener('click', (e)=>{
                    e.stopPropagation();
                    if(playing) { audio.pause(); btn.textContent='▶'; playing=false; }
                    else { audio.play(); btn.textContent='⏸'; playing=true; }
                });
                audio.addEventListener('ended', ()=>{ btn.textContent='▶'; playing=false; });
            }
            if(div._videoUrl) {
                const video = div.querySelector('video');
                const circle = div.querySelector('.circle-video');
                if(video && circle) {
                    circle.addEventListener('click', ()=>{
                        if(video.paused) video.play();
                        else video.pause();
                    });
                }
            }
            // обработка взаимодействий (контекстное меню)
            addMessageInteractions(div, key, msg.sender);
            scrollToBottomGroup();
        }

        function addMessageInteractions(el, id, sender) {
            // контекстное меню (упрощённо – по клику)
            el.addEventListener('click', (e) => {
                if(e.target.closest('.reactions') || e.target.closest('button') || e.target.closest('video') || e.target.closest('audio')) return;
                // показываем меню (реализуем через нативные alert для простоты)
                const action = confirm(`Сообщение от ${sender}\n1. Ответить\n2. Копировать текст\n3. Удалить у себя (только свои)\n4. Удалить у всех (только свои)`);
                if(action === null) return;
                // реализуем через простой prompt, так как контекстное меню требует большого кода
                // для краткости оставлю базовые функции
                if(action === 1) {
                    const text = el.querySelector('.content')?.textContent || '[медиа]';
                    groupReplyTo = { id, sender, text };
                    groupReplyIndicator.style.display = 'flex';
                    groupReplyText.textContent = `${sender}: ${text}`;
                } else if(action === 2) {
                    const text = el.querySelector('.content')?.textContent || '';
                    if(text) navigator.clipboard.writeText(text).then(()=>alert('Скопировано')).catch(()=>{});
                } else if(action === 3 && sender === currentUser.username) {
                    // удалить у себя (удаляем из DOM, но не из базы)
                    el.remove();
                } else if(action === 4 && sender === currentUser.username) {
                    if(confirm('Удалить у всех?')) {
                        database.ref('groupMessages/'+id).remove().catch(()=>{});
                    }
                }
            });
        }

            groupVoiceBtn.addEventListener('click', ()=>{
                if(!navigator.mediaDevices) return alert('WebRTC не поддерживается');
                navigator.mediaDevices.getUserMedia({ audio:true }).then(async stream => {
                    const recorder = new MediaRecorder(stream);
                    const chunks = [];
                    recorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
                    recorder.onstop = async () => {
                        const blob = new Blob(chunks, {type:'audio/ogg'});
                        const base64 = await blobToBase64(blob);
                        const msgData = {

        let localStream = null;
        let roomRef = null;
        let roomParticipantsRef = null;

        function setupVideoUI() {
            // При переключении на вкладку комнаты – инициализируем
            const roomTab = document.getElementById('roomTab');
            const observer = new MutationObserver(() => {
                if(roomTab.classList.contains('active')) {
                    initRoom();
                }
            });
            observer.observe(roomTab, { attributes: true, attributeFilter: ['class'] });
            // Если уже активна – инициализируем
            if(roomTab.classList.contains('active')) initRoom();

            // Кнопки управления
            camBtn.addEventListener('click', ()=>{
                if(!localStream) return;
                const track = localStream.getVideoTracks()[0];
                if(track) {
                    track.enabled = !track.enabled;
                    camBtn.classList.toggle('active', track.enabled);
                    camBtn.textContent = track.enabled ? '📷 Камера' : '📷 Выкл';
                }
            });
            micBtn.addEventListener('click', ()=>{
                if(!localStream) return;
                const track = localStream.getAudioTracks()[0];
                if(track) {
                    track.enabled = !track.enabled;
                    micBtn.classList.toggle('active', track.enabled);
                    micBtn.textContent = track.enabled ? '🎤 Микрофон' : '🎤 Выкл';
                }
            });
            screenBtn.addEventListener('click', async ()=>{
                if(!localStream) return;
                try {
                    const screenStream = await navigator.mediaDevices.getDisplayMedia({ video:true });
                    const videoTrack = screenStream.getVideoTracks()[0];
                    const oldTrack = localStream.getVideoTracks()[0];
                    if(oldTrack) localStream.removeTrack(oldTrack);
                    localStream.addTrack(videoTrack);
                    // обновить все отправляемые потоки
                    for(const pid in roomPeers) {
                        const sender = roomPeers[pid].call.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                        if(sender) sender.replaceTrack(videoTrack);
                    }
                    screenBtn.classList.add('active');
                    screenBtn.textContent = '🖥️ Остановить';
                    videoTrack.onended = ()=>{
                        // вернуть камеру
                        navigator.mediaDevices.getUserMedia({ video:true, audio:true }).then(cam => {
                            const newTrack = cam.getVideoTracks()[0];
                            const old = localStream.getVideoTracks()[0];
                            if(old) localStream.removeTrack(old);
                            localStream.addTrack(newTrack);
                            for(const pid in roomPeers) {
                                const sender = roomPeers[pid].call.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                                if(sender) sender.replaceTrack(newTrack);
                            }
                            screenBtn.classList.remove('active');
                            screenBtn.textContent = '🖥️ Демка';
                        });
                    };
                } catch(e) { alert('Ошибка демонстрации экрана: '+e.message); }
            });
            disconnectBtn.addEventListener('click', leaveRoom);
        }

        async function initRoom() {
            if(isInRoom) return;
            if(!peer) {
                peer = new Peer(undefined, {
                    host: '0.peerjs.com',
                    port: 443,
                    path: '/',
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' },
                            { urls: 'stun:stun1.l.google.com:19302' },
                            { urls: ['turn:openrelay.metered.ca:80','turn:openrelay.metered.ca:443'], username:'openrelayproject', credential:'openrelayproject' }
                        ]
                    }
                });
                peer.on('error', (err)=>console.warn('Peer error:', err));
            }
            // Получаем локальный поток
            if(!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    camBtn.classList.add('active');
                    micBtn.classList.add('active');
                } catch(e) { alert('Ошибка доступа к камере: '+e.message); return; }
            }
            // Добавляем своё видео в сетку
            addLocalVideo();

            // Подключаемся к комнате
            if(peer.id) {
                joinRoom(peer.id);
            } else {
                peer.on('open', (id) => {
                    joinRoom(id);
                });
            }
            // Слушаем входящие звонки
            peer.on('call', (call) => {
                if(!localStream) return;
                call.answer(localStream);
                const peerId = call.peer;
                const videoEl = createRemoteVideo(peerId);
                call.on('stream', (remoteStream) => {
                    videoEl.srcObject = remoteStream;
                    videoEl.parentElement.querySelector('.camera-placeholder').classList.add('hidden');
                });
                call.on('close', () => {
                    removeRemoteVideo(peerId);
                });
                roomPeers[peerId] = { call, stream: null, videoElement: videoEl };
            });
        }

        function addLocalVideo() {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.id = 'localVideoCard';
            const video = document.createElement('video');
            video.id = 'localVideo';
            video.autoplay = true;
            video.muted = true;
            video.playsInline = true;
            video.srcObject = localStream;
            const placeholder = document.createElement('div');
            placeholder.className = 'camera-placeholder hidden';
            placeholder.textContent = '📷';
            const label = document.createElement('span');
            label.className = 'label';
            label.textContent = currentUser.username + ' (я)';
            card.appendChild(video);
            card.appendChild(placeholder);
            card.appendChild(label);
            videoGrid.prepend(card);
        }

        function createRemoteVideo(peerId) {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.dataset.peer = peerId;
            const video = document.createElement('video');
            video.autoplay = true;
            video.playsInline = true;
            const placeholder = document.createElement('div');
            placeholder.className = 'camera-placeholder';
            placeholder.textContent = '📷';
            const label = document.createElement('span');
            label.className = 'label';
            label.textContent = 'Участник';
            card.appendChild(video);
            card.appendChild(placeholder);
            card.appendChild(label);
            videoGrid.appendChild(card);
            // Загрузим имя участника из Firebase (по peerId? проще хранить соответствие)
            // Можно запросить из roomParticipants
            database.ref('roomParticipants').child(peerId).child('username').once('value', snap => {
                if(snap.exists()) label.textContent = snap.val();
            });
            return video;
        }

        function removeRemoteVideo(peerId) {
            const cards = videoGrid.querySelectorAll('.video-card');
            for(const card of cards) {
                if(card.dataset.peer === peerId) {
                    card.remove();
                    break;
                }
            }
            delete roomPeers[peerId];
        }

        function joinRoom(peerId) {
            if(!peer) return;
            // Добавляем себя в список участников
            roomRef = database.ref('roomParticipants');
            roomParticipantsRef = roomRef.child(peerId);
            roomParticipantsRef.set({
                username: currentUser.username,
                uid: currentUser.uid
            });
            roomRef.on('child_added', (snap) => {
                const pid = snap.key;
                if(pid === peerId) return;
                if(roomPeers[pid]) return;
                // Создаём вызов
                const call = peer.call(pid, localStream);
                const videoEl = createRemoteVideo(pid);
                call.on('stream', (stream) => {
                    videoEl.srcObject = stream;
                    videoEl.parentElement.querySelector('.camera-placeholder').classList.add('hidden');
                });
                call.on('close', () => {
                    removeRemoteVideo(pid);
                });
                roomPeers[pid] = { call, stream: null, videoElement: videoEl };
            });
            roomRef.on('child_removed', (snap) => {
                const pid = snap.key;
                if(pid === peerId) return;
                removeRemoteVideo(pid);
            });
            isInRoom = true;
        }

        function leaveRoom() {
            if(roomRef) {
                roomRef.off();
                roomRef = null;
            }
            if(roomParticipantsRef) {
                roomParticipantsRef.remove().catch(()=>{});
                roomParticipantsRef = null;
            }
            // Закрываем все вызовы
            for(const pid in roomPeers) {
                roomPeers[pid].call.close();
            }
            roomPeers = {};
            // Удаляем все видео, кроме локального
            const cards = videoGrid.querySelectorAll('.video-card');
            for(const card of cards) {
                if(card.id !== 'localVideoCard') card.remove();
            }
            isInRoom = false;
            // Отключаем peer? нет, оставляем для возможности переподключения
        }

        // ============================================================
        // 9. ЗАПИСЬ КРУЖКА (общая)
        // ============================================================
        let recMediaStream = null, recRecorder = null, recRecordedChunks = [], recIsRecording = false, recTimerInterval = null, recSeconds = 0;
        let currentFacingMode = 'user';
        let recTarget = 'group'; // куда отправить

        function openRecorder(target) {
            recTarget = target;
            if(recIsRecording) return;
            (async ()=>{
                try {
                    const constraints = {
                        video: { facingMode: currentFacingMode, width: { ideal: 320 }, height: { ideal: 320 } },
                        audio: true
                    };
                    recMediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                    recPreview.srcObject = recMediaStream;
                    recordingModal.classList.add('active');
                    recTimer.textContent = '0:00';
                    recSeconds = 0;
                    recRecordedChunks = [];
                    recIsRecording = false;
                    // start recording
                    recRecorder = new MediaRecorder(recMediaStream);
                    recRecordedChunks = [];
                    recRecorder.ondataavailable = e => { if(e.data.size>0) recRecordedChunks.push(e.data); };
                    recRecorder.onstop = async ()=>{
                        const blob = new Blob(recRecordedChunks, { type:'video/mp4' });
                        const base64 = await blobToBase64(blob);
                        // Отправить в выбранный чат
                        if(recTarget === 'group') {
                            await database.ref('groupMessages').push({
                                type: 'videoMsg',
                                data: base64,
                                sender: currentUser.username,
                                time: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
                            });
                        } else {
                            // для личных чатов (если нужно)
                            if(currentPrivateChatId) {
                                await database.ref('chats/'+currentPrivateChatId+'/messages').push({
                                    type: 'videoMsg',
                                    data: base64,
                                    sender: currentUser.username,
                                    time: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
                                });
                            }
                        }
                        closeRecorder();
                        vibrate();
                    };
                    recRecorder.start(100);
                    recIsRecording = true;
                    recTimerInterval = setInterval(()=>{
                        recSeconds++;
                        const mins = Math.floor(recSeconds/60);
                        const secs = recSeconds%60;
                        recTimer.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
                        if(recSeconds >= 60) {
                            if(recRecorder && recRecorder.state === 'recording') {
                                recRecorder.stop();
                                recIsRecording = false;
                                clearInterval(recTimerInterval);
                            }
                        }
                    }, 1000);
                } catch(e) { alert('Ошибка доступа к камере: '+e.message); }
            })();
        }

        function closeRecorder() {
            if(recRecorder && recRecorder.state !== 'inactive') {
                try { recRecorder.stop(); } catch(e) {}
            }
            if(recMediaStream) {
                recMediaStream.getTracks().forEach(t=>t.stop());
                recMediaStream = null;
            }
            if(recTimerInterval) clearInterval(recTimerInterval);
            recordingModal.classList.remove('active');
            recIsRecording = false;
        }

        recSendBtn.addEventListener('click', ()=>{
            if(recRecorder && recRecorder.state === 'recording') {
                recRecorder.stop();
                recIsRecording = false;
                if(recTimerInterval) clearInterval(recTimerInterval);
            } else {
                closeRecorder();
            }
        });
        recCancelBtn.addEventListener('click', closeRecorder);
        flipBtn.addEventListener('click', async ()=>{
            const newMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            currentFacingMode = newMode;
            if(recMediaStream) {
                const track = recMediaStream.getVideoTracks()[0];
                if(track) {
                    try {
                        await track.applyConstraints({ facingMode: newMode });
                    } catch(e) { console.warn(e); }
                }
            }
        });
        flashBtn.addEventListener('click', ()=>{
            // простая заглушка
            flashBtn.style.opacity = (flashBtn.style.opacity === '1' ? '0.5' : '1');
        });

        // ============================================================
        // 10. СТИКЕРЫ (общие)
        // ============================================================
        function renderStickers(panel) {
            const stickers = getStickers();
            panel.innerHTML = '';
            if(stickers.length===0) {
                const empty = document.createElement('div');
                empty.className = 'empty-stickers';
                empty.textContent = 'Загрузи стикеры в настройках';
                panel.appendChild(empty);
                return;
            }
            stickers.forEach(base64 => {
                const img = document.createElement('img');
                img.src = base64;
                img.addEventListener('click', ()=>{
                    sendGroupSticker(base64);
                    panel.classList.remove('active');
                });
                panel.appendChild(img);
            });
        }

        function renderStickerPreview() {
            const stickers = getStickers();
            stickerPreview.innerHTML = '';
            stickers.forEach((base64, index) => {
                const container = document.createElement('div');
                container.style.position = 'relative';
                container.style.display = 'inline-block';
                const img = document.createElement('img');
                img.src = base64;
                const remove = document.createElement('span');
                remove.className = 'btn-danger';
                remove.textContent = '×';
                remove.style.position = 'absolute';
                remove.style.top = '-6px';
                remove.style.right = '-6px';
                remove.style.width = '18px';
                remove.style.height = '18px';
                remove.style.fontSize = '12px';
                remove.style.display = 'flex';
                remove.style.alignItems = 'center';
                remove.style.justifyContent = 'center';
                remove.style.cursor = 'pointer';
                remove.addEventListener('click', (e)=>{
                    e.stopPropagation();
                    const stickers = getStickers();
                    stickers.splice(index, 1);
                    saveStickers(stickers);
                    renderStickerPreview();
                    renderStickers(groupStickerPanel);
                });
                container.appendChild(img);
                container.appendChild(remove);
                stickerPreview.appendChild(container);
            });
        }

        stickerUpload.addEventListener('change', async (e)=>{
            const files = e.target.files;
            if(!files.length) return;
            const stickers = getStickers();
            for(const file of files) {
                const blob = await file.arrayBuffer().then(buf=>new Blob([buf], {type:file.type}));
                const base64 = await blobToBase64(blob);
                stickers.push(base64);
            }
            saveStickers(stickers);
            renderStickers(groupStickerPanel);
            renderStickerPreview();
            stickerUpload.value = '';
        });

        // ============================================================
        // 11. МЕНЮ И НАВИГАЦИЯ
        // ============================================================
        function setupMenu() {
            menuBtn.addEventListener('click', (e)=>{ e.stopPropagation(); toggleMenu(); });
            menuOverlay.addEventListener('click', ()=>toggleMenu(false));
            menuItems.forEach(item => {
                item.addEventListener('click', ()=>{
                    const tab = item.dataset.tab;
                    menuItems.forEach(m => m.classList.remove('active'));
                    item.classList.add('active');
                    for(const key in tabs) {
                        tabs[key].classList.toggle('active', key === tab);
                    }
                    toggleMenu(false);
                    // Если переключились на комнату – инициализируем
                    if(tab === 'room') initRoom();
                });
            });
            // Кнопка "ещё" в топбаре
            moreBtn.addEventListener('click', (e)=>{ e.stopPropagation(); moreMenu.classList.toggle('active'); });
            document.addEventListener('click', ()=>{ moreMenu.classList.remove('active'); });
        }

        function toggleMenu(open) {
            const isOpen = sideMenu.classList.contains('open');
            const newOpen = (open !== undefined) ? open : !isOpen;
            sideMenu.classList.toggle('open', newOpen);
            menuOverlay.classList.toggle('active', newOpen);
        }

        // ============================================================
        // 12. ЗАПУСК
        // ============================================================
        setTimeout(() => {
            document.getElementById('splash').classList.add('hidden');
        }, 2000);

        console.log('🚀 арбузник v.8.0 – групповой чат + видеочат с несколькими участниками');
    </script>
</body>
</html>
